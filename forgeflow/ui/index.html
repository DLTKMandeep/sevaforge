<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sevaforge — No Charge as a Service Hub</title>

  <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    /* ── Sevaforge Design System ───────────────────────────────────────────── */
    :root {
      --sidebar-w: 260px;
      --forge-amber: #f59e0b;
      --forge-purple: #7c3aed;
      --forge-glow: rgba(245,158,11,0.35);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      /* Forge-branded deep background with subtle grid */
      background-color: #0d0d14;
      background-image:
        radial-gradient(ellipse 60% 40% at 15% 10%, rgba(124,58,237,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 85%, rgba(245,158,11,0.07) 0%, transparent 55%),
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      background-attachment: fixed;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); }
    .main-content { width: calc(100vw - var(--sidebar-w)); }
    .stage-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .stage-card { transition: all .18s ease; }
    .stage-card:hover { transform: translateY(-2px); }

    /* ── Brand logo ─────────────────────────────────────────────────────── */
    .seva-logo-hex polygon { stroke: url(#logoGrad); }
    .seva-logo-hex path    { fill:   url(#logoGrad); }
    .brand-gradient {
      background: linear-gradient(135deg, var(--forge-amber) 0%, var(--forge-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .seva-wordmark {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(100deg, #f59e0b 0%, #c084fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── NoCaaS badge ───────────────────────────────────────────────────── */
    .nocaas-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 999px;
      background: linear-gradient(135deg, rgba(245,158,11,.12), rgba(124,58,237,.12));
      border: 1px solid rgba(245,158,11,.25);
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.04em;
      color: #fbbf24;
      backdrop-filter: blur(4px);
    }
    .nocaas-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 6px #f59e0b;
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* ── Animations ─────────────────────────────────────────────────────── */
    .spin { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .slide-in { animation: slideIn .35s cubic-bezier(.16,1,.3,1); }
    @keyframes slideIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:none; } }
    .finding-row:not(:last-child) { border-bottom: 1px solid oklch(var(--b3)); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
    .step-running > .step-content { animation: pulse 1.2s ease-in-out infinite; }

    /* Float — idle hero elements drift gently */
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
    .float-slow { animation: float 5s ease-in-out infinite; }
    .float-med  { animation: float 3.8s ease-in-out infinite .6s; }

    /* Shimmer — text highlight sweep */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .shimmer-text {
      background: linear-gradient(90deg, #f59e0b 0%, #c084fc 40%, #f59e0b 80%);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }

    /* Stage pill pop-in */
    @keyframes popIn {
      0%   { opacity:0; transform: scale(.7) translateY(8px); }
      70%  { transform: scale(1.08) translateY(-2px); }
      100% { opacity:1; transform: scale(1) translateY(0); }
    }
    .pop-in { animation: popIn .45s cubic-bezier(.34,1.56,.64,1) both; }

    /* Victory flash — done screen */
    @keyframes victoryGlow {
      0%,100% { box-shadow: 0 0 40px rgba(52,211,153,.2), 0 0 80px rgba(52,211,153,.08); }
      50%     { box-shadow: 0 0 60px rgba(52,211,153,.4), 0 0 120px rgba(52,211,153,.15); }
    }
    .victory-glow { animation: victoryGlow 2.4s ease-in-out infinite; }

    /* Count-up badge */
    @keyframes countUp { from{transform:scale(.5);opacity:0} to{transform:scale(1);opacity:1} }
    .count-badge { animation: countUp .5s cubic-bezier(.34,1.56,.64,1) both; }

    /* Typewriter cursor */
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .cursor { display:inline-block; width:2px; height:1em; background:#f59e0b;
              margin-left:2px; animation: blink 1s step-end infinite; vertical-align:text-bottom; }

    /* Stage progress fill */
    @keyframes fillRight {
      from { width: 0%; }
      to   { width: var(--fill-pct, 100%); }
    }
    .progress-fill { animation: fillRight 1.2s cubic-bezier(.22,1,.36,1) both; }

    /* Forge fire flicker on the logo while pipeline runs */
    @keyframes forgeFlicker {
      0%,100% { filter: drop-shadow(0 0 5px rgba(245,158,11,.7)); }
      33%     { filter: drop-shadow(0 0 12px rgba(245,158,11,.9)) drop-shadow(0 0 24px rgba(245,158,11,.3)); }
      66%     { filter: drop-shadow(0 0 8px rgba(245,158,11,.5)); }
    }
    .forge-fire { animation: forgeFlicker 1.8s ease-in-out infinite; }

    /* Sand settle — fills stage card from bottom when stage completes */
    .sand-fill-success { position:relative; overflow:hidden; }
    .sand-fill-success::after {
      content:''; position:absolute; inset:0;
      background: linear-gradient(to top, rgba(34,197,94,.18) 0%, rgba(34,197,94,.04) 100%);
      animation: sandRise .8s cubic-bezier(.22,1,.36,1) forwards;
    }
    .sand-fill-error::after {
      content:''; position:absolute; inset:0;
      background: linear-gradient(to top, rgba(239,68,68,.2) 0%, rgba(239,68,68,.05) 100%);
      animation: sandRise .8s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes sandRise {
      from { clip-path: inset(100% 0 0 0); }
      to   { clip-path: inset(0% 0 0 0); }
    }

    /* Stage card ring-burst on completion */
    @keyframes burstFlash {
      0%  { box-shadow: 0 0 0 0 rgba(34,197,94,.8); }
      70% { box-shadow: 0 0 0 16px rgba(34,197,94,0); }
      100%{ box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    .burst-success { animation: burstFlash .55s ease-out; }
    @keyframes burstFlashErr {
      0%  { box-shadow: 0 0 0 0 rgba(239,68,68,.8); }
      70% { box-shadow: 0 0 0 16px rgba(239,68,68,0); }
      100%{ box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }
    .burst-error { animation: burstFlashErr .55s ease-out; }

    /* Pendulum canvas container glow */
    .pendulum-wrap { border-radius: 12px; overflow: hidden; position: relative; }
    .pendulum-wrap::before {
      content:''; position:absolute; inset:-1px; border-radius:13px;
      background: linear-gradient(135deg, rgba(245,158,11,.4), rgba(124,58,237,.4));
      z-index:0;
    }
    .pendulum-wrap canvas { position:relative; z-index:1; border-radius:11px; display:block; }

    /* Stat colors */
    .stat-primary .stat-value { color: oklch(var(--p)); }
    .stat-success .stat-value { color: oklch(var(--su)); }
    .stat-warning .stat-value { color: oklch(var(--wa)); }
    .stat-error   .stat-value { color: oklch(var(--er)); }

    .live-hero {
      background: linear-gradient(135deg, rgba(124,58,237,.12) 0%, rgba(245,158,11,.08) 100%);
      border: 1px solid rgba(245,158,11,.15);
      border-radius: 16px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>

// ── API Hook ──────────────────────────────────────────────────────────────────

function useApi({ apiUrl, apiKey }) {
  return useCallback(async (method, path, body) => {
    const headers = { 'Content-Type': 'application/json' };
    if (apiKey) headers['X-API-Key'] = apiKey;
    const res = await fetch(`${apiUrl}${path}`, {
      method, headers,
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error(`HTTP ${res.status}${txt ? ': ' + txt.slice(0,120) : ''}`);
    }
    return res.json();
  }, [apiUrl, apiKey]);
}

// ── Small helpers ─────────────────────────────────────────────────────────────

const timeSince = (ts) => {
  if (!ts) return '—';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return new Date(ts).toLocaleTimeString();
};

function StatusBadge({ status }) {
  const map = {
    success: 'badge-success',  running: 'badge-warning',
    error:   'badge-error',    warning: 'badge-warning',
    healthy: 'badge-success',  down:    'badge-error',
  };
  const labels = {
    success:'Success', running:'Running', error:'Error',
    warning:'Warning', healthy:'Healthy', down:'Offline',
  };
  return (
    <span className={`badge badge-sm font-semibold ${map[status] || 'badge-ghost'}`}>
      {labels[status] || status}
    </span>
  );
}

function Spinner({ size = 'sm' }) {
  return <span className={`loading loading-spinner loading-${size}`} />;
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function ToastStack({ toasts }) {
  return (
    <div className="toast toast-end toast-bottom z-50">
      {toasts.map(t => (
        <div key={t.id} className={`alert shadow-lg slide-in ${t.type === 'error' ? 'alert-error' : t.type === 'success' ? 'alert-success' : 'alert-info'}`}>
          <span className="text-sm">{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

function HealthView({ sseConnected, liveState }) {
  const [now, setNow] = useState(new Date());
  useEffect(() => { const t = setInterval(() => setNow(new Date()), 5000); return () => clearInterval(t); }, []);

  const checks = [
    { label:'Dashboard SSE Stream',    ok: sseConnected,                  detail: sseConnected ? 'Receiving real-time events' : 'Not connected — run forgeflow run-all --gui' },
    { label:'Pipeline Ready',          ok: true,                           detail: 'ForgeFlow CLI installed and configured' },
    { label:'Live View',               ok: true,                           detail: 'React UI rendering correctly' },
    { label:'Hourglass Animation',     ok: true,                           detail: 'Canvas animation engine active' },
    { label:'SSE Event Bus',           ok: sseConnected,                  detail: sseConnected ? 'Events flowing' : 'Waiting for CLI connection' },
    { label:'NoCaaS Mode',             ok: true,                           detail: 'Running at zero cost — no external services' },
    { label:'Stage Announcements',     ok: true,                           detail: 'Purpose + Outputs displayed per stage' },
    { label:'Sevaforge Branding',      ok: true,                           detail: 'Logo, NoCaaS badge, amber/purple theme active' },
  ];

  const okCount = checks.filter(c=>c.ok).length;
  const pct = Math.round(okCount/checks.length*100);

  return (
    <div className="slide-in space-y-5">

      {/* Summary */}
      <div className="live-hero flex items-center gap-6 px-6 py-5">
        <div className="flex flex-col items-center">
          <div className="text-4xl font-bold mb-1" style={{color: pct===100?'#34d399':'#fbbf24'}}>{pct}%</div>
          <div className="text-xs opacity-40">System Health</div>
          <progress className="progress progress-success w-20 mt-2 h-1.5" value={pct} max="100" />
        </div>
        <div className="flex-1">
          <div className="font-bold text-lg mb-1" style={{color: pct===100?'#34d399':'#fbbf24'}}>
            {pct===100 ? '✓ All Systems Operational' : `⚠ ${checks.length-okCount} check${checks.length-okCount>1?'s':''} need attention`}
          </div>
          <div className="text-sm opacity-50">{okCount} of {checks.length} components passing · {now.toLocaleTimeString()}</div>
        </div>
        <SevaForgeLogo size={44} />
      </div>

      {/* Component checks */}
      <div className="card bg-base-200/80 shadow">
        <div className="card-body py-4">
          <h3 className="text-xs font-bold uppercase tracking-widest opacity-40 mb-3">Component Status</h3>
          <div className="grid grid-cols-2 gap-2">
            {checks.map((c,i) => (
              <div key={i} className="flex items-center gap-3 rounded-lg px-3 py-2.5"
                   style={{background: c.ok?'rgba(6,50,40,.3)':'rgba(60,10,10,.3)',
                           border: c.ok?'1px solid rgba(52,211,153,.2)':'1px solid rgba(239,68,68,.2)'}}>
                <span className="text-base flex-shrink-0" style={{color:c.ok?'#34d399':'#f87171'}}>{c.ok?'✓':'✗'}</span>
                <div className="min-w-0">
                  <div className="text-sm font-semibold" style={{color:c.ok?'#6ee7b7':'#fca5a5'}}>{c.label}</div>
                  <div className="text-xs opacity-40 truncate">{c.detail}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Last pipeline state */}
      <div className="card bg-base-200/80 shadow">
        <div className="card-body py-4">
          <h3 className="text-xs font-bold uppercase tracking-widest opacity-40 mb-3">Last Pipeline State</h3>
          {liveState.stages.length === 0
            ? <p className="text-sm opacity-40">No pipeline run detected yet. Run <code className="text-warning font-mono">forgeflow run-all --gui .</code></p>
            : (
              <div className="space-y-2">
                <div className="flex gap-6 text-sm">
                  <div><span className="opacity-40">Path: </span><code className="font-mono text-warning text-xs">{liveState.pipelinePath || '—'}</code></div>
                  <div><span className="opacity-40">Stages: </span><span className="font-semibold">{liveState.totalStages}</span></div>
                  {liveState.elapsed>0 && <div><span className="opacity-40">Duration: </span><span className="font-semibold">{liveState.elapsed}s</span></div>}
                </div>
                <div className="flex flex-wrap gap-1.5 mt-2">
                  {liveState.stages.map(id => {
                    const s = liveState.stageState[id];
                    const c = s==='success'?'#34d399':s==='error'?'#f87171':s==='running'?'#fbbf24':'#4b5563';
                    return (
                      <span key={id} className="rounded px-2 py-0.5 text-xs font-mono"
                            style={{background:`${c}18`, border:`1px solid ${c}40`, color:c}}>
                        {id}
                      </span>
                    );
                  })}
                </div>
              </div>
            )
          }
        </div>
      </div>

      {/* Environment */}
      <div className="card bg-base-200/80 shadow">
        <div className="card-body py-4">
          <h3 className="text-xs font-bold uppercase tracking-widest opacity-40 mb-3">Environment</h3>
          <div className="grid grid-cols-3 gap-3">
            {[
              ['Dashboard URL',    window.location.origin],
              ['SSE Endpoint',     `${window.location.origin}/events`],
              ['UI Version',       'ForgeFlow v2.1'],
              ['Platform',         'Sevaforge NoCaaS'],
              ['Theme',            'Night · Amber+Purple'],
              ['Time',             now.toLocaleString()],
            ].map(([k,v]) => (
              <div key={k}>
                <div className="text-xs uppercase tracking-wider opacity-30 mb-0.5">{k}</div>
                <div className="text-xs font-mono opacity-70 truncate">{v}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function HistoryView({ history, onClear }) {

  return (
    <div className="slide-in space-y-5">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-xl font-bold">◷ Run History</h2>

        </div>
        {history.length > 0 && (
          <button className="btn btn-sm btn-outline btn-error gap-1" onClick={onClear}>✗ Clear</button>
        )}
      </div>

      {history.length === 0 ? (
        <div className="live-hero flex flex-col items-center gap-4 py-16 text-center">
          <SevaForgeLogo size={56} />
          <div>
            <div className="font-bold text-lg mb-1 opacity-60">No pipeline runs yet</div>
            <p className="text-sm opacity-40">Pipeline runs appear here in real-time as you use ForgeFlow.</p>
            <code className="text-xs font-mono text-warning block mt-3">forgeflow run-all --gui ~/your-repo</code>
          </div>
        </div>
      ) : (
        <div className="space-y-2">
          {history.map((r,i) => {
            const ok = r.status === 'success';
            return (
              <div key={i} className="card shadow"
                   style={{background: ok?'rgba(6,50,40,.3)':'rgba(60,10,10,.3)',
                           border: ok?'1px solid rgba(52,211,153,.2)':'1px solid rgba(239,68,68,.2)'}}>
                <div className="card-body py-3 px-5 flex-row items-center gap-4">
                  <span className="text-xl flex-shrink-0" style={{color:ok?'#34d399':'#f87171'}}>{ok?'✓':'✗'}</span>
                  <div className="flex-1 min-w-0">
                    <div className="font-mono text-sm truncate opacity-80">{r.path || 'unknown path'}</div>
                    <div className="text-xs opacity-40 mt-0.5">
                      {r.stageCount||0} stages completed · {timeSince(r.ts)}
                      {r.elapsed ? ` · ${r.elapsed}s` : ''}

                  </div>
                  <div className="text-right flex-shrink-0">
                    <div className="text-sm font-semibold" style={{color:ok?'#6ee7b7':'#fca5a5'}}>
                      {ok ? 'Passed' : 'Failed'}

                    {r.failedStage && <div className="text-xs opacity-40">failed at {r.failedStage}</div>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Sand Pendulum (Harmonograph) ──────────────────────────────────────────────
// Draws a unique Lissajous/sand pendulum figure for each pipeline stage.
// The canvas renders sand-grain particles along the harmonograph trajectory,
// creating the organic look of a real sand pendulum art piece.

// ── Hourglass (canvas) — animates while a stage is running ───────────────────

function HourGlass({ status = 'running', size = 160 }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    const cv = canvasRef.current;
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    const cx = W / 2, cy = H / 2;

    // Geometry
    const TW = W * 0.38;   // chamber half-width (top & bottom)
    const TH = H * 0.39;   // chamber half-height
    const NK = 2.8;         // neck half-width in px

    const outlinePath = () => {
      ctx.beginPath();
      ctx.moveTo(cx - TW, cy - TH);
      ctx.lineTo(cx + TW, cy - TH);
      ctx.lineTo(cx + NK,  cy);
      ctx.lineTo(cx + TW, cy + TH);
      ctx.lineTo(cx - TW, cy + TH);
      ctx.lineTo(cx - NK,  cy);
      ctx.closePath();
    };
    const topClip = () => {
      ctx.beginPath();
      ctx.moveTo(cx - TW, cy - TH);
      ctx.lineTo(cx + TW, cy - TH);
      ctx.lineTo(cx + NK,  cy);
      ctx.lineTo(cx - NK,  cy);
      ctx.closePath();
    };
    const botClip = () => {
      ctx.beginPath();
      ctx.moveTo(cx - NK,  cy);
      ctx.lineTo(cx + NK,  cy);
      ctx.lineTo(cx + TW, cy + TH);
      ctx.lineTo(cx - TW, cy + TH);
      ctx.closePath();
    };

    let level = 0;          // 0 = top full, 1 = top empty
    let grains = [];        // falling particles
    let alive = true;
    let rafId;
    let last = null;
    const CYCLE = 5500;     // ms for one full drain

    const frame = (ts) => {
      if (!alive) return;
      if (last === null) last = ts;
      const dt = Math.min(ts - last, 50);
      last = ts;

      level += dt / CYCLE;
      if (level > 1) level = 0;   // flip and restart

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0b0b16';
      ctx.fillRect(0, 0, W, H);

      // ── Outline ──
      const og = ctx.createLinearGradient(cx, cy - TH, cx, cy + TH);
      og.addColorStop(0,   'rgba(245,158,11,.75)');
      og.addColorStop(0.5, 'rgba(124, 58,237,.55)');
      og.addColorStop(1,   'rgba(245,158,11,.75)');
      ctx.save();
      outlinePath();
      ctx.strokeStyle = og;
      ctx.lineWidth = 1.8;
      ctx.stroke();
      ctx.restore();

      // ── Top sand (drains down) ──
      const topSandH   = TH * (1 - level);
      const topSandY   = cy - topSandH;
      const topSandSpan = NK + (TW - NK) * topSandH / TH;

      ctx.save();
      topClip(); ctx.clip();
      const tg = ctx.createLinearGradient(0, topSandY, 0, cy);
      tg.addColorStop(0, 'rgba(245,158,11,.12)');
      tg.addColorStop(1, 'rgba(245,158,11,.42)');
      ctx.beginPath();
      ctx.moveTo(cx - topSandSpan, topSandY);
      ctx.lineTo(cx + topSandSpan, topSandY);
      ctx.lineTo(cx + NK, cy); ctx.lineTo(cx - NK, cy);
      ctx.closePath(); ctx.fillStyle = tg; ctx.fill();
      // surface glint
      ctx.beginPath();
      ctx.moveTo(cx - topSandSpan, topSandY);
      ctx.lineTo(cx + topSandSpan, topSandY);
      ctx.strokeStyle = 'rgba(251,191,36,.7)'; ctx.lineWidth = 1.3; ctx.stroke();
      ctx.restore();

      // ── Bottom sand (fills up) ──
      const botSandH    = TH * level;
      const botSandY    = cy + TH - botSandH;
      const botSandSpan = NK + (TW - NK) * botSandH / TH;

      ctx.save();
      botClip(); ctx.clip();
      const bg2 = ctx.createLinearGradient(0, botSandY, 0, cy + TH);
      bg2.addColorStop(0, 'rgba(245,158,11,.20)');
      bg2.addColorStop(1, 'rgba(245,158,11,.52)');
      ctx.beginPath();
      ctx.moveTo(cx - botSandSpan, botSandY);
      ctx.lineTo(cx + botSandSpan, botSandY);
      ctx.lineTo(cx + TW, cy + TH); ctx.lineTo(cx - TW, cy + TH);
      ctx.closePath(); ctx.fillStyle = bg2; ctx.fill();
      // surface glint
      ctx.beginPath();
      ctx.moveTo(cx - botSandSpan, botSandY);
      ctx.lineTo(cx + botSandSpan, botSandY);
      ctx.strokeStyle = 'rgba(251,191,36,.55)'; ctx.lineWidth = 1.1; ctx.stroke();
      ctx.restore();

      // ── Falling grains through neck ──
      if (status === 'running') {
        if (Math.random() < 0.35) {
          grains.push({ x: cx + (Math.random()-.5)*3, y: cy + 1,
                        vy: 1.2 + Math.random()*2,
                        r: 0.7 + Math.random()*.9,
                        a: 0.6 + Math.random()*.4 });
        }
        grains = grains.filter(g => {
          g.y += g.vy; g.vy += 0.18;
          if (g.y > botSandY) return false;
          ctx.beginPath();
          ctx.arc(g.x, g.y, g.r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(251,191,36,${g.a})`;
          ctx.fill();
          return true;
        });
      }

      rafId = requestAnimationFrame(frame);
    };

    rafId = requestAnimationFrame(frame);
    return () => { alive = false; cancelAnimationFrame(rafId); };
  }, [status]);

  const glow = status === 'error' ? 'rgba(239,68,68,.35)' : 'rgba(245,158,11,.35)';

  return (
    <div className="pendulum-wrap" style={{ width: size, height: size,
         boxShadow: `0 0 20px ${glow}, 0 0 40px ${glow.replace('.35','.12')}` }}>
      <canvas ref={canvasRef} width={size} height={size} />
    </div>
  );
}


// ── Live View (SSE real-time pipeline progress) ────────────────────────────────

// Activity ticker — cycles through stage steps while the stage runs
function ActivityTicker({ stageId, running }) {
  const staticInfo = STAGE_INFO_FULL.find(s => s.id === stageId) || {};
  const steps = staticInfo.steps || ['Working…'];
  const [stepIdx, setStepIdx] = useState(0);
  const [visible, setVisible] = useState(true);

  useEffect(() => {
    if (!running) return;
    setStepIdx(0); setVisible(true);
    // Advance one step every ~4 seconds with a brief fade between
    const iv = setInterval(() => {
      setVisible(false);
      setTimeout(() => {
        setStepIdx(i => (i + 1) % steps.length);
        setVisible(true);
      }, 350);
    }, 4000);
    return () => clearInterval(iv);
  }, [stageId, running]);

  return (
    <div className="mt-3 rounded-lg px-3 py-2.5"
         style={{background:'rgba(245,158,11,.06)', border:'1px solid rgba(245,158,11,.15)'}}>
      <div className="text-xs font-bold uppercase tracking-widest opacity-40 mb-1.5">⚡ Activity</div>
      <div style={{
             opacity: visible ? 1 : 0,
             transition: 'opacity 0.35s ease',
             minHeight: '1.4rem',
           }}
           className="text-sm font-mono text-warning/80 leading-snug">
        {steps[stepIdx]}
      </div>
      {/* Step progress dots */}
      <div className="flex gap-1 mt-2">
        {steps.map((_, i) => (
          <span key={i} style={{
            width: 5, height: 5, borderRadius: '50%', display:'inline-block',
            background: i === stepIdx ? '#f59e0b' : 'rgba(245,158,11,.2)',
            transition: 'background 0.3s',
          }} />
        ))}
      </div>
    </div>
  );
}

// ── Launch Panel ─────────────────────────────────────────────────────────────
function LaunchPanel() {
  const [path, setPath]       = useState('');
  const [status, setStatus]   = useState('idle'); // idle | launching | error | ok
  const [errMsg, setErrMsg]   = useState('');

  const launch = async () => {
    const trimmed = path.trim();
    if (!trimmed) { setErrMsg('Please enter the path to your project.'); setStatus('error'); return; }
    setStatus('launching');
    setErrMsg('');
    try {
      const res = await fetch('/api/run', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ path: trimmed }),
      });
      const data = await res.json();
      if (!res.ok) { setErrMsg(data.error || `Server error ${res.status}`); setStatus('error'); return; }
      setStatus('ok');
    } catch (e) {
      setErrMsg(`Could not reach the dashboard server: ${e.message}`);
      setStatus('error');
    }
  };

  const handleKey = (e) => { if (e.key === 'Enter') launch(); };

  return (
    <div style={{
      background: 'rgba(0,0,0,.45)',
      border: '1.5px solid rgba(245,158,11,.35)',
      borderRadius: 16,
      padding: '1.4rem 1.8rem',
      maxWidth: 560,
      width: '100%',
      boxShadow: '0 0 40px rgba(245,158,11,.07)',
    }}>
      <div style={{color:'rgba(226,232,240,.4)', fontSize:'0.7rem', fontWeight:700,
                   letterSpacing:'0.1em', marginBottom:'0.9rem', textAlign:'center'}}>
        🚀 LAUNCH YOUR PIPELINE
      </div>

      {/* Path input */}
      <div style={{display:'flex', gap:'8px', alignItems:'center', marginBottom:'0.75rem'}}>
        <input
          type="text"
          value={path}
          onChange={e => { setPath(e.target.value); setStatus('idle'); }}
          onKeyDown={handleKey}
          placeholder="~/your-ai-project  or  /full/path/to/repo"
          style={{
            flex: 1,
            background: 'rgba(255,255,255,.07)',
            border: `1px solid ${status==='error' ? 'rgba(239,68,68,.6)' : 'rgba(245,158,11,.3)'}`,
            borderRadius: 10,
            padding: '0.55rem 0.9rem',
            color: '#e2e8f0',
            fontFamily: 'monospace',
            fontSize: '0.88rem',
            outline: 'none',
          }}
        />
        <button
          onClick={launch}
          disabled={status === 'launching' || status === 'ok'}
          style={{
            padding: '0.55rem 1.2rem',
            borderRadius: 10,
            fontWeight: 800,
            fontSize: '0.88rem',
            border: 'none',
            cursor: status === 'launching' || status === 'ok' ? 'not-allowed' : 'pointer',
            background: status === 'ok'
              ? 'rgba(52,211,153,.25)'
              : status === 'launching'
                ? 'rgba(245,158,11,.25)'
                : 'linear-gradient(135deg, #f59e0b, #d97706)',
            color: status === 'ok' ? '#6ee7b7' : status === 'launching' ? '#fbbf24' : '#0d0d14',
            whiteSpace: 'nowrap',
            transition: 'all 0.2s',
          }}>
          {status === 'launching' ? '⟳ Starting…'
           : status === 'ok'      ? '✓ Launched!'
           : '▶ Run Pipeline'}
        </button>
      </div>

      {/* Feedback */}
      {status === 'error' && (
        <div style={{color:'#f87171', fontSize:'0.78rem', marginTop:'0.4rem'}}>
          ⚠ {errMsg}
        </div>
      )}
      {status === 'ok' && (
        <div style={{color:'#6ee7b7', fontSize:'0.78rem', marginTop:'0.4rem', textAlign:'center'}}>
          Pipeline is starting — switching to Live view automatically…
        </div>
      )}
      {status === 'idle' && (
        <div style={{color:'rgba(226,232,240,.3)', fontSize:'0.72rem', textAlign:'center'}}>
          Paste your project path above and press Enter or click Run Pipeline
        </div>
      )}
    </div>
  );
}

          </div>
          {/* Scrollable node row */}
          <div style={{display:'flex', alignItems:'center', gap:0, minWidth:'max-content', paddingBottom:4}}>
            {stages.map((id, i) => {
              const ns    = nodeStyle(id);
              const nstat = nodeStatus(id);
              const meta  = STAGE_INFO_FULL.find(s => s.id === id) || {};
              return (
                <React.Fragment key={id}>
                  {/* Node */}
                  <div style={{
                    width: 120, flexShrink:0,
                    background: ns.bg,
                    border: ns.border,
                    borderRadius: 10,
                    padding: '10px 10px 8px',
                    boxShadow: ns.glow,
                    transition: 'all 0.3s ease',
                    position:'relative',
                  }}>
                    {/* Running pulse ring */}
                    {id === currentStage && (
                      <div style={{
                        position:'absolute', inset:-3, borderRadius:13,
                        border:'2px solid rgba(245,158,11,.4)',
                        animation:'pulse 1.4s ease-in-out infinite',
                        pointerEvents:'none',
                      }} />
                    )}
                    <div style={{fontSize:'1.3rem', marginBottom:4, lineHeight:1}}>{meta.emoji || '▸'}</div>
                    <div style={{fontSize:'0.72rem', fontWeight:700, color:ns.color,
                                 whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis',
                                 marginBottom:6}}>
                      {meta.label || id}
                    </div>
                    {/* Status pill */}
                    <div style={{display:'flex', alignItems:'center', gap:4}}>
                      <span style={{
                        width:6, height:6, borderRadius:'50%', flexShrink:0,
                        background: nstat.dot,
                        ...(nstat.spin ? {animation:'pulse 1s ease-in-out infinite'} : {}),
                      }} />
                      <span style={{fontSize:'0.62rem', fontWeight:600, color: nstat.dot, opacity:0.9}}>
                        {nstat.text}
                      </span>
                    </div>
                    {/* Stage number */}
                    <div style={{position:'absolute', top:5, right:7, fontSize:'0.58rem',
                                 color:'rgba(226,232,240,.2)', fontWeight:600}}>
                      {i + 1}
                    </div>
                  </div>
                  {/* Arrow connector */}
                  {i < stages.length - 1 && (
                    <div style={{display:'flex', alignItems:'center', flexShrink:0, width:28}}>
                      <svg width="28" height="12" viewBox="0 0 28 12">
                        <line x1="0" y1="6" x2="20" y2="6"
                              stroke={stageState[id]==='success' ? 'rgba(52,211,153,.5)' : 'rgba(255,255,255,.1)'}
                              strokeWidth="1.5" />
                        <polyline points="17,2 24,6 17,10"
                              stroke={stageState[id]==='success' ? 'rgba(52,211,153,.5)' : 'rgba(255,255,255,.1)'}
                              strokeWidth="1.5" fill="none" />
                      </svg>
                    </div>
                  )}
                </React.Fragment>
              );
            })}
          </div>
        </div>
      )}

      {/* ══ ACTIVE STAGE DETAIL ═══════════════════════════════════════════ */}
      {currentStage && (
        <div style={{
          display:'grid', gridTemplateColumns:'164px 1fr', gap:'1rem',
        }}>
          {/* Hourglass */}
          <div style={{display:'flex', flexDirection:'column', alignItems:'center', gap:8}}>
            <HourGlass status="running" size={160} />
            <div style={{fontSize:'0.65rem', color:'rgba(226,232,240,.3)', textAlign:'center', fontFamily:'monospace'}}>
              stage {currentNum}/{totalStages}
            </div>
          </div>

          {/* Stage info panel */}
          <div style={{
            background:'rgba(255,255,255,.03)',
            border:'1px solid rgba(245,158,11,.2)',
            borderRadius:12, padding:'1rem 1.2rem',
            display:'flex', flexDirection:'column', gap:'0.75rem',
          }}>
            {/* Stage name */}
            <div style={{display:'flex', alignItems:'center', gap:10}}>
              <span style={{fontSize:'2rem'}}>{stageEmoji(currentStage)}</span>
              <div>
                <div style={{fontWeight:800, fontSize:'1.1rem', color:'#fbbf24',
                             letterSpacing:'-0.3px', display:'flex', alignItems:'center', gap:8}}>
                  <span className="spin" style={{fontSize:'0.9rem'}}>⟳</span>
                  {stageLabel(currentStage)}
                </div>
                <div style={{fontSize:'0.68rem', color:'rgba(226,232,240,.3)', fontFamily:'monospace', marginTop:1}}>
                  {activeInfo.agent}{activeInfo.mcp_server ? ` · ${activeInfo.mcp_server}` : ''}
                </div>
              </div>
            </div>

            {/* Consumer description */}
            {activeInfo.consumer && (
              <div style={{
                background:'rgba(124,58,237,.07)',
                border:'1px solid rgba(124,58,237,.2)',
                borderRadius:8, padding:'0.65rem 0.85rem',
              }}>
                <div style={{fontSize:'0.63rem', fontWeight:700, letterSpacing:'0.09em',
                             color:'#c084fc', opacity:0.65, marginBottom:5, textTransform:'uppercase'}}>
                  What's happening
                </div>
                <div style={{fontSize:'0.82rem', lineHeight:1.55, color:'rgba(226,232,240,.75)'}}>
                  {activeInfo.consumer}
                </div>
              </div>
            )}

            {/* Outputs + Activity ticker */}
            {activeInfo.outputs && (
              <div style={{fontSize:'0.7rem', color:'rgba(226,232,240,.3)', fontFamily:'monospace'}}>
                📦 {activeInfo.outputs}
              </div>
            )}
            <ActivityTicker stageId={currentStage} running={true} />
          </div>
        </div>
      )}

      {/* ══ COMPLETED STAGE RESULTS LIST ══════════════════════════════════ */}
      {Object.entries(stageResults).length > 0 && (
        <div style={{
          background:'rgba(8,8,16,.6)',
          border:'1px solid rgba(255,255,255,.07)',
          borderRadius:14, padding:'1rem 1.2rem',
        }}>
          <div style={{fontSize:'0.65rem', fontWeight:700, letterSpacing:'0.1em',
                       color:'rgba(226,232,240,.25)', marginBottom:'0.75rem', textTransform:'uppercase'}}>
            Stage Results
          </div>
          <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'6px'}}>
            {Object.entries(stageResults).map(([id, result]) => {
              const ok   = result.status === 'success';
              const meta = STAGE_INFO_FULL.find(s=>s.id===id) || {};
              return (
                <div key={id} style={{
                  display:'flex', alignItems:'center', gap:8,
                  padding:'7px 10px', borderRadius:8,
                  background: ok ? 'rgba(6,40,30,.5)' : 'rgba(50,8,8,.5)',
                  border: ok ? '1px solid rgba(52,211,153,.2)' : '1px solid rgba(239,68,68,.2)',
                }}>
                  <span style={{fontSize:'0.85rem', flexShrink:0}}>{meta.emoji || (ok?'✓':'✗')}</span>
                  <div style={{minWidth:0, flex:1}}>
                    <div style={{fontSize:'0.75rem', fontWeight:700,
                                 color: ok ? '#6ee7b7' : '#fca5a5'}}>
                      {meta.label || id}
                    </div>
                    {result.summary && (
                      <div style={{fontSize:'0.65rem', color:'rgba(226,232,240,.35)',
                                   overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap'}}>
                        {result.summary.slice(0,60)}
                      </div>
                    )}
                  </div>
                  <span style={{flexShrink:0, fontSize:'0.62rem', fontWeight:700,
                                color: ok ? '#34d399' : '#f87171', opacity:0.8}}>
                    {ok ? '✓' : '✗'}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Victory / Done screen ── */}
      {allFinished && !hasFailed && (
        <div className="victory-glow rounded-2xl overflow-hidden"
             style={{
               background: 'linear-gradient(160deg, rgba(6,40,32,.9) 0%, rgba(2,20,20,.95) 100%)',
               border: '1.5px solid rgba(52,211,153,.35)',
             }}>

          {/* Celebration header */}
          <div className="flex items-center gap-5 px-6 py-5"
               style={{borderBottom:'1px solid rgba(52,211,153,.12)'}}>
            <div className="float-slow">
              <SevaForgeLogo size={64} animate={false} />
            </div>
            <div className="flex-1 min-w-0">
              <div style={{fontSize:'1.75rem', fontWeight:900, lineHeight:1.1,
                           letterSpacing:'-1px', color:'#6ee7b7', marginBottom:'0.4rem'}}>
                🎉 Your AI app is cloud-ready!
              </div>
              <div style={{fontSize:'1rem', color:'rgba(110,231,183,.65)', fontWeight:500}}>
                Sevaforge ran all {totalStages} stages in <strong style={{color:'#34d399'}}>{elapsed}s</strong> — everything is generated and committed.
              </div>
            </div>
            <div className="flex-shrink-0 text-right">
              <NoCaaSBadge />
            </div>
          </div>

          {/* What was built — summary cards */}
          <div className="px-6 py-4">
            <div className="text-xs font-bold uppercase tracking-widest mb-3"
                 style={{color:'rgba(52,211,153,.5)'}}>What Sevaforge built for you</div>
            <div className="grid grid-cols-2 gap-3">
              {[
                { emoji:'🏗️', title:'Cloud Infrastructure',    detail:'Terraform modules · VPC · Kubernetes cluster · Docker images' },
                { emoji:'🚀', title:'Deployment Pipelines',    detail:'ArgoCD + Kustomize · dev / staging / prod overlays · auto-rollback' },
                { emoji:'⚙️', title:'CI/CD Workflows',         detail:'GitHub Actions · security gate → tests → container build → release' },
                { emoji:'📚', title:'Full Documentation',      detail:'Architecture diagram · Threat model · API reference · ERD' },
                { emoji:'🧪', title:'Test Suites',             detail:'Playwright E2E specs · unit test runner · coverage report' },
                { emoji:'🔒', title:'Security Report',         detail:'SAST scan · CVE list · secrets detection · severity classification' },
                { emoji:'🌉', title:'GitHub Push',             detail:'All files committed · PR created · team can review immediately' },
                { emoji:'📋', title:'Runbooks & SLOs',         detail:'Prometheus alerts · Grafana dashboards · burn-rate rules · runbook links' },
              ].map(({emoji, title, detail}) => (
                <div key={title} className="count-badge rounded-xl px-4 py-3 flex gap-3 items-start"
                     style={{background:'rgba(52,211,153,.06)', border:'1px solid rgba(52,211,153,.15)'}}>
                  <span style={{fontSize:'1.4rem', flexShrink:0}}>{emoji}</span>
                  <div className="min-w-0">
                    <div className="font-bold text-sm mb-0.5" style={{color:'#6ee7b7'}}>{title}</div>
                    <div className="text-xs leading-relaxed" style={{color:'rgba(110,231,183,.5)'}}>{detail}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* Next steps */}
          <div className="px-6 pb-5">
            <div className="rounded-xl px-4 py-4"
                 style={{background:'rgba(0,0,0,.25)', border:'1px solid rgba(52,211,153,.12)'}}>
              <div className="text-xs font-bold uppercase tracking-widest mb-3"
                   style={{color:'rgba(52,211,153,.5)'}}>⚡ What to do next</div>
              <div className="grid grid-cols-3 gap-3">
                {[
                  { step:'1', label:'Review the PR',        cmd:'gh pr view --web',                       color:'#818cf8' },
                  { step:'2', label:'Merge and deploy',     cmd:'git merge main && forgeflow deploy',      color:'#f59e0b' },
                  { step:'3', label:'Set up monitoring',    cmd:'forgeflow monitor --path ./staging',      color:'#34d399' },
                ].map(({step,label,cmd,color}) => (
                  <div key={step} className="rounded-lg px-3 py-2.5"
                       style={{background:`${color}10`, border:`1px solid ${color}25`}}>
                    <div className="text-xs font-bold mb-1" style={{color, opacity:.7}}>Step {step} — {label}</div>
                    <code className="text-xs font-mono" style={{color}}>{cmd}</code>
                  </div>
                ))}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ── Failed banner ── */}
      {allFinished && hasFailed && (
        <div className="rounded-2xl px-6 py-5 flex items-center gap-4"
             style={{background:'rgba(60,10,10,.6)', border:'1.5px solid rgba(239,68,68,.3)'}}>
          <span style={{fontSize:'2.5rem'}}>⚠️</span>
          <div className="flex-1">
            <div className="font-bold text-xl mb-1" style={{color:'#f87171'}}>Pipeline hit an issue</div>
            <div className="text-sm mb-2" style={{color:'rgba(252,165,165,.6)'}}>
              One or more stages encountered errors — check the stage results above for details. Most issues are fixable in one command.
            </div>
            <NoCaaSBadge />
          </div>
        </div>
      )}
    </div>
  );
}


// ── App Shell ─────────────────────────────────────────────────────────────────

function App() {
  const [view,         setView]         = useState('dashboard');
  const [connected,    setConnected]    = useState(null);
  const [history,      setHistory]      = useState([]);
  const [toasts,       setToasts]       = useState([]);

  // Live pipeline state (fed by SSE events from /events)
  const [liveState, setLiveState] = useState({
    connected:    false,
    pipelinePath: '',
    stages:       [],
    stageState:   {},   // { [stageId]: 'pending'|'running'|'success'|'error' }
    stageInfo:    {},   // { [stageId]: { purpose, outputs, agent, mcp_server } }
    stageResults: {},   // { [stageId]: resultObject }
    currentStage: null,
    currentNum:   0,
    totalStages:  0,
    done:         false,
    elapsed:      0,
  });

  const addToast = useCallback((msg, type = 'info') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  }, []);

  // Derive connection status from SSE (no REST polling — dashboard_server has no REST API)
  useEffect(() => {
    setConnected(liveState.connected ? true : null);
  }, [liveState.connected]);

  // ── SSE connection — live pipeline events from dashboard_server.py ──────────
  useEffect(() => {
    const es = new EventSource('/events');

    es.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      const { type } = msg;

      if (type === 'connected') {
        setLiveState(s => ({ ...s, connected: true }));

      } else if (type === 'pipeline_start') {
        const initState = {};
        (msg.stages || []).forEach(id => { initState[id] = 'pending'; });
        setLiveState({
          connected:    true,
          pipelinePath: msg.path || '',
          stages:       msg.stages || [],
          stageState:   initState,
          stageInfo:    {},
          stageResults: {},
          currentStage: null,
          currentNum:   0,
          totalStages:  msg.total || 0,
          done:         false,
          elapsed:      0,
        });
        setView('live'); // auto-switch the moment a pipeline starts

      } else if (type === 'stage_start') {
        setLiveState(s => ({
          ...s,
          currentStage: msg.stage,
          currentNum:   msg.num || s.currentNum,
          stageState:   { ...s.stageState, [msg.stage]: 'running' },
          stageInfo:    { ...s.stageInfo,  [msg.stage]: msg.info  || {} },
        }));

      } else if (type === 'stage_result') {
        const ok = (msg.result || {}).status === 'success';
        setLiveState(s => ({
          ...s,
          currentStage: s.currentStage === msg.stage ? null : s.currentStage,
          stageState:   { ...s.stageState,   [msg.stage]: ok ? 'success' : 'error' },
          stageResults: { ...s.stageResults, [msg.stage]: msg.result || {} },
        }));

      } else if (type === 'pipeline_done') {
        setLiveState(s => {
          // push history entry from SSE data + current live state
          const failedStage = Object.entries(s.stageState)
            .find(([, v]) => v === 'error')?.[0] || null;
          const entry = {
            path:       msg.path || s.pipelinePath || '—',
            status:     msg.success ? 'success' : 'error',
            stageCount: s.stages.length || msg.stage_count || 0,
            elapsed:    msg.elapsed_s || 0,
            failedStage,
            ts:         Date.now(),
          };
          setHistory(prev => [entry, ...prev.slice(0, 99)]);
          return { ...s, done: true, currentStage: null, elapsed: msg.elapsed_s || 0 };
        });
        addToast(
          msg.success
            ? `Pipeline complete in ${msg.elapsed_s}s 🎉`
            : 'Pipeline failed ❌',
          msg.success ? 'success' : 'error'
        );
      }
    };

    es.onerror = () => setLiveState(s => ({ ...s, connected: false }));
    return () => es.close();
  }, []); // single mount — SSE connection lives for the page lifetime

  return (
    <div className="flex h-screen overflow-hidden bg-base-300">

      {/* ── Sidebar ── */}
      <aside className="sidebar bg-base-200 border-r border-base-300 flex flex-col">
        {/* ── Sevaforge brand block ── */}
        <div className="px-4 py-4 border-b border-base-300"
             style={{background:'linear-gradient(160deg,rgba(124,58,237,.08),rgba(245,158,11,.05))'}}>
          <div className="flex items-center gap-3 mb-3">
            <SevaForgeLogo size={40} animate={false} />
            <div>
              <div className="seva-wordmark leading-tight">Sevaforge</div>
              <div className="text-xs font-mono opacity-35 mt-0.5">ForgeFlow v2.1</div>
            </div>
          </div>
          <NoCaaSBadge />
        </div>

        {/* Nav */}
        <nav className="flex-1 p-3 flex flex-col gap-0.5">
          {VIEWS.map(v => (
            <button
              key={v.id}
              onClick={() => setView(v.id)}
              className={`btn btn-sm justify-start gap-3 font-normal ${view === v.id ? 'btn-primary' : 'btn-ghost opacity-70'}`}
            >
              <span className="text-base w-5 text-center">{v.icon}</span>
              {v.label}
            </button>
          ))}
        </nav>

        {/* Connection status */}
        <div className="p-3 border-t border-base-300">
          <div className="flex items-center gap-2 px-2 py-1.5">
            <span className={`w-2 h-2 rounded-full ${connected===true?'bg-success animate-pulse':connected===false?'bg-error':'bg-base-content/20'}`} />
            <span className="text-xs opacity-60 flex-1">
              {connected===true ? 'Connected' : connected===false ? 'Offline' : 'Connecting…'}
            </span>
            {liveState.done && <span className="badge badge-xs badge-outline">DONE</span>}
          </div>
        </div>
      </aside>

      {/* ── Main ── */}
      <div className="main-content flex flex-col overflow-hidden">
        {/* Topbar */}
        <header className="bg-base-200 border-b border-base-300 h-13 flex items-center px-6 gap-3 min-h-[52px]">
          <span className="text-base font-semibold flex-1">{VIEWS.find(v=>v.id===view)?.label}</span>
          {liveState.connected
            ? <span className="badge badge-success badge-sm gap-1"><span className="w-1.5 h-1.5 rounded-full bg-current" />Live</span>
            : <span className="badge badge-ghost badge-sm"><Spinner /> Connecting…</span>
          }
          <span className="font-mono text-xs opacity-30 hidden md:block">{window.location.host}</span>
          <button className="btn btn-xs btn-ghost opacity-50" onClick={() => setView('settings')}>⚙</button>
        </header>

        {/* Content */}
        <main className="flex-1 overflow-y-auto p-6">
          {view === 'live'      && <LiveView      liveState={liveState} />}
          {view === 'dashboard' && <DashboardView history={history} onNavigate={setView} />}
          {view === 'pipeline'  && <PipelineView />}
          {view === 'health'    && <HealthView    sseConnected={liveState.connected} liveState={liveState} />}
          {view === 'history'   && <HistoryView   history={history} onClear={() => setHistory([])} />}
          {view === 'settings'  && <SettingsView />}
        </main>
      </div>

      <ToastStack toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
