# ForgeFlow Configuration - HYBRID MODE
# Mix of local MCPs and cloud/external integrations

mode: hybrid

# Pipeline configuration
pipeline:
  sequence:
    - discover
    - normalize
    - docs
    - generate
    - review
    - test
    - scan
  post_merge:
    - deploy
    - monitor
  approval_gates:
    - bridge

# Hybrid mode configuration
hybrid:
  # MCPs that run locally (core functionality)
  local_mcps:
    discovery-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/discovery_mcp/server.py"]
    normalize-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/normalize_mcp/server.py"]
    deployment-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/deployment_mcp/server.py"]
    diagram-generator-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/diagram_generator_mcp/server.py"]
    git-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/git_mcp/server.py"]

  # MCPs that use public/external services
  public_mcps:
    github-mcp-server:
      type: public
      command: "npx"
      args: ["-y", "@modelcontextprotocol/server-github"]
      fallback:
        type: local
        command: "python3"
        args: ["mcp_servers/github_mcp/server.py"]

    security-mcp-server:
      type: public
      integrations:
        snyk:
          enabled: false
          api_key_env: "SNYK_API_KEY"
          endpoint: "https://snyk.io/api/v1"
        trivy:
          enabled: false
          command: "trivy"
          args: ["fs", "--format", "json"]
        sonarqube:
          enabled: false
          endpoint_env: "SONARQUBE_URL"
          token_env: "SONARQUBE_TOKEN"
      fallback:
        type: local
        command: "python3"
        args: ["mcp_servers/security_mcp/server.py"]

    cicd-mcp-server:
      type: public
      integrations:
        github_actions:
          enabled: true
          api_endpoint: "https://api.github.com"
      fallback:
        type: local
        command: "python3"
        args: ["mcp_servers/cicd_mcp/server.py"]

    cloud-mcp-server:
      type: public
      integrations:
        aws:
          enabled: false
          region_env: "AWS_REGION"
          profile_env: "AWS_PROFILE"
        gcp:
          enabled: false
          project_env: "GCP_PROJECT"
          credentials_env: "GOOGLE_APPLICATION_CREDENTIALS"
        azure:
          enabled: false
          subscription_env: "AZURE_SUBSCRIPTION_ID"
      fallback:
        type: local
        command: "python3"
        args: ["mcp_servers/cloud_mcp/server.py"]

    observability-mcp-server:
      type: public
      integrations:
        prometheus:
          enabled: false
          endpoint_env: "PROMETHEUS_URL"
        grafana:
          enabled: false
          endpoint_env: "GRAFANA_URL"
          api_key_env: "GRAFANA_API_KEY"
        datadog:
          enabled: false
          api_key_env: "DD_API_KEY"
      fallback:
        type: local
        command: "python3"
        args: ["mcp_servers/observability_mcp/server.py"]

# Feature flags
features:
  rich_display: true
  auto_save_reports: true
  telemetry: false
  parallel_execution: false

# Default parameters
defaults:
  security:
    severity_threshold: medium
  generation:
    stack: auto
    cloud_provider: aws
  deployment:
    target: staging
  bridge:
    default_branch: main
    auto_create_repo: true
