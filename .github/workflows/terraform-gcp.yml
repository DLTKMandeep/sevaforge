name: Terraform — Provision GCP Infrastructure

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy from"
        required: true
        default: "gui-polish"
      action:
        required: true
        default: plan
        type: choice
        options: [plan, apply, destroy]

env:
  TF_WORKING_DIR: forgeflow/infrastructure/gcp

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }} (GCP)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Confirm branch and directory
        run: |
          echo "Branch → $(git branch --show-current)"
          echo "Commit → $(git rev-parse --short HEAD)"
          ls ${{ env.TF_WORKING_DIR }}/

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Verify GCP auth
        run: |
          gcloud auth list
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}
          gcloud projects describe ${{ secrets.GCP_PROJECT_ID }} --format="value(projectId)"

      - name: Enable required GCP APIs
        if: github.event.inputs.action == 'apply'
        run: |
          gcloud services enable container.googleapis.com --project=${{ secrets.GCP_PROJECT_ID }}
          gcloud services enable compute.googleapis.com --project=${{ secrets.GCP_PROJECT_ID }}

      - name: Restore Terraform state
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_STATE: ${{ secrets.TF_STATE_GCP }}
        run: |
          if [ -n "${TF_STATE}" ]; then
            printf '%s' "${TF_STATE}" | base64 -d > terraform.tfstate
            echo "✅ State restored ($(wc -c < terraform.tfstate) bytes)"
          else
            echo "No previous state — fresh run"
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ secrets.GCP_REGION }}
        run: |
          terraform plan -out=tfplan -input=false
          terraform show -no-color tfplan

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ secrets.GCP_REGION }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Save Terraform state
        if: always() && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy')
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          STATE_FILE="terraform.tfstate"
          [ ! -f "$STATE_FILE" ] && STATE_FILE="errored.tfstate"
          if [ -f "$STATE_FILE" ]; then
            gh secret set TF_STATE_GCP --repo "${{ github.repository }}" --body "$(base64 -w0 $STATE_FILE)"
            echo "✅ State saved ($(wc -c < $STATE_FILE) bytes)"
          fi

      - name: Save cluster outputs + kubeconfig
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          CLUSTER_NAME=$(terraform output -raw cluster_name)
          REGION=$(terraform output -raw region)
          PROJECT=$(terraform output -raw project_id)

          echo "✅ Cluster: $CLUSTER_NAME in $REGION"

          # Generate kubeconfig
          gcloud container clusters get-credentials "$CLUSTER_NAME" \
            --region "$REGION" \
            --project "$PROJECT"

          gh secret set KUBE_CONFIG \
            --repo "${{ github.repository }}" \
            --body "$(base64 -w0 ~/.kube/config)"
          echo "✅ Kubeconfig saved"

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
          TF_VAR_region: ${{ secrets.GCP_REGION }}
        run: terraform destroy -auto-approve -input=false

      - name: Job summary
        if: always()
        run: |
          echo "## Terraform ${{ github.event.inputs.action }} (GCP)" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: ${{ github.event.inputs.branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Project: ${{ secrets.GCP_PROJECT_ID }}" >> "$GITHUB_STEP_SUMMARY"
