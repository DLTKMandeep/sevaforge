# ForgeFlow Configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: forgeflow-config
  namespace: forgeflow
  labels:
    app: forgeflow
data:
  FORGEFLOW_MODE: "local"
  FORGEFLOW_API_KEY_REQUIRED: "true"
  FORGEFLOW_MAX_REPO_SIZE_MB: "100"
  FORGEFLOW_TASK_TIMEOUT: "300"
  FORGEFLOW_TEMP_DIR: "/tmp/forgeflow"
