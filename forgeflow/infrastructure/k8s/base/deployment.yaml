# Kubernetes Deployment
# Generated by ForgeFlow
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgeflow
  labels:
    app: forgeflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forgeflow
  template:
    metadata:
      labels:
        app: forgeflow
    spec:
      serviceAccountName: forgeflow
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: forgeflow
          image: ghcr.io/your-org/forgeflow:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: forgeflow-config
                  key: ENVIRONMENT
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
