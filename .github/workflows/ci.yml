name: CI — Build & Push to OCIR

on:
  push:
    branches: [main, develop, gui-polish]
  pull_request:
    branches: [main, develop]

env:
  # OCI region key (short form, e.g. "iad" for us-ashburn-1)
  OCIR_REGISTRY: ${{ secrets.OCI_REGION_KEY }}.ocir.io
  IMAGE_NAME: ${{ secrets.OCI_NAMESPACE }}/sevaforge

jobs:
  # ---------------------------------------------------------------------------
  # Lint & test
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint dependencies
        run: |
          pip install flake8 black isort
          pip install -r requirements.txt

      - name: flake8
        run: flake8 agents/ core/ cli/ mcp_servers/ --max-line-length=100

      - name: black
        run: black --check --line-length=100 agents/ core/ cli/

      - name: isort
        run: isort --check-only agents/ core/ cli/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests
        run: pytest tests/ -v --cov=agents --cov=core --cov-report=xml

      - name: Upload coverage
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install tools
        run: pip install bandit safety -r requirements.txt
      - name: bandit
        run: bandit -r agents/ core/ cli/ -ll
      - name: safety
        run: safety check -r requirements.txt || true

  # ---------------------------------------------------------------------------
  # Multi-arch Docker build → push to OCIR
  # Only runs on push to main/develop/gui-polish (not PRs)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & Push (linux/amd64 + linux/arm64)
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push'

    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}

    steps:
      - uses: actions/checkout@v4

      # Set up QEMU for cross-compilation (arm64 on amd64 runner)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Image tag: short SHA
      - name: Derive image tag
        id: meta
        run: |
          SHA="${{ github.sha }}"
          SHORT_SHA="${SHA:0:8}"
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_image=${{ env.OCIR_REGISTRY }}/${{ env.IMAGE_NAME }}" >> "$GITHUB_OUTPUT"

      - name: Log in to OCIR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.OCIR_REGISTRY }}
          # OCIR username format: <namespace>/<oci-username>
          username: ${{ secrets.OCI_NAMESPACE }}/${{ secrets.OCI_USERNAME }}
          # OCI auth token (not your password — generate in OCI Console → Profile → Auth Tokens)
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.full_image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Pushed to OCIR → ${{ steps.meta.outputs.full_image }}:${{ steps.meta.outputs.image_tag }}"
