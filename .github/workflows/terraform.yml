name: Terraform — Provision OCI Infrastructure

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy from"
        required: true
        default: "gui-polish"
      action:
        description: "Terraform action"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_WORKING_DIR: forgeflow/infrastructure/oci
  OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Confirm branch and directory
        run: |
          echo "Branch → $(git branch --show-current)"
          echo "Commit → $(git rev-parse --short HEAD)"
          ls ${{ env.TF_WORKING_DIR }}/

      # ── OCI credentials ───────────────────────────────────────────────────
      - name: Write OCI private key
        run: |
          mkdir -p ~/.oci
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          {
            echo "[DEFAULT]"
            echo "user=${{ secrets.OCI_USER_OCID }}"
            echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}"
            echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}"
            echo "region=${{ secrets.OCI_REGION }}"
            echo "key_file=$HOME/.oci/oci_api_key.pem"
          } > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Verify OCI auth
        run: oci iam region list --output table

      # ── Restore Terraform state ───────────────────────────────────────────
      - name: Restore Terraform state
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_STATE: ${{ secrets.TF_STATE }}
        run: |
          if [ -n "${TF_STATE}" ]; then
            echo "${TF_STATE}" | base64 -d > terraform.tfstate
            echo "✅ State restored ($(wc -c < terraform.tfstate) bytes)"
          else
            echo "No previous state — fresh run"
          fi

      # ── Terraform ─────────────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:     ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:        ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:      ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path: /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:           ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:   ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          terraform plan -out=tfplan -input=false
          terraform show -no-color tfplan

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:     ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:        ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:      ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path: /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:           ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:   ${{ secrets.OCI_TENANCY_OCID }}
        run: terraform apply -auto-approve -input=false tfplan

      # ── Save state immediately after every mutating run ───────────────────
      - name: Save Terraform state
        if: always() && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy')
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          STATE_FILE="terraform.tfstate"
          [ ! -f "$STATE_FILE" ] && STATE_FILE="errored.tfstate"
          if [ -f "$STATE_FILE" ]; then
            gh secret set TF_STATE \
              --repo "${{ github.repository }}" \
              --body "$(base64 -w0 $STATE_FILE)"
            echo "✅ State saved ($(wc -c < $STATE_FILE) bytes)"
          fi

      # ── Save outputs as GitHub secrets ────────────────────────────────────
      - name: Save VM outputs as secrets
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          LB_IP=$(terraform output -raw load_balancer_ip 2>/dev/null || echo "")
          VM_IPS=$(terraform output -json vm_public_ips 2>/dev/null || echo "[]")
          SSH_KEY=$(terraform output -raw ssh_private_key 2>/dev/null || echo "")

          [ -n "$LB_IP" ]  && gh secret set VM_LB_IP      --repo "${{ github.repository }}" --body "$LB_IP"
          [ -n "$VM_IPS" ] && gh secret set VM_PUBLIC_IPS  --repo "${{ github.repository }}" --body "$VM_IPS"
          [ -n "$SSH_KEY" ] && gh secret set VM_SSH_KEY    --repo "${{ github.repository }}" --body "$SSH_KEY"

          echo "✅ Load balancer IP: ${LB_IP}"
          echo "✅ VM IPs: ${VM_IPS}"
          echo "✅ SSH key saved as VM_SSH_KEY secret"

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:     ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:        ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:      ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path: /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:           ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:   ${{ secrets.OCI_TENANCY_OCID }}
        run: terraform destroy -auto-approve -input=false

      - name: Job summary
        if: always()
        run: |
          echo "## Terraform ${{ github.event.inputs.action }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: ${{ github.event.inputs.branch }}" >> "$GITHUB_STEP_SUMMARY"
