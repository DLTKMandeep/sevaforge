# ArgoCD AppProject
# Generated by ForgeFlow
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: forgeflow
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: forgeflow project managed by ForgeFlow
  
  # Allow manifests from any Git repository
  sourceRepos:
    - '*'
  
  # Allow deployment to these namespaces
  destinations:
    - namespace: forgeflow-dev
      server: https://kubernetes.default.svc
    - namespace: forgeflow-staging
      server: https://kubernetes.default.svc
    - namespace: forgeflow-prod
      server: https://kubernetes.default.svc
  
  # Allowed cluster resources
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
  
  # Allowed namespace resources
  namespaceResourceWhitelist:
    - group: ''
      kind: '*'
    - group: apps
      kind: '*'
    - group: networking.k8s.io
      kind: '*'
    - group: autoscaling
      kind: '*'
  
  # Role definitions
  roles:
    - name: admin
      description: Full admin access
      policies:
        - p, proj:forgeflow:admin, applications, *, forgeflow/*, allow
      groups:
        - forgeflow-admins
    
    - name: developer
      description: Developer access (read + sync)
      policies:
        - p, proj:forgeflow:developer, applications, get, forgeflow/*, allow
        - p, proj:forgeflow:developer, applications, sync, forgeflow/*, allow
      groups:
        - forgeflow-developers
