apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "sevaforge-unified.fullname" . }}
  labels:
    app.kubernetes.io/name: sevaforge-unified
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: sevaforge-unified
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sevaforge-unified
    spec:
      containers:
        - name: sevaforge-unified
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
          livenessProbe:
            httpGet:
              path: {{ .Values.healthcheck.path }}
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: {{ .Values.healthcheck.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
