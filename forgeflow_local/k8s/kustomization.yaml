# Kustomize configuration for ForgeFlow
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forgeflow

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml

commonLabels:
  app.kubernetes.io/name: forgeflow
  app.kubernetes.io/version: "0.1.0"
  app.kubernetes.io/managed-by: kustomize

images:
  - name: forgeflow
    newName: forgeflow
    newTag: latest
