version: 1
app:
  name: sevaforge-unified
  language: other
  port: 9001
  healthcheck_path: /health
cloud:
  provider: gcp
  project_id: ''
  region: us-central1
compute:
  model: kubernetes
  flavour: gke-autopilot
  replicas: 2
  autoscale:
    enabled: true
    min: 2
    max: 6
environments:
- name: dev
  auto_promote: true
- name: prod
  auto_promote: false
secrets:
- name: GH_TOKEN
  description: GitHub PAT with 'repo' + 'workflow' scope for CI/CD automation
  source: github-actions
  required_by:
  - ci_cd
  - infra
- name: GCP_SA_KEY
  description: JSON key for the deployer service account (IAM > Service Accounts)
  source: github-actions
  required_by:
  - infra
  - cluster
  - app
- name: GCP_PROJECT_ID
  description: GCP project id, e.g. divine-data-469116-b2
  source: github-actions
  required_by:
  - infra
  - cluster
  - app
- name: GCP_REGION
  description: Primary GCP region, e.g. us-central1
  source: github-actions
  required_by:
  - infra
  - cluster
observability:
  stack: prometheus-grafana
  metrics: true
  logs: true
  traces: false
  slo:
    availability_target: 99.5
    latency_p99_ms: 500
security:
  network_policies: true
  image_scanning: true
  iam_least_privilege: true
  sbom: false
cost_controls:
  budget_usd_monthly: 0.0
  auto_shutdown:
    enabled: true
    schedule_down: 0 4 * * *
    schedule_up: 0 14 * * *
  teardown_date: ''
ci_cd:
  platform: github-actions
  use_argocd: false
  require_approval_for:
  - prod
_meta:
  created_at: '2026-04-16T02:21:19.084267Z'
  created_by: deploy-intent-agent
  last_validated: '2026-04-20T14:46:51.557194Z'
