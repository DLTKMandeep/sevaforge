# ForgeFlow Secrets Template
# Apply with: kubectl apply -f secret.yaml
# NOTE: Replace <base64-encoded-value> with actual base64 encoded values
#       echo -n 'your-value' | base64
apiVersion: v1
kind: Secret
metadata:
  name: forgeflow-secrets
  namespace: forgeflow
  labels:
    app: forgeflow
type: Opaque
data:
  # API Key for authentication (base64 encoded)
  # Generate with: openssl rand -hex 32
  FORGEFLOW_API_KEY: ""  # <base64-encoded-api-key>
  
  # GitHub token for bridge functionality (base64 encoded)
  # Create at: https://github.com/settings/tokens
  GH_TOKEN: ""  # <base64-encoded-github-token>
