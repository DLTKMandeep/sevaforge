<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sevaforge — AIDDaaS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:    #1a2035;
      --navy2:   #232b42;
      --orange:  #f97316;
      --orange2: #ea6c0a;
      --bg:      #f0f2f7;
      --card:    #ffffff;
      --border:  #e5e7eb;
      --text:    #111827;
      --muted:   #6b7280;
      --light:   #9ca3af;
      --ok:      #10b981;
      --ok-bg:   #ecfdf5;
      --ok-br:   #a7f3d0;
      --err:     #ef4444;
      --err-bg:  #fef2f2;
      --err-br:  #fecaca;
      --warn:    #f59e0b;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
           background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }
    #root { height: 100vh; display: flex; }

    /* ── Sidebar ── */
    .sf-sidebar {
      width: 220px; min-width: 220px; background: var(--navy);
      display: flex; flex-direction: column; height: 100vh;
    }
    .sf-logo-block {
      padding: 20px 18px 16px;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .sf-logo-name {
      font-size: 1.1rem; font-weight: 800; color: #fff;
      letter-spacing: -0.3px; line-height: 1.2;
    }
    .sf-logo-tag {
      font-size: 0.62rem; font-weight: 600; color: rgba(255,255,255,.35);
      letter-spacing: 0.04em; margin-top: 2px; text-transform: uppercase;
    }
    .sf-nav { flex: 1; padding: 10px 10px; display: flex; flex-direction: column; gap: 2px; }
    .sf-nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 10px; border-radius: 8px; cursor: pointer;
      font-size: 0.82rem; font-weight: 500; color: rgba(255,255,255,.55);
      transition: all .15s ease; border: none; background: transparent; width: 100%; text-align: left;
    }
    .sf-nav-item:hover  { background: rgba(255,255,255,.07); color: rgba(255,255,255,.85); }
    .sf-nav-item.active { background: rgba(249,115,22,.18); color: #fff;
                          box-shadow: inset 3px 0 0 var(--orange); }
    .sf-nav-icon { width: 18px; text-align: center; font-size: 0.95rem; flex-shrink: 0; }
    .sf-status-bar {
      padding: 12px 14px; border-top: 1px solid rgba(255,255,255,.07);
      display: flex; align-items: center; gap: 8px;
    }
    .sf-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Main content ── */
    .sf-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .sf-topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 52px; display: flex; align-items: center;
      gap: 8px; flex-shrink: 0;
    }
    .sf-breadcrumb { font-size: 0.78rem; color: var(--muted); display: flex; align-items: center; gap: 6px; }
    .sf-breadcrumb .current { color: var(--text); font-weight: 600; }
    .sf-content { flex: 1; overflow-y: auto; padding: 24px; }

    /* ── Cards ── */
    .sf-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .sf-card-header {
      padding: 14px 20px; border-bottom: 1px solid var(--border);
      font-size: 0.8rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.06em;
      display: flex; align-items: center; gap: 8px;
    }
    .sf-card-body { padding: 20px; }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--orange); color: #fff; border: none;
      padding: 9px 20px; border-radius: 8px; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: background .15s;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn-primary:hover { background: var(--orange2); }
    .btn-primary:disabled { opacity: .5; cursor: not-allowed; }
    .btn-secondary {
      background: #fff; color: var(--text); border: 1px solid var(--border);
      padding: 9px 18px; border-radius: 8px; font-size: 0.85rem;
      font-weight: 500; cursor: pointer; transition: all .15s;
      display: inline-flex; align-items: center; gap: 7px;
    }
    .btn-secondary:hover { border-color: #d1d5db; background: #f9fafb; }

    /* ── Status pills ── */
    .pill { display: inline-flex; align-items: center; gap: 5px;
            padding: 3px 10px; border-radius: 999px; font-size: 0.72rem; font-weight: 600; }
    .pill-running { background: #fff7ed; color: var(--orange); border: 1px solid #fed7aa; }
    .pill-done    { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok-br); }
    .pill-error   { background: var(--err-bg); color: var(--err); border: 1px solid var(--err-br); }
    .pill-pending { background: #f9fafb; color: var(--light); border: 1px solid var(--border); }
    .pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

    /* ── Pipeline node canvas ── */
    .pipeline-canvas {
      background: #f8f9fc; border: 1px solid var(--border);
      border-radius: 12px; padding: 24px 20px;
      overflow-x: auto; overflow-y: visible;
    }
    .pipeline-node {
      width: 130px; flex-shrink: 0;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px 10px 10px;
      position: relative; transition: all .2s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,.06);
    }
    .pipeline-node.running {
      border-color: var(--orange); background: #fff7ed;
      box-shadow: 0 0 0 3px rgba(249,115,22,.15), 0 2px 8px rgba(249,115,22,.12);
    }
    .pipeline-node.done {
      border-color: var(--ok); background: var(--ok-bg);
    }
    .pipeline-node.error {
      border-color: var(--err); background: var(--err-bg);
    }
    .pipeline-node.pending { opacity: .55; }
    .pipeline-arrow { display: flex; align-items: center; flex-shrink: 0; width: 24px; }
    .node-num {
      position: absolute; top: 5px; right: 7px;
      font-size: 0.58rem; font-weight: 700; color: var(--light);
    }

    /* ── Progress bar ── */
    .sf-progress-track {
      height: 5px; background: #e5e7eb; border-radius: 4px; overflow: hidden;
    }
    .sf-progress-fill {
      height: 100%; border-radius: 4px; transition: width 1s ease;
      background: linear-gradient(90deg, var(--orange), var(--ok));
    }

    /* ── Folder picker ── */
    .folder-drop-zone {
      border: 2px dashed #d1d5db; border-radius: 12px;
      padding: 32px 24px; text-align: center; cursor: pointer;
      transition: all .2s ease; background: #fafafa;
    }
    .folder-drop-zone:hover, .folder-drop-zone.has-path {
      border-color: var(--orange); background: #fff7ed;
    }
    .folder-icon { font-size: 2.5rem; margin-bottom: 10px; }

    /* ── Animations ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .7s linear infinite; display: inline-block; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
    .pulse { animation: pulse 1.4s ease-in-out infinite; }
    @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
    .fade-in { animation: fadeIn .3s ease both; }
    @keyframes victoryPop { 0%{transform:scale(.96);opacity:0} 100%{transform:scale(1);opacity:1} }
    .victory-pop { animation: victoryPop .4s cubic-bezier(.34,1.56,.64,1) both; }

    /* ── Ticker ── */
    .ticker-wrap {
      background: #fff7ed; border: 1px solid #fed7aa;
      border-radius: 8px; padding: 10px 12px; margin-top: 10px;
    }
    .ticker-label { font-size: 0.62rem; font-weight: 700; color: var(--orange);
                    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }

    /* ── Hourglass wrap ── */
    .hg-wrap {
      border-radius: 10px; overflow: hidden;
      box-shadow: 0 0 0 1.5px rgba(249,115,22,.25), 0 4px 16px rgba(249,115,22,.1);
    }
    .hg-wrap canvas { display: block; border-radius: 9px; }

    /* ── Victory ── */
    .victory-card {
      background: linear-gradient(135deg, #ecfdf5 0%, #f0fdf4 100%);
      border: 1.5px solid var(--ok-br); border-radius: 16px; overflow: hidden;
    }
    .victory-header {
      background: var(--ok); padding: 20px 24px;
      display: flex; align-items: center; gap: 16px;
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
  </style>
</head>
<body>
<div id="root"></div>

const VIEWS = [
  { id:'live',      label:'Run Pipeline', icon:'▶' },

const timeSince = (ts) => {
  if (!ts) return '—';
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60) return `${d}s ago`;
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  return new Date(ts).toLocaleTimeString();
};

// ── Hourglass canvas ──────────────────────────────────────────────────────────
function HourGlass({ status = 'running', size = 140 }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const cv = canvasRef.current; if (!cv) return;
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height, cx = W/2, cy = H/2;
    const TW = W*.38, TH = H*.39, NK = 2.8;
    const outlinePath = () => { ctx.beginPath(); ctx.moveTo(cx-TW,cy-TH); ctx.lineTo(cx+TW,cy-TH); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx+TW,cy+TH); ctx.lineTo(cx-TW,cy+TH); ctx.lineTo(cx-NK,cy); ctx.closePath(); };
    const topClip = () => { ctx.beginPath(); ctx.moveTo(cx-TW,cy-TH); ctx.lineTo(cx+TW,cy-TH); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx-NK,cy); ctx.closePath(); };
    const botClip = () => { ctx.beginPath(); ctx.moveTo(cx-NK,cy); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx+TW,cy+TH); ctx.lineTo(cx-TW,cy+TH); ctx.closePath(); };
    let level=0, grains=[], alive=true, rafId, last=null; const CYCLE=5500;
    const frame = (ts) => {
      if (!alive) return;
      if (last===null) last=ts;
      const dt=Math.min(ts-last,50); last=ts;
      level+=dt/CYCLE; if(level>1) level=0;
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#fff8f0'; ctx.fillRect(0,0,W,H);
      const og=ctx.createLinearGradient(cx,cy-TH,cx,cy+TH);
      og.addColorStop(0,'rgba(249,115,22,.8)'); og.addColorStop(.5,'rgba(234,88,12,.6)'); og.addColorStop(1,'rgba(249,115,22,.8)');
      ctx.save(); outlinePath(); ctx.strokeStyle=og; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
      const topSandH=TH*(1-level), topSandY=cy-topSandH, topSandSpan=NK+(TW-NK)*topSandH/TH;
      ctx.save(); topClip(); ctx.clip();
      const tg=ctx.createLinearGradient(0,topSandY,0,cy);
      tg.addColorStop(0,'rgba(249,115,22,.18)'); tg.addColorStop(1,'rgba(249,115,22,.45)');
      ctx.beginPath(); ctx.moveTo(cx-topSandSpan,topSandY); ctx.lineTo(cx+topSandSpan,topSandY); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx-NK,cy); ctx.closePath(); ctx.fillStyle=tg; ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx-topSandSpan,topSandY); ctx.lineTo(cx+topSandSpan,topSandY); ctx.strokeStyle='rgba(249,115,22,.7)'; ctx.lineWidth=1.3; ctx.stroke(); ctx.restore();
      const botSandH=TH*level, botSandY=cy+TH-botSandH, botSandSpan=NK+(TW-NK)*botSandH/TH;
      ctx.save(); botClip(); ctx.clip();
      const bg2=ctx.createLinearGradient(0,botSandY,0,cy+TH);
      bg2.addColorStop(0,'rgba(249,115,22,.22)'); bg2.addColorStop(1,'rgba(249,115,22,.5)');
      ctx.beginPath(); ctx.moveTo(cx-botSandSpan,botSandY); ctx.lineTo(cx+botSandSpan,botSandY); ctx.lineTo(cx+TW,cy+TH); ctx.lineTo(cx-TW,cy+TH); ctx.closePath(); ctx.fillStyle=bg2; ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx-botSandSpan,botSandY); ctx.lineTo(cx+botSandSpan,botSandY); ctx.strokeStyle='rgba(249,115,22,.55)'; ctx.lineWidth=1.1; ctx.stroke(); ctx.restore();
      if (status==='running') {
        if (Math.random()<.35) grains.push({x:cx+(Math.random()-.5)*3,y:cy+1,vy:1.2+Math.random()*2,r:.7+Math.random()*.9,a:.6+Math.random()*.4});
        grains=grains.filter(g=>{ g.y+=g.vy; g.vy+=.18; if(g.y>botSandY) return false; ctx.beginPath(); ctx.arc(g.x,g.y,g.r,0,Math.PI*2); ctx.fillStyle=`rgba(249,115,22,${g.a})`; ctx.fill(); return true; });
      }
      rafId=requestAnimationFrame(frame);
    };
    rafId=requestAnimationFrame(frame);
    return ()=>{ alive=false; cancelAnimationFrame(rafId); };
  }, [status]);
  return <div className="hg-wrap" style={{width:size,height:size}}><canvas ref={canvasRef} width={size} height={size} /></div>;
}

// ── Activity ticker ───────────────────────────────────────────────────────────
function ActivityTicker({ stageId, running }) {
  const steps = (STAGE_INFO_FULL.find(s=>s.id===stageId)||{}).steps || ['Working…'];
  const [idx, setIdx] = useState(0);
  const [vis, setVis] = useState(true);
  useEffect(() => {
    if (!running) return;
    setIdx(0); setVis(true);
    const iv = setInterval(()=>{ setVis(false); setTimeout(()=>{ setIdx(i=>(i+1)%steps.length); setVis(true); },300); },4000);
    return ()=>clearInterval(iv);
  }, [stageId, running]);
  return (
    <div className="ticker-wrap">
      <div className="ticker-label">⚡ Live activity</div>
      <div style={{fontSize:'0.8rem',color:'#92400e',lineHeight:1.5,opacity:vis?1:0,transition:'opacity .3s',minHeight:'1.3rem'}}>
        {steps[idx]}
      </div>
      <div style={{display:'flex',gap:4,marginTop:6}}>
        {steps.map((_,i)=><span key={i} style={{width:5,height:5,borderRadius:'50%',display:'inline-block',background:i===idx?'var(--orange)':'#fed7aa',transition:'background .3s'}} />)}
      </div>
    </div>
  );
}

// ── Sevaforge hex logo ────────────────────────────────────────────────────────
function SevaForgeLogo({ size=36, spinning=false }) {

         style={spinning?{animation:'spin .8s linear infinite'}:{}}>
      <defs>
        <linearGradient id="lg1" x1="0" y1="0" x2="56" y2="56" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stopColor="#f97316"/><stop offset="100%" stopColor="#ea580c"/>
        </linearGradient>
      </defs>
      <polygon points="28,2 51,15 51,41 28,54 5,41 5,15"
               stroke="url(#lg1)" strokeWidth="2" fill="rgba(249,115,22,.08)" strokeLinejoin="round"/>
      <path d="M24 43C24 43 16 34 20 26C21.5 23 23.5 26 25 24C25 24 22 16 28 11C28 11 30 20 34.5 18C37.5 23 40 31 34 43Z"
            fill="url(#lg1)"/>
      <rect x="20" y="43" width="16" height="2.5" rx="1.25" fill="url(#lg1)" opacity=".6"/>
    </svg>
  );
}

// ── Folder picker panel ───────────────────────────────────────────────────────
function FolderPicker({ onPathSelected }) {
  const [path,   setPath]   = useState('');
  const [status, setStatus] = useState('idle'); // idle|browsing|typing|error|ok
  const [errMsg, setErrMsg] = useState('');

  const browse = async () => {
    setStatus('browsing');
    setErrMsg('');
    try {
      const res  = await fetch('/api/browse', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
      const data = await res.json();
      if (data.path && !data.path.startsWith('ERROR:')) {
        setPath(data.path); setStatus('typing'); onPathSelected(data.path);
      } else if (data.cancelled) {
        setStatus('idle'); // user pressed Cancel — stay quiet
      } else {
        setErrMsg('Could not open folder picker. Please type your path below.');
        setStatus('error');
      }
    } catch(e) {
      setErrMsg(`Could not reach server: ${e.message}`);
      setStatus('error');
    }
  };

  const launch = async () => {
    const p = path.trim();
    if (!p) { setErrMsg('Please select or enter a folder path.'); setStatus('error'); return; }
    setStatus('ok');
    setErrMsg('');
    onPathSelected(p);
  };

  return (
    <div style={{maxWidth:540, margin:'0 auto'}}>
      {/* Drop zone / browse area */}
      <div className={`folder-drop-zone ${path?'has-path':''}`} onClick={browse}
           style={{marginBottom:16}}>
        {status==='browsing' ? (
          <>
            <div className="folder-icon spin">⏳</div>
            <div style={{fontSize:'0.9rem',color:'var(--muted)',fontWeight:500}}>Opening folder picker…</div>
          </>
        ) : path ? (
          <>
            <div style={{fontSize:'2rem',marginBottom:8}}>📁</div>
            <div style={{fontSize:'0.85rem',fontWeight:700,color:'var(--orange)',marginBottom:4}}>Folder selected</div>
            <div style={{fontFamily:'monospace',fontSize:'0.78rem',color:'var(--muted)',wordBreak:'break-all'}}>{path}</div>
            <div style={{fontSize:'0.72rem',color:'var(--light)',marginTop:8}}>Click to change folder</div>
          </>
        ) : (
          <>
            <div className="folder-icon">📂</div>
            <div style={{fontSize:'0.95rem',fontWeight:600,color:'var(--text)',marginBottom:6}}>Click to select your project folder</div>
            <div style={{fontSize:'0.78rem',color:'var(--muted)'}}>Opens your Mac folder picker — no terminal needed</div>
          </>
        )}
      </div>

      {/* Manual path input */}
      <div style={{marginBottom:4,fontSize:'0.72rem',color:'var(--muted)',fontWeight:600}}>
        OR TYPE PATH DIRECTLY
      </div>
      <div style={{display:'flex',gap:8,marginBottom:12}}>
        <input
          type="text"
          value={path}
          onChange={e=>{ setPath(e.target.value); setStatus('typing'); setErrMsg(''); onPathSelected(e.target.value); }}
          onKeyDown={e=>e.key==='Enter' && launch()}
          placeholder="~/your-ai-project  or  /Users/you/project"
          style={{
            flex:1, padding:'9px 12px', borderRadius:8, fontFamily:'monospace',
            fontSize:'0.82rem', border:`1px solid ${status==='error'?'var(--err)':'var(--border)'}`,
            outline:'none', background:'#fff', color:'var(--text)',
          }}
        />
      </div>

      {status==='error' && <div style={{color:'var(--err)',fontSize:'0.78rem',marginBottom:10}}>⚠ {errMsg}</div>}
    </div>
  );
}

// ── Pipeline running view ─────────────────────────────────────────────────────
function RunningView({ liveState }) {
  const { pipelinePath, stages, stageState, stageInfo, stageResults,
          currentStage, currentNum, totalStages, done, elapsed } = liveState;

  const stageEmoji = id => (STAGE_INFO_FULL.find(s=>s.id===id)||{}).emoji || '▸';
  const stageLabel = id => (STAGE_INFO_FULL.find(s=>s.id===id)||{}).label || id;

  const allFinished = done && !currentStage;
  const hasFailed   = Object.values(stageState).some(s=>s==='error');
  const passedCount = Object.values(stageState).filter(s=>s==='success').length;
  const pct         = totalStages ? Math.round(passedCount / totalStages * 100) : 0;

  const staticMeta = STAGE_INFO_FULL.find(s=>s.id===currentStage) || {};
  const sseInfo    = stageInfo[currentStage] || {};
  const activeInfo = {
    consumer:   staticMeta.consumer || '',
    outputs:    sseInfo.outputs  || staticMeta.outputs || '',
    agent:      sseInfo.agent    || '',
    mcp_server: sseInfo.mcp_server || '',
  };

  const nodeClass = id => {
    if (id === currentStage) return 'pipeline-node running';
    const s = stageState[id];
    if (s==='success') return 'pipeline-node done';
    if (s==='error')   return 'pipeline-node error';
    return 'pipeline-node pending';
  };

  const nodeStatus = id => {
    if (id===currentStage) return { cls:'pill pill-running', dot:true, text:'Running' };
    const s = stageState[id];
    if (s==='success') return { cls:'pill pill-done',    dot:false, text:'Done' };
    if (s==='error')   return { cls:'pill pill-error',   dot:false, text:'Error' };
    return { cls:'pill pill-pending', dot:false, text:'Waiting' };
  };

  return (
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:16}}>

      {/* ── Run status bar ── */}
      <div className="sf-card" style={{padding:'14px 20px',display:'flex',alignItems:'center',gap:16}}>
        <SevaForgeLogo size={36} spinning={!!currentStage && !allFinished} />
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:'0.95rem',color:'var(--text)',marginBottom:2}}>
            {allFinished
              ? (hasFailed ? '⚠ Pipeline completed with errors' : '🎉 Pipeline complete!')
              : currentStage
                ? `Running — ${stageLabel(currentStage)}`
                : 'Pipeline starting…'}
          </div>
          <div style={{fontFamily:'monospace',fontSize:'0.72rem',color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {pipelinePath || '—'}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          {totalStages>0 && (
            <span className={`pill ${allFinished?(hasFailed?'pill-error':'pill-done'):'pill-running'}`}>
              {allFinished?(hasFailed?'✗ Failed':'✓ Done'):`${Math.min(currentNum,totalStages)} / ${totalStages}`}
            </span>
          )}
          {elapsed>0 && <span className="pill pill-pending">{elapsed}s</span>}
        </div>
      </div>

      {/* ── Progress bar ── */}
      {totalStages>0 && (
        <div>
          <div className="sf-progress-track">
            <div className="sf-progress-fill" style={{width:`${pct}%`}} />
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:4,fontSize:'0.68rem',color:'var(--muted)'}}>
            <span>{pct}% complete</span>
            <span>{passedCount} of {totalStages} stages passed</span>
          </div>
        </div>
      )}

      {/* ── Pipeline canvas — node graph ── */}
      {stages.length>0 && (
        <div>
          <div style={{fontSize:'0.72rem',fontWeight:700,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.06em'}}>
            Pipeline Flow
          </div>
          <div className="pipeline-canvas">
            <div style={{display:'flex',alignItems:'center',gap:0,minWidth:'max-content'}}>
              {stages.map((id,i)=>{
                const ns = nodeStatus(id);
                return (
                  <React.Fragment key={id}>
                    <div className={nodeClass(id)}>
                      <span className="node-num">{i+1}</span>
                      <div style={{fontSize:'1.3rem',marginBottom:5,lineHeight:1}}>{stageEmoji(id)}</div>
                      <div style={{fontSize:'0.7rem',fontWeight:700,color:'var(--text)',marginBottom:7,
                                   whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                        {stageLabel(id)}
                      </div>
                      <span className={ns.cls} style={{fontSize:'0.6rem',padding:'2px 7px'}}>
                        {id===currentStage && <span className="pulse" style={{display:'inline-block',width:5,height:5,borderRadius:'50%',background:'var(--orange)',marginRight:4,verticalAlign:'middle'}} />}
                        {ns.text}
                      </span>
                    </div>
                    {i<stages.length-1 && (
                      <div className="pipeline-arrow">
                        <svg width="24" height="10" viewBox="0 0 24 10">
                          <line x1="0" y1="5" x2="16" y2="5"
                                stroke={stageState[id]==='success'?'var(--ok)':'#d1d5db'} strokeWidth="1.5"/>
                          <polyline points="13,2 20,5 13,8"
                                    stroke={stageState[id]==='success'?'var(--ok)':'#d1d5db'}
                                    strokeWidth="1.5" fill="none"/>
                        </svg>
                      </div>
                    )}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── Active stage spotlight ── */}
      {currentStage && (
        <div className="sf-card fade-in">
          <div className="sf-card-header">
            <span className="spin" style={{marginRight:4}}>⟳</span>
            {stageLabel(currentStage)} — Stage {currentNum} of {totalStages}
          </div>
          <div style={{padding:'20px',display:'grid',gridTemplateColumns:'148px 1fr',gap:20}}>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
              <HourGlass status="running" size={144} />
              <div style={{fontSize:'0.65rem',color:'var(--muted)',textAlign:'center',fontFamily:'monospace'}}>
                stage {currentNum} / {totalStages}
              </div>
            </div>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
                <span style={{fontSize:'2rem'}}>{stageEmoji(currentStage)}</span>
                <div>
                  <div style={{fontWeight:800,fontSize:'1.05rem',color:'var(--text)'}}>{stageLabel(currentStage)}</div>
                  {(activeInfo.agent||activeInfo.mcp_server) && (
                    <div style={{fontSize:'0.68rem',color:'var(--muted)',fontFamily:'monospace'}}>
                      {activeInfo.agent}{activeInfo.mcp_server?` · ${activeInfo.mcp_server}`:''}
                    </div>
                  )}
                </div>
              </div>
              {activeInfo.consumer && (
                <div style={{background:'#fff7ed',border:'1px solid #fed7aa',borderRadius:8,padding:'10px 14px',marginBottom:10}}>
                  <div style={{fontSize:'0.62rem',fontWeight:700,color:'var(--orange)',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:5}}>
                    What's happening
                  </div>
                  <div style={{fontSize:'0.82rem',color:'#92400e',lineHeight:1.55}}>
                    {activeInfo.consumer}
                  </div>
                </div>
              )}
              {activeInfo.outputs && (
                <div style={{fontSize:'0.7rem',color:'var(--muted)',fontFamily:'monospace',marginBottom:4}}>
                  📦 {activeInfo.outputs}
                </div>
              )}
              <ActivityTicker stageId={currentStage} running={true} />
            </div>
          </div>
        </div>
      )}

      {/* ── Stage results grid ── */}
      {Object.entries(stageResults).length>0 && (
        <div>
          <div style={{fontSize:'0.72rem',fontWeight:700,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.06em'}}>
            Completed Stages
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {Object.entries(stageResults).map(([id,result])=>{
              const ok   = result.status==='success';
              const meta = STAGE_INFO_FULL.find(s=>s.id===id)||{};
              return (
                <div key={id} style={{
                  display:'flex',alignItems:'center',gap:10,padding:'10px 14px',borderRadius:8,
                  background:ok?'var(--ok-bg)':'var(--err-bg)',
                  border:`1px solid ${ok?'var(--ok-br)':'var(--err-br)'}`,
                }}>
                  <span style={{fontSize:'1.1rem',flexShrink:0}}>{meta.emoji||'▸'}</span>
                  <div style={{minWidth:0,flex:1}}>
                    <div style={{fontSize:'0.78rem',fontWeight:700,color:ok?'#065f46':'#991b1b'}}>
                      {meta.label||id}
                    </div>
                    {result.summary && (
                      <div style={{fontSize:'0.65rem',color:ok?'#047857':'#b91c1c',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {result.summary.slice(0,70)}
                      </div>
                    )}
                  </div>
                  <span style={{fontSize:'0.9rem',fontWeight:700,color:ok?'var(--ok)':'var(--err)',flexShrink:0}}>
                    {ok?'✓':'✗'}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Victory screen ── */}
      {allFinished && !hasFailed && (
        <div className="victory-card victory-pop">
          <div className="victory-header">
            <SevaForgeLogo size={44} />
            <div style={{flex:1}}>
              <div style={{fontSize:'1.4rem',fontWeight:900,color:'#fff',letterSpacing:'-0.5px',marginBottom:3}}>
                🎉 Your AI app is cloud-ready!
              </div>
              <div style={{fontSize:'0.85rem',color:'rgba(255,255,255,.8)'}}>
                All {totalStages} stages completed in <strong style={{color:'#fff'}}>{elapsed}s</strong>
              </div>
            </div>
          </div>
          <div style={{padding:'20px 24px'}}>
            <div style={{fontSize:'0.72rem',fontWeight:700,color:'var(--ok)',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:12}}>
              What Sevaforge built for you
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
              {[
                {emoji:'🏗️', title:'Cloud Infrastructure',   detail:'Terraform, VPC, Kubernetes, Docker'},
                {emoji:'🚀', title:'Deployment Pipelines',   detail:'ArgoCD, Kustomize, dev/staging/prod'},
                {emoji:'⚙️', title:'CI/CD Workflows',        detail:'GitHub Actions, security gate, releases'},
                {emoji:'📚', title:'Documentation',          detail:'Architecture, threat model, API docs'},
                {emoji:'🧪', title:'E2E Test Suite',         detail:'Playwright specs for all user flows'},
                {emoji:'🔒', title:'Security Report',        detail:'SAST, CVE scan, secrets detection'},
                {emoji:'🌉', title:'GitHub Push',            detail:'All files committed, PR opened'},
                {emoji:'📋', title:'Runbooks & SLOs',        detail:'Grafana, Prometheus, alert rules'},
              ].map(({emoji,title,detail})=>(
                <div key={title} style={{display:'flex',gap:10,padding:'8px 12px',borderRadius:8,
                                         background:'rgba(255,255,255,.6)',border:'1px solid var(--ok-br)'}}>
                  <span style={{fontSize:'1.1rem',flexShrink:0}}>{emoji}</span>
                  <div>
                    <div style={{fontSize:'0.76rem',fontWeight:700,color:'#065f46'}}>{title}</div>
                    <div style={{fontSize:'0.67rem',color:'#047857'}}>{detail}</div>
                  </div>
                </div>
              ))}
            </div>
            <div style={{marginTop:16,display:'flex',gap:10}}>
              <div style={{flex:1,background:'rgba(255,255,255,.5)',border:'1px solid var(--ok-br)',
                           borderRadius:8,padding:'10px 14px'}}>
                <div style={{fontSize:'0.67rem',fontWeight:700,color:'var(--ok)',marginBottom:4}}>Next step</div>
                <code style={{fontSize:'0.75rem',color:'#065f46'}}>gh pr view --web</code>
              </div>
              <div style={{flex:1,background:'rgba(255,255,255,.5)',border:'1px solid var(--ok-br)',
                           borderRadius:8,padding:'10px 14px'}}>
                <div style={{fontSize:'0.67rem',fontWeight:700,color:'var(--ok)',marginBottom:4}}>Deploy</div>
                <code style={{fontSize:'0.75rem',color:'#065f46'}}>forgeflow deploy</code>
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Failed banner */}
      {allFinished && hasFailed && (
        <div style={{background:'var(--err-bg)',border:'1.5px solid var(--err-br)',borderRadius:12,padding:'16px 20px',
                     display:'flex',alignItems:'center',gap:14}}>
          <span style={{fontSize:'2rem'}}>⚠️</span>
          <div>
            <div style={{fontWeight:700,fontSize:'1rem',color:'var(--err)',marginBottom:4}}>
              Pipeline completed with errors
            </div>
            <div style={{fontSize:'0.8rem',color:'#b91c1c'}}>
              Check the stage results above — most issues are fixable in one command.
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Dashboard view ────────────────────────────────────────────────────────────
function DashboardView({ history, connected, onNavigate }) {
  const runs      = history.length;
  const successes = history.filter(r=>r.status==='success').length;
  const rate      = runs ? Math.round(successes/runs*100) : null;
  const last      = history[0];

  return (
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div>
        <h1 style={{fontSize:'1.4rem',fontWeight:800,color:'var(--text)',marginBottom:4}}>Dashboard</h1>
        <p style={{color:'var(--muted)',fontSize:'0.85rem'}}>AIDDaaS — AI Dev to Delivery as a Service · ForgeFlow v2.1</p>
      </div>

      {/* Stats */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        {[
          {label:'Pipeline Runs',  value:runs||0,        sub:'total',          color:'#6366f1'},
          {label:'Success Rate',   value:rate!=null?`${rate}%`:'—', sub:`${successes} passed`, color:rate>=80?'var(--ok)':rate>50?'var(--warn)':'var(--err)'},
          {label:'Last Run',       value:last?timeSince(last.ts):'None', sub:last?(last.status==='success'?'Passed':'Failed'):'no runs yet', color:last?(last.status==='success'?'var(--ok)':'var(--err)'):'var(--muted)'},
          {label:'Status',         value:connected?'Live':'Offline', sub:'dashboard server', color:connected?'var(--ok)':'var(--err)'},
        ].map(({label,value,sub,color})=>(
          <div key={label} className="sf-card" style={{padding:'16px 18px'}}>
            <div style={{fontSize:'0.7rem',color:'var(--muted)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.05em',marginBottom:6}}>{label}</div>
            <div style={{fontSize:'1.6rem',fontWeight:800,color,marginBottom:2}}>{value}</div>
            <div style={{fontSize:'0.72rem',color:'var(--light)'}}>{sub}</div>
          </div>
        ))}
      </div>

      {/* Stage overview */}
      <div className="sf-card">
        <div className="sf-card-header">What each stage does for you</div>
        <div style={{padding:'16px 20px',display:'flex',flexDirection:'column',gap:8}}>
          {STAGE_INFO_FULL.slice(0,11).map(s=>(
            <div key={s.id} style={{display:'flex',gap:12,alignItems:'flex-start',padding:'10px 14px',
                                     borderRadius:8,border:'1px solid var(--border)',background:'#fafafa'}}>
              <span style={{fontSize:'1.3rem',flexShrink:0}}>{s.emoji}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontWeight:700,fontSize:'0.82rem',color:'var(--text)',marginBottom:3}}>{s.label}</div>
                <div style={{fontSize:'0.77rem',color:'var(--muted)',lineHeight:1.5}}>{s.consumer}</div>
                <div style={{fontSize:'0.67rem',color:'var(--light)',fontFamily:'monospace',marginTop:4}}>→ {s.outputs}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Recent runs */}
      {history.length>0 && (
        <div className="sf-card">
          <div className="sf-card-header">Recent runs</div>
          <div style={{padding:'12px 20px',display:'flex',flexDirection:'column',gap:6}}>
            {history.slice(0,5).map((r,i)=>{
              const ok=r.status==='success';
              return (
                <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 12px',borderRadius:8,
                                      background:ok?'var(--ok-bg)':'var(--err-bg)',
                                      border:`1px solid ${ok?'var(--ok-br)':'var(--err-br)'}`}}>
                  <span style={{color:ok?'var(--ok)':'var(--err)',fontWeight:700}}>{ok?'✓':'✗'}</span>
                  <span style={{fontFamily:'monospace',fontSize:'0.75rem',flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',color:'var(--text)'}}>{r.path||'—'}</span>
                  <span style={{fontSize:'0.7rem',color:'var(--muted)',flexShrink:0}}>{r.stageCount||0} stages · {timeSince(r.ts)}</span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── History view ──────────────────────────────────────────────────────────────
function HistoryView({ history, onClear }) {

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div>
          <h1 style={{fontSize:'1.4rem',fontWeight:800,color:'var(--text)',marginBottom:4}}>Run History</h1>
          <p style={{color:'var(--muted)',fontSize:'0.85rem'}}>{history.length} runs recorded in this session</p>
        </div>
        {history.length>0 && (
          <button className="btn-secondary" onClick={onClear} style={{color:'var(--err)',borderColor:'var(--err-br)'}}>✗ Clear</button>
        )}
      </div>
      {history.length===0 ? (
        <div className="sf-card" style={{padding:'48px 24px',textAlign:'center'}}>
          <div style={{fontSize:'2.5rem',marginBottom:12}}>◷</div>
          <div style={{fontWeight:600,color:'var(--muted)',marginBottom:6}}>No pipeline runs yet</div>
          <div style={{fontSize:'0.8rem',color:'var(--light)'}}>Run a pipeline from the Run Pipeline tab to see history here.</div>
        </div>
      ) : (
        <div style={{display:'flex',flexDirection:'column',gap:8}}>
          {history.map((r,i)=>{
            const ok=r.status==='success';
            return (
              <div key={i} className="sf-card" style={{padding:'12px 18px',display:'flex',alignItems:'center',gap:14}}>
                <span style={{fontSize:'1.2rem',color:ok?'var(--ok)':'var(--err)'}}>{ok?'✓':'✗'}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontFamily:'monospace',fontSize:'0.8rem',color:'var(--text)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.path||'—'}</div>
                  <div style={{fontSize:'0.7rem',color:'var(--muted)',marginTop:2}}>{r.stageCount||0} stages · {timeSince(r.ts)}{r.elapsed?` · ${r.elapsed}s`:''}</div>
                </div>
                <span className={`pill ${ok?'pill-done':'pill-error'}`}>{ok?'Passed':'Failed'}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Health view ───────────────────────────────────────────────────────────────
function HealthView({ connected, liveState }) {
  const checks = [
    { label:'SSE Dashboard Stream',  ok:connected,           detail:connected?'Real-time events flowing':'Run forgeflow dashboard' },
    { label:'Pipeline Engine',       ok:true,                detail:'ForgeFlow CLI installed' },
    { label:'React UI',              ok:true,                detail:'Rendering correctly' },
    { label:'Hourglass Animation',   ok:true,                detail:'Canvas engine active' },
    { label:'NoCaaS Mode',           ok:true,                detail:'Running at zero cost' },
    { label:'Stage Descriptions',    ok:true,                detail:'Consumer descriptions loaded' },
    { label:'Sevaforge Branding',    ok:true,                detail:'AIDDaaS theme active' },
    { label:'Node Graph Canvas',     ok:true,                detail:'Pipeline visualiser ready' },
  ];
  const ok = checks.filter(c=>c.ok).length;
  const pct = Math.round(ok/checks.length*100);
  return (
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:16}}>
      <div>
        <h1 style={{fontSize:'1.4rem',fontWeight:800,color:'var(--text)',marginBottom:4}}>System Health</h1>
        <p style={{color:'var(--muted)',fontSize:'0.85rem'}}>{ok} of {checks.length} checks passing</p>
      </div>
      <div className="sf-card" style={{padding:'20px 24px'}}>
        <div style={{display:'flex',alignItems:'center',gap:20,marginBottom:16}}>
          <div style={{fontSize:'2.5rem',fontWeight:900,color:pct===100?'var(--ok)':'var(--warn)'}}>{pct}%</div>
          <div>
            <div style={{fontWeight:700,color:pct===100?'var(--ok)':'var(--warn)'}}>
              {pct===100?'All Systems Operational':`${checks.length-ok} checks need attention`}
            </div>
            <div style={{fontSize:'0.78rem',color:'var(--muted)'}}>Dashboard health</div>
          </div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {checks.map((c,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:8,
                                  background:c.ok?'var(--ok-bg)':'var(--err-bg)',
                                  border:`1px solid ${c.ok?'var(--ok-br)':'var(--err-br)'}`}}>
              <span style={{color:c.ok?'var(--ok)':'var(--err)',fontWeight:700}}>{c.ok?'✓':'✗'}</span>
              <div>
                <div style={{fontSize:'0.78rem',fontWeight:600,color:c.ok?'#065f46':'#991b1b'}}>{c.label}</div>
                <div style={{fontSize:'0.68rem',color:'var(--muted)'}}>{c.detail}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── App shell ─────────────────────────────────────────────────────────────────
function App() {
  const [view,    setView]    = useState('live');
  const [history, setHistory] = useState([]);
  const [toasts,  setToasts]  = useState([]);
  const [liveState, setLiveState] = useState({
    connected:false, pipelinePath:'', stages:[], stageState:{},
    stageInfo:{}, stageResults:{}, currentStage:null, currentNum:0,
    totalStages:0, done:false, elapsed:0,
  });

  const addToast = useCallback((msg,type='info')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4000);
  },[]);

  // SSE connection
  useEffect(()=>{
    const es=new EventSource('/events');
    es.onmessage=(e)=>{
      let msg; try{msg=JSON.parse(e.data);}catch{return;}
      const {type}=msg;
      if (type==='connected') {
        setLiveState(s=>({...s,connected:true}));
      } else if (type==='pipeline_start') {
        const init={}; (msg.stages||[]).forEach(id=>{init[id]='pending';});
        setLiveState({connected:true,pipelinePath:msg.path||'',stages:msg.stages||[],
          stageState:init,stageInfo:{},stageResults:{},currentStage:null,
          currentNum:0,totalStages:msg.total||0,done:false,elapsed:0});
        setView('live');
      } else if (type==='stage_start') {
        setLiveState(s=>({...s,currentStage:msg.stage,currentNum:msg.num||s.currentNum,
          stageState:{...s.stageState,[msg.stage]:'running'},
          stageInfo:{...s.stageInfo,[msg.stage]:msg.info||{}}}));
      } else if (type==='stage_result') {
        const ok=(msg.result||{}).status==='success';
        setLiveState(s=>({...s,
          currentStage:s.currentStage===msg.stage?null:s.currentStage,
          stageState:{...s.stageState,[msg.stage]:ok?'success':'error'},
          stageResults:{...s.stageResults,[msg.stage]:msg.result||{}}}));
      } else if (type==='pipeline_done') {
        setLiveState(s=>{
          const failedStage=Object.entries(s.stageState).find(([,v])=>v==='error')?.[0]||null;
          const entry={path:msg.path||s.pipelinePath||'—',status:msg.success?'success':'error',
            stageCount:s.stages.length||msg.stage_count||0,elapsed:msg.elapsed_s||0,failedStage,ts:Date.now()};
          setHistory(prev=>[entry,...prev.slice(0,99)]);
          return{...s,done:true,currentStage:null,elapsed:msg.elapsed_s||0};
        });
        addToast(msg.success?`✓ Pipeline complete in ${msg.elapsed_s}s`:'✗ Pipeline failed',
                 msg.success?'success':'error');
      }
    };
    es.onerror=()=>setLiveState(s=>({...s,connected:false}));
    return ()=>es.close();
  },[]);

  const { connected, stages, done } = liveState;
  const pipelineActive = stages.length>0 || done;
  const showIdle = !pipelineActive;

  // Breadcrumb
  const breadcrumbs = {
    live:'Run Pipeline', dashboard:'Dashboard', pipeline:'Stages',
    history:'History', health:'Health', settings:'Settings',
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* Sidebar */}
      <aside className="sf-sidebar">
        <div className="sf-logo-block">
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
            <SevaForgeLogo size={32} />
            <div>
              <div className="sf-logo-name">Sevaforge</div>
              <div className="sf-logo-tag">AIDDaaS</div>
            </div>
          </div>
          <div style={{fontSize:'0.62rem',color:'rgba(255,255,255,.22)',lineHeight:1.4}}>
            AI Dev to Delivery as a Service
          </div>
        </div>

        <nav className="sf-nav">
          {VIEWS.map(v=>(
            <button key={v.id} className={`sf-nav-item ${view===v.id?'active':''}`} onClick={()=>setView(v.id)}>
              <span className="sf-nav-icon">{v.icon}</span>
              {v.label}
              {v.id==='live' && pipelineActive && (
                <span style={{marginLeft:'auto',width:7,height:7,borderRadius:'50%',
                              background:done?'var(--ok)':'var(--orange)',
                              boxShadow:done?'0 0 6px var(--ok)':'0 0 6px var(--orange)',
                              animation:done?'none':'pulse 1.4s ease-in-out infinite'}} />
              )}
            </button>
          ))}
        </nav>

        <div className="sf-status-bar">
          <span className="sf-status-dot" style={{
            background:connected?'var(--ok)':'#4b5563',
            boxShadow:connected?'0 0 6px var(--ok)':'none',
          }} />
          <span style={{fontSize:'0.72rem',color:'rgba(255,255,255,.4)',flex:1}}>
            {connected?'Connected':'Connecting…'}
          </span>
          {done && <span style={{fontSize:'0.62rem',color:'rgba(255,255,255,.3)',fontWeight:600}}>DONE</span>}
        </div>
      </aside>

      {/* Main */}
      <div className="sf-main">
        {/* Topbar */}
        <div className="sf-topbar">
          <div className="sf-breadcrumb">
            <span>Sevaforge</span>
            <span style={{color:'var(--border)'}}>›</span>
            <span className="current">{breadcrumbs[view]||view}</span>
          </div>
          {pipelineActive && view!=='live' && (
            <button className="btn-secondary" onClick={()=>setView('live')}
                    style={{marginLeft:'auto',padding:'5px 14px',fontSize:'0.78rem'}}>
              {done?'View Results':'↗ View Live Run'}
            </button>
          )}
        </div>

        {/* Content */}
        <div className="sf-content">
          {view==='live' && (
            showIdle
              ? <IdleScreen connected={connected} onLaunch={()=>setView('live')} />
              : <RunningView liveState={liveState} />
          )}
          {view==='dashboard' && <DashboardView history={history} connected={connected} onNavigate={setView} />}
          {view==='pipeline'  && <StagesView />}
          {view==='history'   && <HistoryView history={history} onClear={()=>setHistory([])} />}
          {view==='health'    && <HealthView connected={connected} liveState={liveState} />}
          {view==='settings'  && <SettingsView />}
        </div>
      </div>

      {/* Toasts */}
      <div style={{position:'fixed',bottom:20,right:20,display:'flex',flexDirection:'column',gap:8,zIndex:999}}>
        {toasts.map(t=>(
          <div key={t.id} style={{
            padding:'10px 16px',borderRadius:8,fontSize:'0.82rem',fontWeight:500,
            background:t.type==='success'?'var(--ok)':t.type==='error'?'var(--err)':'var(--navy)',
            color:'#fff',boxShadow:'0 4px 12px rgba(0,0,0,.15)',
            animation:'fadeIn .3s ease both',
          }}>{t.msg}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
