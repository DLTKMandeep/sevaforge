secrets:
- name: GH_TOKEN
  description: GitHub PAT with 'repo' + 'workflow' scope for CI/CD automation
  source: github-actions
  required_by:
  - ci_cd
  - infra
- name: GCP_SA_KEY
  description: JSON key for the deployer service account (IAM > Service Accounts)
  source: github-actions
  required_by:
  - infra
  - cluster
  - app
- name: GCP_PROJECT_ID
  description: GCP project id, e.g. divine-data-469116-b2
  source: github-actions
  required_by:
  - infra
  - cluster
  - app
- name: GCP_REGION
  description: Primary GCP region, e.g. us-central1
  source: github-actions
  required_by:
  - infra
  - cluster
- name: DATABASE_URL
  description: Connection string for primary database
  source: github-actions
  required_by:
  - app
- name: JWT_SECRET
  description: Secret key for signing JWT tokens
  source: github-actions
  required_by:
  - app
- name: REDIS_URL
  description: Connection string for Redis
  source: github-actions
  required_by:
  - app
- name: SESSION_SECRET
  description: Secret key for signing session cookies
  source: github-actions
  required_by:
  - app
- name: STRIPE_API_KEY
  description: Stripe API key
  source: github-actions
  required_by:
  - app
- name: OPENAI_API_KEY
  description: OpenAI API key
  source: github-actions
  required_by:
  - app
- name: ANTHROPIC_API_KEY
  description: Anthropic API key
  source: github-actions
  required_by:
  - app
- name: SENDGRID_API_KEY
  description: SendGrid API key
  source: github-actions
  required_by:
  - app
- name: SMTP_PASSWORD
  description: SMTP password for outbound email
  source: github-actions
  required_by:
  - app
