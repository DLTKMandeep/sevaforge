# Kustomize Overlay for dev
# Generated by ForgeFlow
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forgeflow-dev

resources:
  - ../../base

commonLabels:
  app.kubernetes.io/environment: dev

# Environment-specific patches
patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: forgeflow

# Environment-specific config
configMapGenerator:
  - name: forgeflow-config
    behavior: merge
    literals:
      - ENVIRONMENT=dev
      - LOG_LEVEL=debug

# Replicas by environment
replicas:
  - name: forgeflow
    count: 1
