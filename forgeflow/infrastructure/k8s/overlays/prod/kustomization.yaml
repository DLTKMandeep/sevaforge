# Kustomize Overlay for prod
# Generated by ForgeFlow
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: forgeflow-prod

resources:
  - ../../base

commonLabels:
  app.kubernetes.io/environment: prod

# Environment-specific patches
patches:
  - path: deployment-patch.yaml
    target:
      kind: Deployment
      name: forgeflow

# Environment-specific config
configMapGenerator:
  - name: forgeflow-config
    behavior: merge
    literals:
      - ENVIRONMENT=prod
      - LOG_LEVEL=warn

# Replicas by environment
replicas:
  - name: forgeflow
    count: 3
