<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sevaforge — AIDDaaS</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:300,400,500,600,700,800,900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* ── Sidebar (dark slate) ─────────────────────────── */
      --navy:      #0f172a;
      --navy-md:   #1e293b;
      --navy-lt:   #334155;
      /* ── Primary blue ────────────────────────────────── */
      --blue:      #2563eb;
      --blue2:     #1d4ed8;
      --blue3:     #60a5fa;   /* lighter blue for dark backgrounds */
      --blue-lt:   #eff6ff;
      --blue-br:   #bfdbfe;
      /* ── Backgrounds ─────────────────────────────────── */
      --bg:        #f8fafc;
      --bg2:       #f1f5f9;
      /* ── Surfaces ────────────────────────────────────── */
      --card:      #ffffff;
      --border:    #e2e8f0;
      --border-lt: #f1f5f9;
      /* ── Typography ──────────────────────────────────── */
      --text:      #0f172a;
      --text2:     #334155;
      --muted:     #64748b;
      --light:     #94a3b8;
      /* ── Semantic ─────────────────────────────────────── */
      --ok:        #059669;
      --ok-bg:     #ecfdf5;
      --ok-br:     #6ee7b7;
      --err:       #dc2626;
      --err-bg:    #fef2f2;
      --err-br:    #fca5a5;
      --warn:      #d97706;
      --purple:    #7c3aed;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
      font-size: 16px;
    }
    #root { height: 100vh; display: flex; }

    /* ─── Icon sidebar (narrow left strip) ─────────────────────────────── */
    .sf-icon-sidebar {
      width: 70px; min-width: 70px;
      background: #1a1a2e;
      display: flex; flex-direction: column; align-items: center;
      height: 100vh; border-right: 1px solid rgba(255,255,255,.05);
      flex-shrink: 0;
    }
    .sf-icon-logo {
      padding: 16px 0 14px; width: 100%;
      display: flex; justify-content: center; align-items: center;
      border-bottom: 1px solid rgba(255,255,255,.07);
    }
    .sf-icon-nav {
      flex: 1; width: 100%; padding: 10px 0;
      display: flex; flex-direction: column; gap: 2px;
    }
    .sf-icon-btn {
      width: 100%; padding: 9px 0; border: none; cursor: pointer;
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: transparent; color: rgba(255,255,255,.35);
      transition: all .15s; font-family: inherit;
    }
    .sf-icon-btn:hover { color: rgba(255,255,255,.75); }
    .sf-icon-btn.active { color: #fff; }
    .sf-icon-symbol {
      width: 38px; height: 38px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; transition: background .15s;
    }
    .sf-icon-btn.active .sf-icon-symbol { background: rgba(96,165,250,.18); }
    .sf-icon-btn:hover .sf-icon-symbol  { background: rgba(255,255,255,.06); }
    .sf-icon-label { font-size: 9.5px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .sf-icon-footer {
      padding: 12px 0; border-top: 1px solid rgba(255,255,255,.06);
      display: flex; flex-direction: column; align-items: center; gap: 3px;
    }

    /* ─── Secondary sidebar (text nav) ──────────────────────────────────── */
    .sf-sub-sidebar {
      width: 196px; min-width: 196px;
      background: var(--card); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; height: 100vh; flex-shrink: 0;
    }
    .sf-sub-header {
      padding: 18px 18px 14px; border-bottom: 1px solid var(--border);
    }
    .sf-sub-nav { flex: 1; padding: 8px 0; display: flex; flex-direction: column; }
    .sf-sub-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 18px; border: none; cursor: pointer;
      font-size: 14.5px; font-weight: 500; color: var(--muted);
      background: transparent; width: 100%; text-align: left;
      border-left: 3px solid transparent; transition: all .12s;
      font-family: inherit;
    }
    .sf-sub-item:hover  { background: var(--bg2); color: var(--text); }
    .sf-sub-item.active { background: var(--bg2); color: var(--text); font-weight: 600; border-left-color: var(--blue); }
    .sf-sub-footer {
      padding: 12px 18px; border-top: 1px solid var(--border);
      display: flex; align-items: center; gap: 7px;
    }

    /* ─── Pipeline header bar ────────────────────────────────────────────── */
    .sf-pipeline-bar {
      background: var(--card); border-bottom: 1px solid var(--border);
      padding: 0 22px; height: 60px; min-height: 60px;
      display: flex; align-items: center; gap: 12px; flex-shrink: 0;
      box-shadow: 0 1px 0 rgba(15,23,42,.04);
    }

    /* ─── Idle topbar (when no pipeline running) ─────────────────────────── */
    .sf-topbar {
      background: var(--card); border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(15,23,42,.04);
      padding: 0 24px; height: 52px; display: flex; align-items: center;
      gap: 12px; flex-shrink: 0;
    }
    .sf-breadcrumb {
      font-size: 15px; color: var(--muted);
      display: flex; align-items: center; gap: 8px; flex: 1;
    }
    .sf-breadcrumb .current { color: var(--text); font-weight: 600; }
    .sf-topbar-right { display: flex; align-items: center; gap: 10px; }
    .sf-version-chip {
      background: var(--blue-lt); border: 1px solid var(--blue-br);
      color: var(--blue); font-size: 12px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; letter-spacing: 0.03em;
    }

    /* ─── Main content ────────────────────────────────────────────────────── */
    .sf-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .sf-content { flex: 1; overflow-y: auto; padding: 20px 22px; }

    /* ─── Pipeline Activity section header ───────────────────────────────── */
    .ft-activity-hdr {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .ft-time-filter {
      display: flex; background: var(--bg2); border-radius: 6px;
      border: 1px solid var(--border); overflow: hidden;
    }
    .ft-time-btn {
      padding: 4px 13px; border: none; cursor: pointer; font-family: inherit;
      font-size: 13px; font-weight: 600; background: transparent; color: var(--muted);
      transition: all .12s;
    }
    .ft-time-btn + .ft-time-btn { border-left: 1px solid var(--border); }
    .ft-time-btn.active { background: var(--blue); color: #fff; }

    /* ─── Cards ───────────────────────────────────────────────────────── */
    .sf-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(15,23,42,.05), 0 4px 12px rgba(15,23,42,.04);
    }
    .sf-card-header {
      padding: 10px 16px; border-bottom: 1px solid var(--border-lt);
      font-size: 12.5px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 8px;
      background: #fafbfc; border-radius: 12px 12px 0 0;
    }
    .sf-card-body { padding: 14px 16px; }

    /* ─── Buttons ─────────────────────────────────────────────────────── */
    .btn-primary {
      background: var(--blue); color: #fff; border: none;
      padding: 9px 20px; border-radius: 8px; font-size: 15.5px; font-weight: 600;
      cursor: pointer; transition: all .15s; font-family: inherit;
      display: inline-flex; align-items: center; gap: 7px; letter-spacing: -0.1px;
      box-shadow: 0 1px 2px rgba(37,99,235,.2), 0 2px 8px rgba(37,99,235,.12);
    }
    .btn-primary:hover { background: var(--blue2); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,.3); }
    .btn-primary:active { transform: none; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary {
      background: var(--card); color: var(--text2);
      border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px;
      font-size: 15px; font-weight: 500; cursor: pointer; transition: all .12s;
      display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
    }
    .btn-secondary:hover { border-color: var(--blue-br); background: var(--blue-lt); color: var(--blue); }

    /* ─── Pills/tags ──────────────────────────────────────────────────── */
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 13px; font-weight: 600; white-space: nowrap;
    }
    .pill-running  { background: var(--blue-lt); color: var(--blue); border: 1px solid var(--blue-br); }
    .pill-done     { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok-br); }
    .pill-error    { background: var(--err-bg); color: var(--err); border: 1px solid var(--err-br); }
    .pill-pending  { background: var(--bg2); color: var(--light); border: 1px solid var(--border); }
    .pill-preview  { background: rgba(124,58,237,.08); color: #7c3aed; border: 1px solid rgba(124,58,237,.25); }
    .pill-skipped  { background: var(--bg2); color: var(--muted); border: 1px solid var(--border); font-style: italic; }

    /* ─── Pipeline node graph ─────────────────────────────────────────── */
    .pipeline-canvas {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 22px 18px;
      overflow-x: auto; overflow-y: visible;
    }
    .pipeline-node {
      width: 136px; flex-shrink: 0;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px 10px 10px;
      position: relative; transition: all .18s ease;
      box-shadow: 0 1px 4px rgba(15,23,42,.05);
    }
    .pipeline-node.running {
      border-color: var(--blue); background: var(--blue-lt);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1), 0 4px 16px rgba(37,99,235,.1);
    }
    .pipeline-node.done  { border-color: var(--ok); background: var(--ok-bg); }
    .pipeline-node.error { border-color: var(--err); background: var(--err-bg); }
    .pipeline-node.pending { opacity: .4; }
    .pipeline-arrow { display: flex; align-items: center; flex-shrink: 0; width: 20px; }
    .node-num { position: absolute; top: 5px; right: 7px; font-size: 10px; font-weight: 700; color: var(--light); }

    /* ─── Progress bar ────────────────────────────────────────────────── */
    .sf-progress-track { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .sf-progress-fill  { height: 100%; border-radius: 4px; transition: width .8s ease; background: linear-gradient(90deg, var(--blue), var(--ok)); }

    /* ─── Folder picker ───────────────────────────────────────────────── */
    .folder-drop-zone {
      border: 2px dashed #cbd5e1; border-radius: 10px;
      padding: 28px 24px; text-align: center; cursor: pointer;
      transition: all .18s ease; background: var(--bg2);
    }
    .folder-drop-zone:hover, .folder-drop-zone.has-path { border-color: var(--blue); background: var(--blue-lt); }
    .folder-icon { font-size: 2rem; margin-bottom: 10px; }

    /* ─── Idle hero banner ────────────────────────────────────────────── */
    .idle-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 55%, #1d4ed8 100%);
      border-radius: 14px; padding: 22px 26px; margin-bottom: 0;
      color: white; position: relative; overflow: hidden;
    }
    .idle-hero::before {
      content: ''; position: absolute; top: -80px; right: -60px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(96,165,250,.22) 0%, transparent 70%);
    }
    .idle-hero::after {
      content: ''; position: absolute; bottom: -60px; left: 10px;
      width: 300px; height: 200px;
      background: radial-gradient(ellipse, rgba(59,130,246,.1) 0%, transparent 70%);
    }

    /* ─── Stat cards ──────────────────────────────────────────────────── */
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      box-shadow: 0 1px 3px rgba(15,23,42,.04);
    }
    .stat-label { font-size: 12.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .stat-value { font-size: 30px; font-weight: 800; line-height: 1; margin-bottom: 3px; letter-spacing: -1px; }
    .stat-sub   { font-size: 12.5px; color: var(--muted); }

    /* ─── Ticker ──────────────────────────────────────────────────────── */
    .ticker-wrap { background: var(--blue-lt); border: 1px solid var(--blue-br); border-radius: 8px; padding: 10px 13px; margin-top: 10px; }
    .ticker-label { font-size: 11.5px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }

    /* ─── Hourglass ───────────────────────────────────────────────────── */
    .hg-wrap { border-radius: 10px; overflow: hidden; box-shadow: 0 0 0 1.5px rgba(37,99,235,.2), 0 6px 24px rgba(37,99,235,.12); }
    .hg-wrap canvas { display: block; border-radius: 9px; }

    /* ─── Victory ─────────────────────────────────────────────────────── */
    .victory-card {
      background: linear-gradient(145deg, #ecfdf5 0%, #f0fdf4 100%);
      border: 1.5px solid var(--ok-br); border-radius: 14px; overflow: hidden;
    }
    .victory-header {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      padding: 24px 28px; display: flex; align-items: center; gap: 18px;
    }

    /* ─── Page header ─────────────────────────────────────────────────── */
    .page-title { font-size: 24px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; }
    .page-sub   { color: var(--muted); font-size: 15.5px; line-height: 1.5; }

    /* ─── Divider ─────────────────────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 6px 0; }

    /* ─── Feature item ────────────────────────────────────────────────── */
    .feature-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 11px 14px; border-radius: 9px;
      background: var(--bg2); border: 1px solid var(--border);
      transition: all .15s;
    }
    .feature-item:hover { border-color: var(--blue-br); background: var(--blue-lt); }
    .feature-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .feature-label { font-size: 14.5px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .feature-sub   { font-size: 13px; color: var(--muted); line-height: 1.4; }

    /* ─── Input ───────────────────────────────────────────────────────── */
    .sf-input {
      flex: 1; padding: 9px 13px; border-radius: 8px;
      font-family: 'SFMono-Regular', 'Menlo', 'Consolas', monospace;
      font-size: 14.5px; border: 1.5px solid var(--border);
      outline: none; background: var(--card); color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .sf-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .sf-input.err   { border-color: var(--err); }

    /* ─── Stage result row ────────────────────────────────────────────── */
    .stage-result-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-radius: 8px;
    }
    .stage-result-row.ok   { background: var(--ok-bg); border: 1px solid var(--ok-br); }
    .stage-result-row.fail { background: var(--err-bg); border: 1px solid var(--err-br); }

    /* ─── Animations ──────────────────────────────────────────────────── */
    @keyframes spin     { to   { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes fadeIn   { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    @keyframes victoryPop { 0%{transform:scale(.93);opacity:0} 100%{transform:scale(1);opacity:1} }
    @keyframes runnerGlow {
      0%,100%{box-shadow:0 0 0 3px rgba(37,99,235,.1),0 4px 16px rgba(37,99,235,.1)}
      50%{box-shadow:0 0 0 4px rgba(37,99,235,.2),0 6px 20px rgba(37,99,235,.18)}
    }
    .spin        { animation: spin .7s linear infinite; display: inline-block; }
    .pulse       { animation: pulse 1.6s ease-in-out infinite; }
    .fade-in     { animation: fadeIn .25s ease both; }
    .victory-pop { animation: victoryPop .45s cubic-bezier(.34,1.56,.64,1) both; }
    .runner-glow { animation: runnerGlow 2s ease-in-out infinite; }

    /* ─── Agent at Work Banner ────────────────────────────────────────────── */
    .aaw-wrap {
      border-radius: 14px; overflow: hidden; position: relative;
      background: linear-gradient(130deg, #0f172a 0%, #1e293b 55%, #0f2351 100%);
      border: 1px solid rgba(96,165,250,.2);
      box-shadow: 0 0 0 1px rgba(59,130,246,.06), 0 8px 40px rgba(15,23,42,.35),
                  inset 0 1px 0 rgba(255,255,255,.04);
      display: flex; align-items: center; gap: 0; min-height: 200px;
    }
    .aaw-glow-bg {
      position: absolute; left: 0; top: 0; width: 240px; height: 100%;
      background: radial-gradient(ellipse at 50% 50%, rgba(59,130,246,.15) 0%, transparent 70%);
      animation: aawGlowPulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes aawGlowPulse { 0%,100%{opacity:.6; transform:scale(1)} 50%{opacity:1; transform:scale(1.12)} }
    .aaw-orb-col {
      width: 180px; flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; position: relative; padding: 24px 0;
    }
    .aaw-stage-counter {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,.3);
      font-family: 'Inter', system-ui, sans-serif; letter-spacing: 0.05em;
    }
    .aaw-sep {
      width: 1px; align-self: stretch;
      background: linear-gradient(to bottom, transparent 5%, rgba(96,165,250,.25) 30%,
                  rgba(96,165,250,.25) 70%, transparent 95%);
      flex-shrink: 0;
    }
    .aaw-content {
      flex: 1; padding: 28px 32px; display: flex; flex-direction: column;
      justify-content: center;
    }
    .aaw-badge {
      display: inline-flex; align-items: center; gap: 7px; margin-bottom: 14px;
      background: rgba(96,165,250,.12); border: 1px solid rgba(96,165,250,.25);
      color: var(--blue3); padding: 4px 12px; border-radius: 20px;
      font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      width: fit-content;
    }
    .aaw-badge-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--blue3);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .aaw-stage-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .aaw-stage-emoji { font-size: 1.5rem; line-height: 1; }
    .aaw-stage-name { font-size: 21px; font-weight: 900; color: #fff; letter-spacing: -0.4px; line-height: 1.1; }
    .aaw-expect { font-size: 12.5px; color: rgba(255,255,255,.48); margin-bottom: 16px; line-height: 1.55; max-width: 420px; }
    .aaw-step-box {
      background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2);
      border-radius: 8px; padding: 11px 14px; margin-bottom: 14px;
    }
    .aaw-step-label {
      font-size: 10px; font-weight: 800; color: rgba(147,197,253,.8);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
    }
    .aaw-step-text { font-size: 14px; color: rgba(255,255,255,.8); line-height: 1.5; min-height: 1.5em; transition: opacity .3s ease; }
    .aaw-bottom { display: flex; align-items: center; gap: 10px; }
    .aaw-counter {
      font-size: 12px; font-weight: 700; color: rgba(255,255,255,.35);
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
      padding: 4px 12px; border-radius: 20px;
    }
    .aaw-wave { display: flex; align-items: center; gap: 3px; height: 20px; margin-left: auto; }
    .aaw-wave span {
      width: 3px; border-radius: 2px; background: var(--blue3); opacity: .7;
      animation: aawWaveBar 1.1s ease-in-out infinite;
    }
    .aaw-wave span:nth-child(1){height:5px; animation-delay:.0s}
    .aaw-wave span:nth-child(2){height:11px;animation-delay:.1s}
    .aaw-wave span:nth-child(3){height:18px;animation-delay:.2s}
    .aaw-wave span:nth-child(4){height:9px; animation-delay:.3s}
    .aaw-wave span:nth-child(5){height:15px;animation-delay:.4s}
    .aaw-wave span:nth-child(6){height:7px; animation-delay:.15s}
    .aaw-wave span:nth-child(7){height:13px;animation-delay:.25s}
    @keyframes aawWaveBar { 0%,100%{transform:scaleY(.3);opacity:.3} 50%{transform:scaleY(1);opacity:.85} }

    /* ─── Scrollbar ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Stage metadata ────────────────────────────────────────────────────────────
const STAGE_INFO_FULL = [
  { id:'discover',  emoji:'🔍', label:'Discover',
    consumer:'Sevaforge reads your project for the first time — detecting language, framework, port, and all dependencies — so every later stage is tailored to your codebase.',

const timeSince = (ts) => {
  if (!ts) return '—';
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60) return `${d}s ago`;
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  return new Date(ts).toLocaleTimeString();
};

// ── Hourglass animation canvas ────────────────────────────────────────────────
function HourGlass({ status = 'running', size = 140 }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const cv = canvasRef.current; if (!cv) return;
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height, cx = W/2, cy = H/2;
    const TW = W*.38, TH = H*.39, NK = 2.8;
    const outlinePath = () => { ctx.beginPath(); ctx.moveTo(cx-TW,cy-TH); ctx.lineTo(cx+TW,cy-TH); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx+TW,cy+TH); ctx.lineTo(cx-TW,cy+TH); ctx.lineTo(cx-NK,cy); ctx.closePath(); };
    const topClip = () => { ctx.beginPath(); ctx.moveTo(cx-TW,cy-TH); ctx.lineTo(cx+TW,cy-TH); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx-NK,cy); ctx.closePath(); };
    const botClip = () => { ctx.beginPath(); ctx.moveTo(cx-NK,cy); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx+TW,cy+TH); ctx.lineTo(cx-TW,cy+TH); ctx.closePath(); };
    let level=0, grains=[], alive=true, rafId, last=null; const CYCLE=5500;
    const frame = (ts) => {
      if (!alive) return;
      if (last===null) last=ts;
      const dt=Math.min(ts-last,50); last=ts;
      level+=dt/CYCLE; if(level>1) level=0;
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#f0f6ff'; ctx.fillRect(0,0,W,H);
      const og=ctx.createLinearGradient(cx,cy-TH,cx,cy+TH);
      og.addColorStop(0,'rgba(37,99,235,.8)'); og.addColorStop(.5,'rgba(29,78,216,.6)'); og.addColorStop(1,'rgba(37,99,235,.8)');
      ctx.save(); outlinePath(); ctx.strokeStyle=og; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
      const topSandH=TH*(1-level), topSandY=cy-topSandH, topSandSpan=NK+(TW-NK)*topSandH/TH;
      ctx.save(); topClip(); ctx.clip();
      const tg=ctx.createLinearGradient(0,topSandY,0,cy);
      tg.addColorStop(0,'rgba(37,99,235,.18)'); tg.addColorStop(1,'rgba(37,99,235,.45)');
      ctx.beginPath(); ctx.moveTo(cx-topSandSpan,topSandY); ctx.lineTo(cx+topSandSpan,topSandY); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx-NK,cy); ctx.closePath(); ctx.fillStyle=tg; ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx-topSandSpan,topSandY); ctx.lineTo(cx+topSandSpan,topSandY); ctx.strokeStyle='rgba(37,99,235,.7)'; ctx.lineWidth=1.3; ctx.stroke(); ctx.restore();
      const botSandH=TH*level, botSandY=cy+TH-botSandH, botSandSpan=NK+(TW-NK)*botSandH/TH;
      ctx.save(); botClip(); ctx.clip();
      const bg2=ctx.createLinearGradient(0,botSandY,0,cy+TH);
      bg2.addColorStop(0,'rgba(37,99,235,.22)'); bg2.addColorStop(1,'rgba(37,99,235,.5)');
      ctx.beginPath(); ctx.moveTo(cx-botSandSpan,botSandY); ctx.lineTo(cx+botSandSpan,botSandY); ctx.lineTo(cx+TW,cy+TH); ctx.lineTo(cx-TW,cy+TH); ctx.closePath(); ctx.fillStyle=bg2; ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx-botSandSpan,botSandY); ctx.lineTo(cx+botSandSpan,botSandY); ctx.strokeStyle='rgba(37,99,235,.55)'; ctx.lineWidth=1.1; ctx.stroke(); ctx.restore();
      if (status==='running') {
        if (Math.random()<.35) grains.push({x:cx+(Math.random()-.5)*3,y:cy+1,vy:1.2+Math.random()*2,r:.7+Math.random()*.9,a:.6+Math.random()*.4});
        grains=grains.filter(g=>{ g.y+=g.vy; g.vy+=.18; if(g.y>botSandY) return false; ctx.beginPath(); ctx.arc(g.x,g.y,g.r,0,Math.PI*2); ctx.fillStyle=`rgba(37,99,235,${g.a})`; ctx.fill(); return true; });
      }
      rafId=requestAnimationFrame(frame);
    };
    rafId=requestAnimationFrame(frame);
    return ()=>{ alive=false; cancelAnimationFrame(rafId); };
  }, [status]);
  return <div className="hg-wrap" style={{width:size,height:size}}><canvas ref={canvasRef} width={size} height={size} /></div>;
}

// ── Activity ticker ───────────────────────────────────────────────────────────
function ActivityTicker({ stageId, running }) {
  const steps = (STAGE_INFO_FULL.find(s=>s.id===stageId)||{}).steps || ['Working…'];
  const [idx, setIdx] = useState(0);
  const [vis, setVis] = useState(true);
  useEffect(() => {
    if (!running) return;
    setIdx(0); setVis(true);
    const iv = setInterval(()=>{ setVis(false); setTimeout(()=>{ setIdx(i=>(i+1)%steps.length); setVis(true); },280); },4000);
    return ()=>clearInterval(iv);
  }, [stageId, running]);
  return (
    <div className="ticker-wrap">
      <div className="ticker-label">⚡ Live activity</div>
      <div style={{fontSize:'17px',color:'#1e40af',lineHeight:1.55,opacity:vis?1:0,transition:'opacity .28s',minHeight:'1.3rem'}}>
        {steps[idx]}
      </div>
      <div style={{display:'flex',gap:4,marginTop:7}}>
        {steps.map((_,i)=><span key={i} style={{width:5,height:5,borderRadius:'50%',display:'inline-block',background:i===idx?'var(--blue)':'var(--blue-br)',transition:'background .3s'}} />)}
      </div>
    </div>
  );
}

// ── Built-in folder browser (cross-platform, no OS dialog needed) ─────────────
function FolderBrowserModal({ onSelect, onCancel }) {
  const [cwd,     setCwd]     = useState(null);
  const [parent,  setParent]  = useState(null);
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(false);
  const [errMsg,  setErrMsg]  = useState('');

  const nav = async (path) => {
    setLoading(true); setErrMsg('');
    try {
      const res  = await fetch(`/api/ls?path=${encodeURIComponent(path)}`);
      const data = await res.json();
      if (data.error) { setErrMsg(data.error); setLoading(false); return; }
      setCwd(data.path); setParent(data.parent); setEntries(data.entries);
    } catch(e) { setErrMsg(`Server error: ${e.message}`); }
    setLoading(false);
  };

  useEffect(() => { nav('~'); }, []);

  // Split cwd into breadcrumb parts
  const parts = cwd ? cwd.split('/').filter(Boolean) : [];

  return (
    <div style={{
      position:'fixed',inset:0,background:'rgba(15,23,42,.55)',
      display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,
      backdropFilter:'blur(3px)',
    }}>
      <div style={{
        background:'var(--card)',borderRadius:14,width:560,maxHeight:'78vh',
        display:'flex',flexDirection:'column',
        boxShadow:'0 24px 64px rgba(15,23,42,.28),0 4px 16px rgba(15,23,42,.12)',
        border:'1px solid var(--border)',overflow:'hidden',
      }}>

        {/* Header */}
        <div style={{
          padding:'16px 20px',borderBottom:'1px solid var(--border)',
          display:'flex',alignItems:'center',gap:12,background:'#fafbfd',
        }}>
          <span style={{fontSize:'1.3rem'}}>📁</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:'17px',color:'var(--text)',marginBottom:3}}>
              Select Project Folder
            </div>
            {/* Breadcrumb */}
            <div style={{display:'flex',alignItems:'center',gap:3,flexWrap:'wrap'}}>
              <span style={{
                fontSize:'17px',color:'var(--blue)',cursor:'pointer',fontWeight:600,
              }} onClick={()=>nav('/')}>
                /
              </span>
              {parts.map((part,i)=>{
                const fullPath = '/' + parts.slice(0,i+1).join('/');
                const isLast   = i===parts.length-1;
                return (
                  <React.Fragment key={fullPath}>
                    <span style={{fontSize:'17px',color:'var(--light)'}}>›</span>
                    <span
                      onClick={()=>!isLast && nav(fullPath)}
                      style={{
                        fontSize:'17px',fontWeight:isLast?700:500,
                        color:isLast?'var(--text)':'var(--blue)',
                        cursor:isLast?'default':'pointer',
                        maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                      }}>{part}</span>
                  </React.Fragment>
                );
              })}
            </div>
          </div>
          <button onClick={onCancel} style={{
            background:'none',border:'none',cursor:'pointer',fontSize:'20px',
            color:'var(--light)',lineHeight:1,padding:'4px',
          }}>✕</button>
        </div>

        {/* Directory listing */}
        <div style={{flex:1,overflowY:'auto',padding:'8px 10px'}}>
          {/* Up one level */}
          {parent && (
            <div onClick={()=>nav(parent)} style={{
              display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
              borderRadius:7,cursor:'pointer',marginBottom:2,
              color:'var(--muted)',fontSize:'17px',fontWeight:500,
              transition:'background .1s',
            }}
            onMouseEnter={e=>e.currentTarget.style.background='var(--bg2)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{fontSize:'1rem'}}>↑</span>
              <span>.. (up one level)</span>
            </div>
          )}

          {/* Loading */}
          {loading && (
            <div style={{padding:'24px',textAlign:'center',color:'var(--muted)',fontSize:'17px'}}>
              <span className="spin" style={{display:'inline-block',marginRight:8}}>⟳</span>Loading…
            </div>
          )}

          {/* Error */}
          {errMsg && !loading && (
            <div style={{padding:'16px',color:'var(--err)',fontSize:'17px',textAlign:'center'}}>
              ⚠ {errMsg}
            </div>
          )}

          {/* Entries */}
          {!loading && entries.map(e=>(
            <div key={e.path}
              style={{
                display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
                borderRadius:7,cursor:'pointer',marginBottom:1,
                transition:'background .1s',
              }}
              onMouseEnter={ev=>ev.currentTarget.style.background='var(--bg2)'}
              onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}
              onClick={()=>nav(e.path)}
            >
              <span style={{fontSize:'1rem',flexShrink:0}}>📁</span>
              <span style={{flex:1,fontSize:'17px',color:'var(--text)',fontWeight:500,
                            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {e.name}
              </span>
              <span style={{fontSize:'17px',color:'var(--light)',flexShrink:0}}>›</span>
            </div>
          ))}

          {!loading && !errMsg && entries.length===0 && (
            <div style={{padding:'24px',textAlign:'center',color:'var(--muted)',fontSize:'17px'}}>
              No subfolders here
            </div>
          )}
        </div>

        {/* Footer — current path + confirm */}
        <div style={{
          padding:'14px 20px',borderTop:'1px solid var(--border)',
          background:'#fafbfd',display:'flex',alignItems:'center',gap:10,
        }}>
          <div style={{
            flex:1,fontFamily:'monospace',fontSize:'17px',color:'var(--muted)',
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
            background:'var(--bg2)',border:'1px solid var(--border)',
            padding:'6px 10px',borderRadius:6,
          }}>
            {cwd || '…'}
          </div>
          <button className="btn-primary" onClick={()=>cwd && onSelect(cwd)}
                  disabled={!cwd} style={{flexShrink:0,padding:'8px 18px',fontSize:'17px'}}>
            ✓ Select this folder
          </button>
        </div>
      </div>
    </div>
  );
}

}

// ── Sparkline mini bar chart ──────────────────────────────────────────────────
function Sparkline({ color='#2563eb', active=false, done=false }) {
  const bars = React.useMemo(()=>Array.from({length:8},()=>0.15+Math.random()*0.85),[]);
  return (
    <div style={{display:'flex',alignItems:'flex-end',gap:2,height:30,flexShrink:0}}>
      {bars.map((h,i)=>(
        <div key={i} style={{
          width:5, height:`${h*100}%`, borderRadius:2,
          background: done ? '#059669' : active && i>=6 ? color : color+'55',
          transition:'height .4s',
        }}/>
      ))}
    </div>
  );
}

function AgentAtWorkBanner({ currentStage, currentNum = 0, totalStages = 0 }) {
  const [stepIdx, setStepIdx] = useState(0);
  const [stepVis, setStepVis] = useState(true);

  const steps  = (currentStage && AAW_STEPS[currentStage]) || ['Preparing next stage…'];
  const meta   = STAGE_INFO_FULL.find(s => s.id === currentStage) || {};
  const emoji  = meta.emoji  || '⚡';
  const label  = meta.label  || (currentStage ? currentStage : 'Pipeline');

  // Cycle step text when stage changes
  useEffect(() => {
    setStepIdx(0); setStepVis(true);
    const iv = setInterval(() => {
      setStepVis(false);
      setTimeout(() => { setStepIdx(i => (i + 1) % steps.length); setStepVis(true); }, 350);
    }, 3200);
    return () => clearInterval(iv);
  }, [currentStage, steps.length]);

  return (
    <div className="aaw-wrap fade-in">
      {/* Ambient glow behind orb */}
      <div className="aaw-glow-bg" />

      {/* Left: hourglass */}
      <div className="aaw-orb-col">
        <HourGlass status="running" size={150} />
        {totalStages > 0 && (
          <div className="aaw-stage-counter">
            stage {currentNum || '…'} / {totalStages}
          </div>
        )}
      </div>

      {/* Vertical separator */}
      <div className="aaw-sep" />

      {/* Right: text content */}
      <div className="aaw-content">
        <div className="aaw-badge">
          <span className="aaw-badge-dot" />
          Agent at work — sit back and relax ☕
        </div>

        {/* Stage name */}
        <div className="aaw-stage-row">
          <span className="aaw-stage-emoji">{emoji}</span>
          <div className="aaw-stage-name">{label}</div>
        </div>

        {/* What to expect */}
        {meta.consumer && (
          <div className="aaw-expect">{meta.consumer}</div>
        )}

        {/* Cycling step */}
        <div className="aaw-step-box">
          <div className="aaw-step-label">⚡ Right now</div>
          <div className="aaw-step-text" style={{opacity: stepVis ? 1 : 0}}>
            {steps[stepIdx]}
          </div>
        </div>

        <div className="aaw-bottom">
          {totalStages > 0 && (
            <div className="aaw-counter">Stage {currentNum} of {totalStages}</div>
          )}
          <div className="aaw-wave">
            <span/><span/><span/><span/><span/><span/><span/>
          </div>
        </div>
      </div>
    </div>
  );
}

  const [gfCi,        setGfCi]       = useState('GitHub Actions');

  const [privateRepo,    setPrivateRepo]    = useState(true);
  const [dryRun,         setDryRun]         = useState(false);
  // selectedStages: which of the 13 stages to include in dry run (all by default)
  const [selectedStages, setSelectedStages] = useState(PIPELINE_STAGE_IDS.slice());
  const [launching,      setLaunching]      = useState(false);
  const [launchErr,      setLaunchErr]      = useState('');

  const toggleStage = (id) =>
    setSelectedStages(prev =>
      prev.includes(id) ? prev.filter(x => x !== id) : [...prev, id]
    );

  // When language changes, reset framework to first option for that lang
  const handleLangChange = (lang) => {
    setGfLang(lang);
    setGfFw((GF_FRAMEWORKS[lang] || ['None'])[0]);
  };

  const dryRunOk    = !dryRun || selectedStages.length > 0;
  const canLaunchBF = chosenPath.trim() && !launching && dryRunOk;
  const canLaunchGF = gfName.trim() && gfParent.trim() && gfClouds.length>0 && !launching && dryRunOk;

  const handleLaunch = async () => {
    setLaunching(true); setLaunchErr('');
    try {
      let body;
      if (mode === 'greenfield') {
        if (!gfName.trim() || !gfParent.trim()) { setLaunchErr('Project name and parent directory are required.'); setLaunching(false); return; }
        body = {
          greenfield:   true,
          parent_path:  gfParent.trim(),
          project_name: gfName.trim(),
          config: { app_type:gfAppType, language:gfLang, framework:gfFramework, clouds:gfClouds, database:gfDb, ci:gfCi, cd:gfCd },
        };
      } else {
        const p = chosenPath.trim();
        if (!p) { setLaunchErr('Please select a project folder first.'); setLaunching(false); return; }
        body = { path: p };
      }
      body.private = privateRepo;
      body.dry_run = dryRun;
      // Only send selected_stages when dry run is on and the selection is a subset
      if (dryRun && selectedStages.length < PIPELINE_STAGE_IDS.length) {
        body.selected_stages = selectedStages;
      }
      const res  = await fetch('/api/run', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { setLaunchErr(data.error || `Error ${res.status}`); setLaunching(false); return; }

// ── Live console (right-hand vertical log panel) ──────────────────────────────
function LiveConsole({ logs, currentStage }) {
  const scrollRef = useRef(null);

  // Auto-scroll to newest entry
  useEffect(()=>{
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [logs.length]);

  const stageLabel = id => (STAGE_INFO_FULL.find(s=>s.id===id)||{}).label || id;
  const stageEmoji = id => (STAGE_INFO_FULL.find(s=>s.id===id)||{}).emoji || '▸';

  const levelColor = lvl => {
    if (lvl==='ERROR')                    return '#f87171';
    if (lvl==='WARNING'||lvl==='WARN')    return '#fb923c';
    return 'rgba(200,210,230,.72)';
  };

  // Build a flat list, inserting a stage-header row whenever the stage changes
  const rows = [];
  let lastStage = null;
  logs.forEach((entry, i) => {
    if (entry.stage && entry.stage !== lastStage) {
      rows.push({ _header: true, stage: entry.stage, key: `h${i}` });
      lastStage = entry.stage;
    }
    rows.push({ ...entry, key: `l${i}` });
  });

  const activeMeta = STAGE_INFO_FULL.find(s=>s.id===currentStage);

  return (
    <div style={{
      display:'flex',flexDirection:'column',
      background:'#0d1117',border:'1px solid rgba(255,255,255,.09)',
      borderRadius:10,overflow:'hidden',
      position:'sticky',top:0,
      height:'calc(100vh - 108px)',minHeight:480,
    }}>
      {/* ── Header: title + live stage pill ── */}
      <div style={{
        padding:'10px 13px 9px',borderBottom:'1px solid rgba(255,255,255,.07)',
        flexShrink:0,background:'rgba(255,255,255,.025)',
      }}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom: currentStage?7:0}}>
          <span style={{
            width:7,height:7,borderRadius:'50%',flexShrink:0,display:'inline-block',
            background: currentStage ? '#22c55e' : '#374151',
            boxShadow:  currentStage ? '0 0 8px #22c55e' : 'none',
            transition:'all .3s',
          }}/>
          <span style={{fontSize:'17px',fontWeight:700,color:'rgba(255,255,255,.5)',letterSpacing:'0.1em',flex:1}}>
            LIVE OUTPUT
          </span>
          <span style={{fontSize:'17px',color:'rgba(255,255,255,.2)',fontFamily:'monospace'}}>
            {logs.length} lines
          </span>
        </div>
        {/* Active stage badge */}
        {currentStage && activeMeta && (
          <div style={{
            display:'flex',alignItems:'center',gap:6,
            padding:'5px 9px',borderRadius:6,
            background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.25)',
          }}>
            <span style={{fontSize:'17px',lineHeight:1}}>{activeMeta.emoji}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'17px',fontWeight:700,color:'#4ade80',letterSpacing:'-0.1px'}}>
                {activeMeta.label}
              </div>
              <div style={{fontSize:'17px',color:'rgba(255,255,255,.35)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {activeMeta.consumer}
              </div>
            </div>
            <span style={{
              width:6,height:6,borderRadius:'50%',background:'#22c55e',flexShrink:0,
              animation:'pulse 1.4s ease-in-out infinite',display:'inline-block',
            }}/>
          </div>
        )}
      </div>

      {/* ── Scrollable log body ── */}
      <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'4px 0',fontFamily:'monospace',fontSize:'17px',lineHeight:1.6}}>
        {logs.length===0 && (
          <div style={{padding:'32px 14px',color:'rgba(255,255,255,.15)',textAlign:'center',fontSize:'17px'}}>
            Agent output will appear here…
          </div>
        )}
        {rows.map(row => row._header
          ? (
            <div key={row.key} style={{
              padding:'8px 12px 4px',margin:'6px 0 2px',
              borderTop:'1px solid rgba(255,255,255,.05)',
              display:'flex',alignItems:'center',gap:6,
            }}>
              <span style={{fontSize:'17px'}}>{stageEmoji(row.stage)}</span>
              <span style={{fontSize:'17px',fontWeight:800,color:'rgba(99,102,241,.8)',
                textTransform:'uppercase',letterSpacing:'0.12em'}}>
                {stageLabel(row.stage)}
              </span>
              <div style={{flex:1,height:'1px',background:'rgba(255,255,255,.04)',marginLeft:4}}/>
            </div>
          ) : (
            <div key={row.key} style={{
              padding:'1px 13px',display:'flex',gap:8,alignItems:'baseline',
            }}>
              <span style={{color:'rgba(255,255,255,.16)',flexShrink:0,fontSize:'10px',minWidth:44,paddingTop:1}}>{row.t}</span>
              <span style={{color:levelColor(row.level),wordBreak:'break-word',whiteSpace:'pre-wrap',flex:1,fontSize:'17px'}}>
                {row.msg}
              </span>
            </div>
          )
        )}
      </div>
    </div>
  );
}

// ── Running / pipeline live view ──────────────────────────────────────────────
function RunningView({ liveState, logs, onReset }) {
  const { pipelinePath, stages, stageState, stageInfo, stageResults,
          currentStage, currentNum, totalStages, done, elapsed, dryRun } = liveState;

  const stageEmoji = id => (STAGE_INFO_FULL.find(s=>s.id===id)||{}).emoji || '▸';
  const stageLabel = id => (STAGE_INFO_FULL.find(s=>s.id===id)||{}).label || id;

  const allFinished = done && !currentStage;
  const hasFailed   = Object.values(stageState).some(s=>s==='error');
  // For progress counting: preview and success both count as "passed"
  const passedCount = Object.values(stageState).filter(s=>s==='success'||s==='preview').length;
  const skippedCount= Object.values(stageState).filter(s=>s==='skipped').length;
  const pct         = totalStages ? Math.round(passedCount / totalStages * 100) : 0;

  const nodeClass = id => {
    if (id===currentStage) return 'pipeline-node running runner-glow';
    const s = stageState[id];
    if (s==='success' || s==='preview') return 'pipeline-node done';
    if (s==='error')                    return 'pipeline-node error';
    if (s==='skipped')                  return 'pipeline-node pending';
    return 'pipeline-node pending';
  };

  const nodeStatus = id => {
    if (id===currentStage) return { cls:'pill pill-running', text: dryRun ? '🔬 Simulating' : 'Running' };
    const s = stageState[id];
    if (s==='preview') return { cls:'pill pill-preview', text:'Preview' };
    if (s==='success') return { cls:'pill pill-done',    text:'Done' };
    if (s==='error')   return { cls:'pill pill-error',   text:'Error' };
    if (s==='skipped') return { cls:'pill pill-skipped', text:'Skipped' };
    return { cls:'pill pill-pending', text:'Queued' };
  };

  const projectName = pipelinePath
    ? (pipelinePath.split('/').filter(Boolean).pop() || pipelinePath)
    : 'your-project';

  const statusInfo = allFinished
    ? (hasFailed ? {cls:'pill-error',text:'FAILED'} : dryRun ? {cls:'pill-preview',text:'PREVIEW'} : {cls:'pill-done',text:'COMPLETE'})
    : {cls:'pill-running', text: dryRun ? 'DRY RUN' : 'RUNNING'};

  const stColors = {
    'pill-running':'#2563eb','pill-done':'#059669','pill-error':'#dc2626',
    'pill-preview':'#7c3aed','pill-skipped':'#94a3b8','pill-pending':'#94a3b8',
  };

  return (
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:14}}>

      {/* Dry run notice */}
      {dryRun && (
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'9px 16px',borderRadius:8,
                     background:'rgba(124,58,237,.07)',border:'1px solid rgba(124,58,237,.22)'}}>
          <span>🔬</span>
          <span style={{fontSize:'15px',fontWeight:700,color:'#7c3aed'}}>Preview Mode — </span>
          <span style={{fontSize:'15px',color:'var(--muted)'}}>Agents simulate work · no files written to disk</span>
          {skippedCount > 0 && <span className="pill pill-skipped" style={{marginLeft:'auto'}}>{skippedCount} skipped</span>}
        </div>
      )}

      {/* ── Pipeline Activity header ── */}
      {stages.length > 0 && (
        <div className="ft-activity-hdr">
          <div style={{fontSize:'18px',fontWeight:700,color:'var(--text)'}}>Pipeline Activity</div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <div className="ft-time-filter">
              {['1h','12h','24h'].map((t,i)=>(
                <button key={t} className={`ft-time-btn ${t==='24h'?'active':''}`}>{t}</button>
              ))}
              <button className="ft-time-btn" style={{padding:'4px 8px',fontSize:'16px'}}>…</button>
            </div>
            <button style={{
              padding:'5px 9px',background:'var(--bg2)',border:'1px solid var(--border)',
              borderRadius:6,cursor:'pointer',fontSize:'16px',color:'var(--muted)',lineHeight:1,
            }}>↺</button>
          </div>
        </div>
      )}

      {/* ── 4-phase stats row (Fivetran style) ── */}
      {stages.length > 0 && (
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',
                     background:'var(--card)',border:'1px solid var(--border)',
                     borderRadius:12,overflow:'hidden'}}>
          {[
            {label:'Analyse',  icon:'🔍', stageIds:['discover','normalize','docs'],              color:'#6366f1'},
            {label:'Build',    icon:'🏗️', stageIds:['iac','cd','ci'],                            color:'#2563eb'},
            {label:'Quality',  icon:'🧪', stageIds:['e2e','review','test'],                      color:'#059669'},
            {label:'Ship',     icon:'🚀', stageIds:['scan','bridge','secrets','lifecycle'],       color:'#0ea5e9'},
          ].map(({label,icon,stageIds,color},gi)=>{
            const ph  = stageIds.filter(id=>stages.includes(id));
            const dn  = ph.filter(id=>stageState[id]==='success'||stageState[id]==='preview').length;
            const act = ph.some(id=>id===currentStage);
            const fl  = ph.some(id=>stageState[id]==='error');
            const complete = dn===ph.length && ph.length>0 && !fl;
            const valColor = fl?'var(--err)':complete?'var(--ok)':act?color:'var(--text)';
            return (
              <div key={label} style={{
                padding:'20px 22px',
                borderRight: gi<3 ? '1px solid var(--border)' : undefined,
              }}>
                {/* Label row */}
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:14}}>
                  <span style={{fontSize:'16px'}}>{icon}</span>
                  <span style={{fontSize:'15px',fontWeight:700,color:'var(--muted)',
                                textTransform:'uppercase',letterSpacing:'0.07em'}}>{label}</span>
                  {gi<3 && <span style={{marginLeft:'auto',fontSize:'18px',color:'var(--light)'}}>→</span>}
                </div>
                {/* Big number + sparkline */}
                <div style={{display:'flex',alignItems:'flex-end',justifyContent:'space-between',gap:8}}>
                  <div>
                    <div style={{fontSize:'34px',fontWeight:800,lineHeight:1,letterSpacing:'-1.5px',color:valColor}}>
                      {String(dn).padStart(2,'0')}
                      <span style={{fontSize:'18px',color:'var(--light)',fontWeight:400,letterSpacing:0}}>
                        .{ph.length}
                      </span>
                    </div>
                    <div style={{fontSize:'13px',color:'var(--muted)',marginTop:6,display:'flex',alignItems:'center',gap:4}}>
                      <span>⏱</span>
                      <span>{fl?'failed':act?'in progress':complete?'complete':'queued'}</span>
                    </div>
                  </div>
                  <Sparkline color={fl?'#dc2626':complete?'#059669':color} active={act} done={complete} />
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* Progress bar */}
      {totalStages > 0 && (
        <div style={{marginTop:-6}}>
          <div className="sf-progress-track" style={{height:5}}>
            <div className="sf-progress-fill" style={{width:`${pct}%`}} />
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:5,
                       fontSize:'13px',color:'var(--muted)'}}>
            <span>{pct}% · {passedCount} of {totalStages} stages complete</span>
            {elapsed>0 && <span>{elapsed}s elapsed</span>}
          </div>
        </div>
      )}

      {/* ── Jobs table (Fivetran style) ── */}
      {stages.length > 0 && (
        <div className="sf-card" style={{overflow:'hidden'}}>
          {/* Table header */}
          <div style={{
            display:'grid',gridTemplateColumns:'44px 1fr 110px 130px 200px',
            padding:'10px 18px',borderBottom:'1px solid var(--border)',
            background:'#fafbfc',gap:12,alignItems:'center',
          }}>
            <div style={{
              width:16,height:16,border:'1.5px solid #cbd5e1',borderRadius:3,
              background:'transparent',
            }}/>
            <div style={{fontSize:'13px',fontWeight:700,color:'var(--muted)',
                         textTransform:'uppercase',letterSpacing:'0.07em'}}>Jobs</div>
            <div style={{fontSize:'13px',fontWeight:700,color:'var(--muted)',
                         textTransform:'uppercase',letterSpacing:'0.07em'}}>Events</div>
            <div>
              <span style={{
                fontSize:'13px',fontWeight:600,
                background:'var(--bg2)',border:'1px solid var(--border)',
                borderRadius:20,padding:'3px 10px',color:'var(--muted)',
              }}>
                {stages.length} Total Stages
              </span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:8,justifyContent:'flex-end'}}>
              <span style={{fontSize:'13px',color:'var(--muted)'}}>
                1–{stages.length} of {stages.length}
              </span>
              <span style={{fontSize:'16px',color:'var(--light)'}}>‹ ›</span>
              <button style={{background:'none',border:'none',cursor:'pointer',
                              fontSize:'16px',color:'var(--muted)',padding:0}}>↺</button>
            </div>
          </div>

          {/* Rows */}
          {stages.map((id,i)=>{
            const ns   = nodeStatus(id);
            const meta = STAGE_INFO_FULL.find(s=>s.id===id)||{emoji:'▸',label:id,outputs:'—'};
            const res  = stageResults[id];
            const isRun= id===currentStage;
            const isDn = stageState[id]==='success'||stageState[id]==='preview';
            const isFl = stageState[id]==='error';
            const isSk = stageState[id]==='skipped';
            const isPr = stageState[id]==='preview';
            const tc   = stColors[ns.cls.replace('pill ','')] || 'var(--muted)';
            return (
              <div key={id} style={{
                display:'grid',gridTemplateColumns:'44px 1fr 110px 130px 200px',
                padding:'14px 18px',gap:12,alignItems:'center',
                borderBottom:i<stages.length-1?'1px solid var(--border-lt)':undefined,
                background:isRun?'#f0f6ff':isFl?'var(--err-bg)':undefined,
                transition:'background .25s',
              }}>
                {/* Checkbox */}
                <div style={{
                  width:16,height:16,borderRadius:3,flexShrink:0,
                  border:`1.5px solid ${isDn?'var(--ok)':isFl?'var(--err)':'#cbd5e1'}`,
                  background:isDn?'var(--ok)':isFl?'var(--err)':'transparent',
                  display:'flex',alignItems:'center',justifyContent:'center',
                  color:'#fff',fontSize:'11px',fontWeight:800,
                }}>
                  {isDn?'✓':isFl?'✕':''}
                </div>

                {/* Job name + tag + ticker */}
                <div style={{minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap',marginBottom:res?.summary||isRun?3:0}}>
                    <span style={{fontSize:'1rem',flexShrink:0}}>{meta.emoji}</span>
                    <span style={{
                      fontWeight:600,fontSize:'16px',
                      color:isRun?'var(--blue)':isFl?'var(--err)':'var(--text)',
                      overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                    }}>{meta.label}</span>
                    {isFl && (
                      <span style={{
                        fontSize:'12px',fontWeight:700,flexShrink:0,
                        background:'var(--err-bg)',color:'var(--err)',
                        border:'1px solid var(--err-br)',padding:'2px 7px',borderRadius:20,
                      }}>1 ERROR</span>
                    )}
                    {isRun && (
                      <span style={{
                        fontSize:'12px',fontWeight:700,flexShrink:0,
                        background:'var(--blue-lt)',color:'var(--blue)',
                        border:'1px solid var(--blue-br)',padding:'2px 7px',borderRadius:20,
                      }}>{dryRun?'🔬 Simulating':'Running'}</span>
                    )}
                    {isPr && !isRun && (
                      <span style={{
                        fontSize:'12px',fontWeight:700,flexShrink:0,
                        background:'rgba(124,58,237,.08)',color:'#7c3aed',
                        border:'1px solid rgba(124,58,237,.25)',padding:'2px 7px',borderRadius:20,
                      }}>Preview</span>
                    )}
                  </div>
                  {res?.summary && (
                    <div style={{fontSize:'13px',color:'var(--muted)',paddingLeft:28,
                                 overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                      {res.summary.slice(0,75)}
                    </div>
                  )}
                  {isRun && !res?.summary && (
                    <div style={{paddingLeft:28}}>
                      <ActivityTicker stageId={id} running={true} />
                    </div>
                  )}
                </div>

                {/* Events ingested */}
                <div style={{fontSize:'16px',color:'var(--text2)',fontWeight:600}}>
                  {isDn ? `${(i+1)*0.37+0.8|0}.${i+1}M` : isRun ? '—' : '—'}
                </div>

                {/* Sparkline */}
                <div>
                  {(isDn||isRun) ? (
                    <Sparkline color={isFl?'#dc2626':isDn&&!isFl?'#059669':'#2563eb'}
                               active={isRun} done={isDn&&!isFl} />
                  ) : (
                    <div style={{height:30,display:'flex',alignItems:'center'}}>
                      <div style={{
                        height:2,width:'75%',borderRadius:2,
                        background:'repeating-linear-gradient(90deg,var(--border) 0,var(--border) 5px,transparent 5px,transparent 10px)',
                      }}/>
                    </div>
                  )}
                </div>

                {/* Status + timestamp */}
                <div style={{textAlign:'right'}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'flex-end',gap:5}}>
                    {isRun && (
                      <span style={{
                        width:7,height:7,borderRadius:'50%',background:'var(--blue)',
                        display:'inline-block',animation:'pulse 1.4s ease-in-out infinite',
                      }}/>
                    )}
                    <span style={{fontSize:'15px',fontWeight:700,color:tc}}>
                      {ns.text.toUpperCase()}
                    </span>
                  </div>
                  <div style={{fontSize:'13px',color:'var(--muted)',marginTop:2}}>
                    {isDn ? `Stage ${i+1} of ${totalStages}` :
                     isRun && elapsed>0 ? `Running ${elapsed}s` :
                     !isDn && !isRun ? 'Not started yet' : ''}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}

      {/* ── Victory screen ── */}
      {allFinished && !hasFailed && (
        <div className="victory-pop" style={{
          background: dryRun
            ? 'linear-gradient(145deg,rgba(124,58,237,.06) 0%,rgba(139,92,246,.04) 100%)'
            : 'linear-gradient(145deg, #ecfdf5 0%, #f0fdf4 100%)',
          border: dryRun ? '1.5px solid rgba(124,58,237,.3)' : '1.5px solid var(--ok-br)',
          borderRadius:14, overflow:'hidden',
        }}>
          <div style={{
            background: dryRun
              ? 'linear-gradient(135deg,#7c3aed 0%,#6d28d9 100%)'
              : 'linear-gradient(135deg, #059669 0%, #047857 100%)',
            padding:'24px 28px', display:'flex', alignItems:'center', gap:18,
          }}>
            <SevaForgeLogo size={48} />
            <div style={{flex:1}}>
              <div style={{fontSize:'25px',fontWeight:900,color:'#fff',letterSpacing:'-0.6px',marginBottom:4}}>
                {dryRun ? '🔬 Dry run complete — preview ready!' : '🎉 Your AI app is cloud-ready!'}
              </div>
              <div style={{fontSize:'17px',color:'rgba(255,255,255,.8)'}}>
                {dryRun
                  ? `${stages.filter(id=>stageState[id]==='preview').length} stage${stages.filter(id=>stageState[id]==='preview').length!==1?'s':''} previewed in ${elapsed}s — no files written`
                  : <>All {totalStages} stages completed in <strong style={{color:'#fff'}}>{elapsed}s</strong></>
                }
              </div>
            </div>
            <div style={{
              background:'rgba(255,255,255,.15)',border:'1px solid rgba(255,255,255,.2)',
              padding:'8px 16px',borderRadius:8,textAlign:'center',
            }}>
              <div style={{fontSize:'25px',fontWeight:900,color:'#fff',letterSpacing:'-0.5px'}}>{elapsed}s</div>
              <div style={{fontSize:'17px',color:'rgba(255,255,255,.7)',fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>Total time</div>
            </div>
          </div>
          <div style={{padding:'22px 24px'}}>
            {dryRun ? (
              /* ── Dry run success body ── */
              <>
                <div style={{fontSize:'17px',fontWeight:700,color:'#7c3aed',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:13}}>
                  What Sevaforge would generate for you
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:18}}>
                  {stages.filter(id=>stageState[id]==='preview').map(id=>{
                    const meta = STAGE_INFO_FULL.find(s=>s.id===id)||{emoji:'◈',label:id,outputs:'—'};
                    const res  = stageResults[id]||{};
                    return (
                      <div key={id} style={{display:'flex',gap:10,padding:'9px 13px',borderRadius:8,
                                            background:'rgba(124,58,237,.07)',border:'1px solid rgba(124,58,237,.2)'}}>
                        <span style={{fontSize:'1.05rem',flexShrink:0}}>{meta.emoji}</span>
                        <div style={{minWidth:0}}>
                          <div style={{fontSize:'17px',fontWeight:700,color:'#6d28d9',marginBottom:1}}>{meta.label}</div>
                          <div style={{fontSize:'17px',color:'#7c3aed',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{meta.outputs||'—'}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div style={{
                  padding:'12px 14px',borderRadius:8,
                  background:'rgba(124,58,237,.07)',border:'1px solid rgba(124,58,237,.2)',
                  fontSize:'17px',color:'#6d28d9',lineHeight:1.6,
                }}>
                  <strong>Ready to apply?</strong> Disable Dry Run mode and click Launch to actually run the pipeline and write all generated files.
                </div>
              </>
            ) : (
              <>
                <div style={{fontSize:'17px',fontWeight:700,color:'var(--ok)',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:13}}>
                  What Sevaforge built for you
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:18}}>
                  {[
                    {emoji:'🏗️', title:'Cloud Infrastructure',   detail:'Terraform, VPC, Kubernetes, Docker'},
                    {emoji:'🚀', title:'CD Manifests',           detail:'ArgoCD, Kustomize, dev/staging/prod'},
                    {emoji:'⚙️', title:'CI/CD Workflows',        detail:'ci.yml → test.yml → cd.yml (chained)'},
                    {emoji:'📚', title:'Documentation',          detail:'Architecture, threat model, API docs'},
                    {emoji:'🧪', title:'E2E Test Suite',         detail:'Playwright specs for all user flows'},
                    {emoji:'🔒', title:'Security Report',        detail:'SAST, CVE scan, secrets detection'},
                    {emoji:'🔑', title:'Secrets Guide',          detail:'DEPLOYMENT_GUIDE.md + bootstrap script'},
                    {emoji:'📋', title:'Runbooks & SLOs',        detail:'Grafana, Prometheus, alert rules'},
                  ].map(({emoji,title,detail})=>(
                    <div key={title} style={{display:'flex',gap:10,padding:'9px 13px',borderRadius:8,
                                             background:'rgba(255,255,255,.65)',border:'1px solid var(--ok-br)'}}>
                      <span style={{fontSize:'1.05rem',flexShrink:0}}>{emoji}</span>
                      <div>
                        <div style={{fontSize:'17px',fontWeight:700,color:'#065f46',marginBottom:1}}>{title}</div>
                        <div style={{fontSize:'17px',color:'#047857'}}>{detail}</div>
                      </div>
                    </div>
                  ))}
                </div>

                <div style={{
                  background:'rgba(255,255,255,.7)',border:'1.5px solid var(--ok-br)',
                  borderRadius:10,padding:'14px 16px',marginBottom:14,
                }}>
                  <div style={{fontSize:'15px',fontWeight:800,color:'#065f46',textTransform:'uppercase',letterSpacing:'0.08em',marginBottom:10}}>
                    🚦 Deployment Checklist — complete these to go live
                  </div>

                  <div style={{display:'flex',flexDirection:'column',gap:7}}>
                    {[
                      {step:'1', icon:'🔑', label:'Bootstrap GitHub Secrets',
                       cmd:'bash scripts/bootstrap-secrets.sh',
                       note:'Interactive script — sets all required secrets via gh CLI'},
                      {step:'2', icon:'🌿', label:'Create GitHub Environments',
                       cmd:'GitHub repo → Settings → Environments',
                       note:'Add "staging" and "production" (production needs required reviewers)'},
                      {step:'3', icon:'🔗', label:'Push to main — CI fires automatically',
                       cmd:'git push origin main',
                       note:'ci.yml triggers → test.yml triggers → cd.yml triggers on success'},
                      {step:'4', icon:'✅', label:'Approve production gate',
                       cmd:'GitHub Actions → CD workflow → Review deployment',
                       note:'Staging must pass health checks before the approval gate appears'},
                    ].map(({step,icon,label,cmd,note})=>(
                      <div key={step} style={{
                        display:'flex',gap:12,padding:'9px 12px',borderRadius:8,
                        background:'rgba(5,150,105,.06)',border:'1px solid rgba(5,150,105,.18)',
                        alignItems:'flex-start',
                      }}>
                        <div style={{
                          width:24,height:24,borderRadius:'50%',background:'var(--ok)',
                          color:'#fff',fontSize:'13px',fontWeight:800,
                          display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,marginTop:1,
                        }}>{step}</div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:'15px',fontWeight:700,color:'#065f46',marginBottom:3}}>
                            {icon} {label}
                          </div>
                          <code style={{fontSize:'14px',color:'#047857',fontWeight:600,display:'block',marginBottom:2}}>{cmd}</code>
                          <div style={{fontSize:'13px',color:'#6b7280'}}>{note}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div style={{
                  background:'rgba(37,99,235,.05)',border:'1px solid rgba(37,99,235,.2)',
                  borderRadius:8,padding:'11px 14px',marginBottom:10,
                }}>
                  <div style={{fontSize:'14px',fontWeight:700,color:'#1d4ed8',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.07em'}}>
                    Workflow chain (auto-triggered after push)
                  </div>
                  <div style={{display:'flex',alignItems:'center',gap:6,fontSize:'14px',fontWeight:600,color:'#1e40af',flexWrap:'wrap'}}>
                    <span style={{padding:'3px 9px',borderRadius:5,background:'rgba(37,99,235,.12)',border:'1px solid rgba(37,99,235,.25)'}}>ci.yml</span>
                    <span style={{color:'#6b7280'}}>→</span>
                    <span style={{padding:'3px 9px',borderRadius:5,background:'rgba(37,99,235,.12)',border:'1px solid rgba(37,99,235,.25)'}}>test.yml</span>
                    <span style={{color:'#6b7280'}}>→</span>
                    <span style={{padding:'3px 9px',borderRadius:5,background:'rgba(37,99,235,.12)',border:'1px solid rgba(37,99,235,.25)'}}>cd.yml</span>
                    <span style={{color:'#6b7280',fontSize:'13px',marginLeft:4}}>staging deploy → approval gate → prod deploy → auto-rollback</span>
                  </div>
                </div>

                <div style={{display:'flex',gap:10}}>
                  <div style={{flex:1,background:'rgba(255,255,255,.6)',border:'1px solid var(--ok-br)',borderRadius:8,padding:'11px 14px'}}>
                    <div style={{fontSize:'15px',fontWeight:700,color:'var(--ok)',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.06em'}}>View PR</div>
                    <code style={{fontSize:'15px',color:'#065f46',fontWeight:600}}>gh pr view --web</code>
                  </div>
                  <div style={{flex:1,background:'rgba(255,255,255,.6)',border:'1px solid var(--ok-br)',borderRadius:8,padding:'11px 14px'}}>
                    <div style={{fontSize:'15px',fontWeight:700,color:'var(--ok)',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.06em'}}>Secrets guide</div>
                    <code style={{fontSize:'15px',color:'#065f46',fontWeight:600}}>docs/DEPLOYMENT_GUIDE.md</code>
                  </div>
                </div>
              </>
            )}

            {/* Back to home */}
            <div style={{marginTop:14,paddingTop:14,borderTop:`1px solid ${dryRun?'rgba(124,58,237,.15)':'rgba(255,255,255,.15)'}`,display:'flex',justifyContent:'center'}}>
              <button onClick={onReset} style={{
                padding:'10px 28px',borderRadius:8,
                border: dryRun ? '1.5px solid rgba(124,58,237,.4)' : '1.5px solid rgba(255,255,255,.4)',
                background: dryRun ? 'rgba(124,58,237,.15)' : 'rgba(255,255,255,.15)',
                color:'#fff',cursor:'pointer',
                fontSize:'17px',fontWeight:600,letterSpacing:'-0.1px',
                display:'flex',alignItems:'center',gap:8,
              }}>
                ← Run Another Pipeline
              </button>
            </div>
          </div>
        </div>
      )}

      {/* ── Failure banner ── */}
      {allFinished && hasFailed && (
        <div style={{
          background:'var(--err-bg)',border:'1.5px solid var(--err-br)',
          borderRadius:12,padding:'18px 22px',
        }}>
          <div style={{display:'flex',alignItems:'center',gap:16,marginBottom:14}}>
            <span style={{fontSize:'2rem',flexShrink:0}}>⚠️</span>
            <div>
              <div style={{fontWeight:700,fontSize:'17px',color:'var(--err)',marginBottom:4,letterSpacing:'-0.2px'}}>
                Pipeline completed with errors
              </div>
              <div style={{fontSize:'17px',color:'#b91c1c',lineHeight:1.5}}>
                Review the stage results above — most issues are fixable in one command.
                Re-run the pipeline after fixing.
              </div>
            </div>
          </div>
          <div style={{paddingTop:12,borderTop:'1px solid var(--err-br)',display:'flex',justifyContent:'center'}}>
            <button onClick={onReset} style={{
              padding:'9px 24px',borderRadius:8,border:'1.5px solid var(--err-br)',
              background:'var(--err-bg)',color:'var(--err)',cursor:'pointer',
              fontSize:'17px',fontWeight:600,display:'flex',alignItems:'center',gap:7,
            }}>
              ← Run Another Pipeline
            </button>
          </div>
        </div>
      )}

      {/* ── AgentAtWorkBanner — shown while a stage is running ── */}
      {currentStage && !allFinished && (
        <AgentAtWorkBanner currentStage={currentStage} currentNum={currentNum} totalStages={totalStages} />
      )}

    </div>
  );
}

// ── Dashboard overview ────────────────────────────────────────────────────────
// ── Shared page header ────────────────────────────────────────────────────────
function PageHeader({ title, sub, action }) {
  return (
    <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',
                 paddingBottom:16,borderBottom:'1px solid var(--border)',marginBottom:4}}>
      <div>
        <div style={{fontSize:'20px',fontWeight:800,color:'var(--text)',letterSpacing:'-0.4px',marginBottom:3}}>{title}</div>
        <div style={{fontSize:'14px',color:'var(--muted)'}}>{sub}</div>
      </div>
      {action}
    </div>
  );
}

// ── Shared stat card ──────────────────────────────────────────────────────────
function StatTile({ label, value, sub, color, icon }) {
  return (
    <div style={{
      background:'var(--card)',border:'1px solid var(--border)',borderRadius:12,
      padding:'18px 20px',boxShadow:'0 1px 3px rgba(15,23,42,.04)',
    }}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontSize:'12px',fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:'0.07em'}}>{label}</div>
        {icon && <span style={{fontSize:'18px',opacity:.5}}>{icon}</span>}
      </div>
      <div style={{fontSize:'28px',fontWeight:800,lineHeight:1,letterSpacing:'-1px',color:color||'var(--text)',marginBottom:4}}>{value}</div>
      {sub && <div style={{fontSize:'13px',color:'var(--muted)'}}>{sub}</div>}
    </div>
  );
}

// ── Dashboard — executive overview ────────────────────────────────────────────
function DashboardView({ history, connected, onNavigate }) {
  const runs      = history.length;
  const successes = history.filter(r=>r.status==='success').length;
  const failures  = runs - successes;
  const rate      = runs ? Math.round(successes/runs*100) : null;
  const last      = history[0];
  const avgTime   = runs ? Math.round(history.filter(r=>r.elapsed).reduce((a,r)=>a+r.elapsed,0) / (history.filter(r=>r.elapsed).length||1)) : null;

  const PHASES = [
    {label:'Analyse', stages:['discover','normalize','docs'],  color:'#6366f1', icon:'🔍', desc:'Code understanding, normalization, docs'},
    {label:'Build',   stages:['iac','cd','ci'],                color:'#2563eb', icon:'🏗️', desc:'Terraform, ArgoCD, GitHub Actions'},
    {label:'Quality', stages:['e2e','review','test'],          color:'#059669', icon:'🧪', desc:'Playwright E2E, code review, unit tests'},
    {label:'Ship',    stages:['scan','bridge','secrets','lifecycle'], color:'#0ea5e9', icon:'🚀', desc:'Security scan, GitHub push, secrets bootstrap, CI/CD lifecycle'},
  ];

  return (
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <PageHeader title="Dashboard" sub="AIDDaaS pipeline overview — ForgeFlow v2.1" />

      {/* KPI row */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
        <StatTile label="Pipeline Runs"  value={runs||0}
          sub={runs?`${successes} passed · ${failures} failed`:'No runs yet'}
          color="#6366f1" icon="▶" />
        <StatTile label="Success Rate"   value={rate!=null?`${rate}%`:'—'}
          sub={runs?`${successes} of ${runs} passed`:'Run a pipeline first'}
          color={rate==null?'var(--muted)':rate>=80?'var(--ok)':rate>50?'var(--warn)':'var(--err)'} icon="◉" />
        <StatTile label="Avg Pipeline Time" value={avgTime?`${avgTime}s`:'—'}
          sub={avgTime?'across all completed runs':'No timing data yet'}
          color="var(--text)" icon="⏱" />
        <StatTile label="Server"  value={connected?'Live':'Offline'}
          sub={connected?'Real-time events active':'Run forgeflow dashboard'}
          color={connected?'var(--ok)':'var(--err)'} icon="◈" />
      </div>

      {/* Pipeline phases — what gets built */}
      <div className="sf-card">
        <div className="sf-card-header">What the pipeline builds</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)'}}>
          {PHASES.map(({label,stages,color,icon,desc},gi)=>(
            <div key={label} style={{
              padding:'18px 20px',
              borderRight:gi<3?'1px solid var(--border)':undefined,
            }}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:10}}>
                <span style={{
                  width:32,height:32,borderRadius:8,flexShrink:0,
                  background:`${color}18`,border:`1px solid ${color}30`,
                  display:'flex',alignItems:'center',justifyContent:'center',fontSize:'16px',
                }}>{icon}</span>
                <div>
                  <div style={{fontWeight:700,fontSize:'14px',color:'var(--text)'}}>{label}</div>
                  <div style={{fontSize:'12px',color:'var(--muted)'}}>{stages.length} stages</div>
                </div>
              </div>
              <div style={{fontSize:'13px',color:'var(--muted)',lineHeight:1.5,marginBottom:10}}>{desc}</div>
              <div style={{display:'flex',flexWrap:'wrap',gap:4}}>
                {stages.map(s=>{
                  const meta=STAGE_INFO_FULL.find(x=>x.id===s)||{emoji:'▸',label:s};
                  return (
                    <span key={s} style={{
                      fontSize:'12px',fontWeight:600,padding:'2px 8px',borderRadius:20,
                      background:`${color}10`,color,border:`1px solid ${color}25`,
                    }}>{meta.emoji} {meta.label}</span>
                  );
                })}
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Recent activity table */}
      <div className="sf-card" style={{overflow:'hidden'}}>
        <div className="sf-card-header" style={{justifyContent:'space-between'}}>
          <span>Recent runs</span>
          {history.length>0 && (
            <button onClick={()=>onNavigate('history')} style={{
              background:'none',border:'none',cursor:'pointer',fontFamily:'inherit',
              fontSize:'13px',color:'var(--blue)',fontWeight:600,padding:0,
            }}>View all →</button>
          )}
        </div>
        {history.length===0 ? (
          <div style={{padding:'40px 24px',textAlign:'center',color:'var(--muted)',fontSize:'15px'}}>
            No runs yet — launch a pipeline from the Pipeline tab.
          </div>
        ) : (
          <div>
            {/* Table header */}
            <div style={{display:'grid',gridTemplateColumns:'32px 1fr 80px 80px 100px',
                         padding:'8px 18px',background:'#fafbfc',borderBottom:'1px solid var(--border)',
