name: Terraform — Provision OCI Infrastructure

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy from"
        required: true
        default: "gui-polish"
      action:
        required: true
        default: plan
        type: choice
        options: [plan, apply, destroy]

env:
  TF_WORKING_DIR: forgeflow/infrastructure/oci
  OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Confirm branch and directory
        run: |
          echo "Branch → $(git branch --show-current)"
          echo "Commit → $(git rev-parse --short HEAD)"
          ls ${{ env.TF_WORKING_DIR }}/

      - name: Write OCI private key
        run: |
          mkdir -p ~/.oci
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          {
            echo "[DEFAULT]"
            echo "user=${{ secrets.OCI_USER_OCID }}"
            echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}"
            echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}"
            echo "region=${{ secrets.OCI_REGION }}"
            echo "key_file=$HOME/.oci/oci_api_key.pem"
          } > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Verify OCI auth
        run: oci iam region list --output table

      - name: Restore Terraform state
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_STATE: ${{ secrets.TF_STATE }}
        run: |
          if [ -n "${TF_STATE}" ]; then
            echo "${TF_STATE}" | base64 -d > terraform.tfstate
            echo "✅ State restored ($(wc -c < terraform.tfstate) bytes)"
          else
            echo "No previous state — fresh run"
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # Migrate state if coming from the count-based node pool experiment
      - name: Migrate state (if needed)
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          if terraform state list 2>/dev/null | grep -q '^oci_containerengine_node_pool\.arm\[0\]$'; then
            echo "Migrating: arm[0] → arm"
            terraform state mv \
              'oci_containerengine_node_pool.arm[0]' \
              'oci_containerengine_node_pool.arm' || true
          fi
          # Remove any leftover AMD fallback from state
          if terraform state list 2>/dev/null | grep -q 'amd_fallback'; then
            echo "Removing stale AMD fallback from state"
            terraform state rm 'oci_containerengine_node_pool.amd_fallback[0]' 2>/dev/null || true
            terraform state rm 'data.oci_containerengine_node_pool_option.opts[0]' 2>/dev/null || true
            terraform state rm 'data.oci_core_images.ol8_x86[0]' 2>/dev/null || true
          fi

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:     ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:        ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:      ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path: /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:           ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:   ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          terraform plan -out=tfplan -input=false
          terraform show -no-color tfplan

      # Apply with retry — ARM capacity in IAD is intermittent
      - name: Terraform apply (with retry)
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:     ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:        ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:      ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path: /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:           ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:   ${{ secrets.OCI_TENANCY_OCID }}
        run: |
          MAX_RETRIES=3
          WAIT_SECONDS=120
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "::group::Attempt $attempt of $MAX_RETRIES"
            if terraform apply -auto-approve -input=false tfplan; then
              echo "✅ Apply succeeded on attempt $attempt"
              echo "::endgroup::"
              exit 0
            fi
            echo "::endgroup::"
            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "⏳ Apply failed (likely ARM capacity) — waiting ${WAIT_SECONDS}s before retry..."
              sleep $WAIT_SECONDS
              # Re-plan in case state changed
              terraform plan -out=tfplan -input=false
            fi
          done
          echo "::error::Apply failed after $MAX_RETRIES attempts"
          exit 1

      - name: Save Terraform state
        if: always() && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy')
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          STATE_FILE="terraform.tfstate"
          [ ! -f "$STATE_FILE" ] && STATE_FILE="errored.tfstate"
          if [ -f "$STATE_FILE" ]; then
            gh secret set TF_STATE --repo "${{ github.repository }}" --body "$(base64 -w0 $STATE_FILE)"
            echo "✅ State saved ($(wc -c < $STATE_FILE) bytes)"
          fi

      - name: Save cluster outputs
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          CLUSTER_ID=$(terraform output -raw cluster_id)
          gh secret set OKE_CLUSTER_ID --repo "${{ github.repository }}" --body "$CLUSTER_ID"
          echo "✅ Cluster ID: $CLUSTER_ID"

      - name: Generate and save kubeconfig
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          CLUSTER_ID=$(terraform output -raw cluster_id)
          mkdir -p ~/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id "$CLUSTER_ID" \
            --region "${{ secrets.OCI_REGION }}" \
            --token-version 2.0.0 \
            --file ~/.kube/sevaforge-config
          gh secret set KUBE_CONFIG \
            --repo "${{ github.repository }}" \
            --body "$(base64 -w0 ~/.kube/sevaforge-config)"
          echo "✅ Kubeconfig saved"

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:     ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:        ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:      ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path: /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:           ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:   ${{ secrets.OCI_TENANCY_OCID }}
        run: terraform destroy -auto-approve -input=false

      - name: Job summary
        if: always()
        run: |
          echo "## Terraform ${{ github.event.inputs.action }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: ${{ github.event.inputs.branch }}" >> "$GITHUB_STEP_SUMMARY"
