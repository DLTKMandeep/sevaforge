<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sevaforge — No Charge as a Service Hub</title>

  <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    /* ── Sevaforge Design System ───────────────────────────────────────────── */
    :root {
      --sidebar-w: 260px;
      --forge-amber: #f59e0b;
      --forge-purple: #7c3aed;
      --forge-glow: rgba(245,158,11,0.35);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      /* Forge-branded deep background with subtle grid */
      background-color: #0d0d14;
      background-image:
        radial-gradient(ellipse 60% 40% at 15% 10%, rgba(124,58,237,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 85%, rgba(245,158,11,0.07) 0%, transparent 55%),
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      background-attachment: fixed;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); }
    .main-content { width: calc(100vw - var(--sidebar-w)); }
    .stage-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .stage-card { transition: all .18s ease; }
    .stage-card:hover { transform: translateY(-2px); }

    /* ── Brand logo ─────────────────────────────────────────────────────── */
    .seva-logo-hex polygon { stroke: url(#logoGrad); }
    .seva-logo-hex path    { fill:   url(#logoGrad); }
    .brand-gradient {
      background: linear-gradient(135deg, var(--forge-amber) 0%, var(--forge-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .seva-wordmark {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(100deg, #f59e0b 0%, #c084fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── NoCaaS badge ───────────────────────────────────────────────────── */
    .nocaas-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 999px;
      background: linear-gradient(135deg, rgba(245,158,11,.12), rgba(124,58,237,.12));
      border: 1px solid rgba(245,158,11,.25);
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.04em;
      color: #fbbf24;
      backdrop-filter: blur(4px);
    }
    .nocaas-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 6px #f59e0b;
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* ── Animations ─────────────────────────────────────────────────────── */
    .spin { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .slide-in { animation: slideIn .25s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .finding-row:not(:last-child) { border-bottom: 1px solid oklch(var(--b3)); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
    .step-running > .step-content { animation: pulse 1.2s ease-in-out infinite; }

    /* Forge fire flicker on the logo while pipeline runs */
    @keyframes forgeFlicker {
      0%,100% { filter: drop-shadow(0 0 5px rgba(245,158,11,.7)); }
      33%     { filter: drop-shadow(0 0 12px rgba(245,158,11,.9)) drop-shadow(0 0 24px rgba(245,158,11,.3)); }
      66%     { filter: drop-shadow(0 0 8px rgba(245,158,11,.5)); }
    }
    .forge-fire { animation: forgeFlicker 1.8s ease-in-out infinite; }

    /* Sand settle — fills stage card from bottom when stage completes */
    .sand-fill-success { position:relative; overflow:hidden; }
    .sand-fill-success::after {
      content:''; position:absolute; inset:0;
      background: linear-gradient(to top, rgba(34,197,94,.18) 0%, rgba(34,197,94,.04) 100%);
      animation: sandRise .8s cubic-bezier(.22,1,.36,1) forwards;
    }
    .sand-fill-error::after {
      content:''; position:absolute; inset:0;
      background: linear-gradient(to top, rgba(239,68,68,.2) 0%, rgba(239,68,68,.05) 100%);
      animation: sandRise .8s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes sandRise {
      from { clip-path: inset(100% 0 0 0); }
      to   { clip-path: inset(0% 0 0 0); }
    }

    /* Stage card ring-burst on completion */
    @keyframes burstFlash {
      0%  { box-shadow: 0 0 0 0 rgba(34,197,94,.8); }
      70% { box-shadow: 0 0 0 16px rgba(34,197,94,0); }
      100%{ box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    .burst-success { animation: burstFlash .55s ease-out; }
    @keyframes burstFlashErr {
      0%  { box-shadow: 0 0 0 0 rgba(239,68,68,.8); }
      70% { box-shadow: 0 0 0 16px rgba(239,68,68,0); }
      100%{ box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }
    .burst-error { animation: burstFlashErr .55s ease-out; }

    /* Pendulum canvas container glow */
    .pendulum-wrap { border-radius: 12px; overflow: hidden; position: relative; }
    .pendulum-wrap::before {
      content:''; position:absolute; inset:-1px; border-radius:13px;
      background: linear-gradient(135deg, rgba(245,158,11,.4), rgba(124,58,237,.4));
      z-index:0;
    }
    .pendulum-wrap canvas { position:relative; z-index:1; border-radius:11px; display:block; }

    /* Stat colors */
    .stat-primary .stat-value { color: oklch(var(--p)); }
    .stat-success .stat-value { color: oklch(var(--su)); }
    .stat-warning .stat-value { color: oklch(var(--wa)); }
    .stat-error   .stat-value { color: oklch(var(--er)); }

    /* Live view hero */
    .live-hero {
      background: linear-gradient(135deg, rgba(124,58,237,.12) 0%, rgba(245,158,11,.08) 100%);
      border: 1px solid rgba(245,158,11,.15);
      border-radius: 16px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body class="bg-base-300 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Data ──────────────────────────────────────────────────────────────────────

const STAGES = [
  { id:'discover',  label:'Discover',  emoji:'🔍', endpoint:'/api/v1/discover',  desc:'Scan structure',      color:'primary',   tag:null },
  { id:'normalize', label:'Normalize', emoji:'🔧', endpoint:'/api/v1/normalize', desc:'Standardize repo',    color:'primary',   tag:null },
  { id:'docs',      label:'Docs',      emoji:'📚', endpoint:'/api/v1/docs',      desc:'Documentation',       color:'secondary', tag:null },
  { id:'iac',       label:'IAC',       emoji:'🏗️',  endpoint:'/api/v1/iac',       desc:'Infra as Code',       color:'accent',    tag:'v2.1' },
  { id:'cd',        label:'CD',        emoji:'🚀', endpoint:'/api/v1/cd',        desc:'Deployment config',   color:'accent',    tag:'v2.1' },
  { id:'ci',        label:'CI',        emoji:'⚙️',  endpoint:'/api/v1/ci',        desc:'CI pipelines',        color:'accent',    tag:'v2.1' },
  { id:'e2e',       label:'E2E',       emoji:'🧪', endpoint:'/api/v1/e2e',       desc:'E2E test setup',      color:'accent',    tag:'v2.1' },
  { id:'review',    label:'Review',    emoji:'👁️',  endpoint:'/api/v1/review',    desc:'Code quality',        color:'info',      tag:null },
  { id:'test',      label:'Test',      emoji:'✅', endpoint:'/api/v1/test',      desc:'Run test suite',      color:'info',      tag:null },
  { id:'scan',      label:'Scan',      emoji:'🔒', endpoint:'/api/v1/scan',      desc:'Security scan',       color:'warning',   tag:null },
  { id:'bridge',    label:'Bridge',    emoji:'🌉', endpoint:'/api/v1/bridge',    desc:'GitHub sync',         color:'secondary', tag:null },
  { id:'generate',  label:'Generate',  emoji:'📦', endpoint:'/api/v1/generate',  desc:'Artifacts',           color:'primary',   tag:null },
  { id:'deploy',    label:'Deploy',    emoji:'☁️',  endpoint:'/api/v1/deploy',    desc:'Deploy to cloud',     color:'error',     tag:'post-merge' },
  { id:'monitor',   label:'Monitor',   emoji:'📊', endpoint:'/api/v1/monitor',   desc:'Observability stack', color:'success',   tag:'post-merge' },
];

const VIEWS = [
  { id:'live',      label:'Live Run',   icon:'⚡' },
  { id:'dashboard', label:'Dashboard',  icon:'◈' },
  { id:'pipeline',  label:'Pipeline',   icon:'▶' },
  { id:'health',    label:'Health',     icon:'♥' },
  { id:'history',   label:'History',    icon:'◷' },
  { id:'settings',  label:'Settings',   icon:'⚙' },
];

// ── API Hook ──────────────────────────────────────────────────────────────────

function useApi({ apiUrl, apiKey }) {
  return useCallback(async (method, path, body) => {
    const headers = { 'Content-Type': 'application/json' };
    if (apiKey) headers['X-API-Key'] = apiKey;
    const res = await fetch(`${apiUrl}${path}`, {
      method, headers,
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error(`HTTP ${res.status}${txt ? ': ' + txt.slice(0,120) : ''}`);
    }
    return res.json();
  }, [apiUrl, apiKey]);
}

// ── Small helpers ─────────────────────────────────────────────────────────────

const timeSince = (ts) => {
  if (!ts) return '—';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return new Date(ts).toLocaleTimeString();
};

function StatusBadge({ status }) {
  const map = {
    success: 'badge-success',  running: 'badge-warning',
    error:   'badge-error',    warning: 'badge-warning',
    healthy: 'badge-success',  down:    'badge-error',
  };
  const labels = {
    success:'Success', running:'Running', error:'Error',
    warning:'Warning', healthy:'Healthy', down:'Offline',
  };
  return (
    <span className={`badge badge-sm font-semibold ${map[status] || 'badge-ghost'}`}>
      {labels[status] || status}
    </span>
  );
}

function Spinner({ size = 'sm' }) {
  return <span className={`loading loading-spinner loading-${size}`} />;
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function ToastStack({ toasts }) {
  return (
    <div className="toast toast-end toast-bottom z-50">
      {toasts.map(t => (
        <div key={t.id} className={`alert shadow-lg slide-in ${t.type === 'error' ? 'alert-error' : t.type === 'success' ? 'alert-success' : 'alert-info'}`}>
          <span className="text-sm">{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────

const STAGE_INFO_FULL = [
  { id:'discover',  emoji:'🔍', label:'Discover',  purpose:'Map codebase — detect language, frameworks, entry points, port, deps', outputs:'Tech stack · Entry points · Port · Dependency list' },
  { id:'normalize', emoji:'🔧', label:'Normalize', purpose:'Standardize repo structure — add .gitignore, README, linting configs', outputs:'.gitignore · README.md · pyproject.toml · .editorconfig' },
  { id:'docs',      emoji:'📚', label:'Docs',      purpose:'Generate architecture diagrams, threat models, ERDs, API docs', outputs:'ARCHITECTURE.md · THREAT_MODEL.md · ERD · deployment diagram' },
  { id:'iac',       emoji:'🏗️',  label:'IAC',       purpose:'Generate Terraform + Docker for your detected cloud stack', outputs:'main.tf · variables.tf · Dockerfile · docker-compose.yml' },
  { id:'cd',        emoji:'🚀', label:'CD',        purpose:'Generate ArgoCD, Kustomize, and Kubernetes deployment manifests', outputs:'deploy.yml · argocd app · k8s manifests · kustomize overlays' },
  { id:'ci',        emoji:'⚙️',  label:'CI',        purpose:'Generate chained GitHub Actions pipeline — Security → Tests → Build', outputs:'pipeline.yml · release.yml · .gitlab-ci.yml · dependabot.yml' },
  { id:'e2e',       emoji:'🧪', label:'E2E',       purpose:'Scaffold Playwright E2E tests and CI workflow for API endpoints', outputs:'playwright.config.ts · tests/e2e/*.spec.ts · e2e.yml' },
  { id:'review',    emoji:'👁️',  label:'Review',    purpose:'AI code review — quality, patterns, complexity, dead code', outputs:'Code quality report · Improvement suggestions · Findings list' },
  { id:'test',      emoji:'✅', label:'Test',      purpose:'Run unit tests, measure coverage, report failures', outputs:'Test results · Coverage % · Failing test details' },
  { id:'scan',      emoji:'🔒', label:'Scan',      purpose:'Security vulnerability scan — SAST, deps, secrets detection', outputs:'SARIF report · CVE list · Severity-classified findings' },
  { id:'bridge',    emoji:'🌉', label:'Bridge',    purpose:'Push all generated files to GitHub, create PR if needed', outputs:'GitHub repo · All generated files committed · PR link' },
  { id:'deploy',    emoji:'☁️',  label:'Deploy',    purpose:'Deploy to cloud (AWS EKS / GCP Cloud Run / Azure AKS)', outputs:'Live deployment URL · Health check · Rollback plan' },
  { id:'monitor',   emoji:'📊', label:'Monitor',   purpose:'Set up Prometheus, Grafana, alerts, SLOs, dashboards', outputs:'prometheus.yml · grafana dashboards · alert rules · SLO config' },
];

function DashboardView({ history, connected, onNavigate }) {
  const runs       = history.length;
  const successes  = history.filter(r => r.status === 'success').length;
  const rate       = runs ? Math.round(successes / runs * 100) : null;
  const last       = history[0];
  const totalStages = history.reduce((a,r) => a + (r.stageCount||0), 0);

  return (
    <div className="slide-in space-y-6">

      {/* Hero */}
      <div className="live-hero flex items-center gap-5 px-6 py-5">
        <SevaForgeLogo size={56} />
        <div className="flex-1">
          <div className="seva-wordmark text-2xl mb-1">Sevaforge</div>
          <NoCaaSBadge />
          <p className="text-sm opacity-50 mt-2">AI Platform Engineering · 14-stage pipeline automation · ForgeFlow v2.1</p>
        </div>
        <div className="flex flex-col items-end gap-2">
          <span className={`badge gap-1 ${connected===true?'badge-success':connected===false?'badge-error':'badge-ghost'}`}>
            <span className={`w-1.5 h-1.5 rounded-full bg-current ${connected===true?'animate-pulse':''}`}/>
            {connected===true?'Dashboard Live':connected===false?'Disconnected':'Connecting…'}
          </span>
          <span className="text-xs font-mono opacity-30">localhost · SSE stream</span>
        </div>
      </div>

      {/* Run stats — from SSE history */}
      <div className="grid grid-cols-4 gap-3">
        {[
          { label:'Pipeline Runs',    value: runs || '0',        sub:'total executions',        color:'#818cf8' },
          { label:'Success Rate',     value: rate!=null?`${rate}%`:'—', sub:`${successes} passed`, color: rate>=80?'#34d399':rate>50?'#fbbf24':'#f87171' },
          { label:'Last Run',         value: last?(last.status==='success'?'Passed':'Failed'):'None', sub:last?timeSince(last.ts):'no runs yet', color:last?(last.status==='success'?'#34d399':'#f87171'):'#6b7280' },
          { label:'Stages Run',       value: totalStages || '0', sub:'across all runs',         color:'#f59e0b' },
        ].map(({label,value,sub,color}) => (
          <div key={label} className="card bg-base-200/80 shadow">
            <div className="card-body py-4 px-5">
              <div className="text-xs uppercase tracking-widest opacity-40 mb-1">{label}</div>
              <div className="text-2xl font-bold" style={{color}}>{value}</div>
              <div className="text-xs opacity-40">{sub}</div>
            </div>
          </div>
        ))}
      </div>

      {/* Quick start */}
      <div className="card bg-base-200/80 shadow">
        <div className="card-body py-4">
          <h3 className="text-xs font-bold uppercase tracking-widest opacity-40 mb-3">⚡ Quick Start</h3>
          <div className="grid grid-cols-2 gap-3">
            {[
              { step:'1', label:'Run full pipeline with live GUI', cmd:'forgeflow run-all --gui ~/your-repo' },
              { step:'2', label:'Run a single stage', cmd:'forgeflow discover --path ~/your-repo' },
              { step:'3', label:'Check what ForgeFlow will generate', cmd:'forgeflow iac --cloud aws --path ~/repo' },
              { step:'4', label:'Push everything to GitHub', cmd:'forgeflow bridge --path ~/your-repo' },
            ].map(({step,label,cmd}) => (
              <div key={step} className="rounded-xl p-3"
                   style={{background:'rgba(124,58,237,.08)', border:'1px solid rgba(124,58,237,.15)'}}>
                <div className="text-xs opacity-50 mb-1">Step {step} — {label}</div>
                <code className="text-xs font-mono text-warning block">{cmd}</code>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Pipeline stages overview */}
      <div className="card bg-base-200/80 shadow">
        <div className="card-body py-4">
          <h3 className="text-xs font-bold uppercase tracking-widest opacity-40 mb-4">📋 Pipeline Stages — What Each One Does</h3>
          <div className="grid grid-cols-2 gap-2">
            {STAGE_INFO_FULL.slice(0,10).map((s,i) => (
              <div key={s.id} className="flex items-start gap-3 rounded-lg px-3 py-2"
                   style={{background:'rgba(255,255,255,.03)', border:'1px solid rgba(255,255,255,.05)'}}>
                <span className="text-xl flex-shrink-0 mt-0.5">{s.emoji}</span>
                <div className="min-w-0">
                  <div className="font-semibold text-sm" style={{color:'#c4b5fd'}}>{s.label}</div>
                  <div className="text-xs opacity-50 leading-relaxed">{s.purpose}</div>
                  <div className="text-xs mt-1 opacity-35 truncate">→ {s.outputs}</div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Recent runs */}
      {history.length > 0 && (
        <div className="card bg-base-200/80 shadow">
          <div className="card-body py-4">
            <div className="flex items-center justify-between mb-3">
              <h3 className="text-xs font-bold uppercase tracking-widest opacity-40">◷ Recent Runs</h3>
              <button className="btn btn-xs btn-ghost opacity-50" onClick={() => onNavigate('history')}>View all →</button>
            </div>
            <div className="space-y-1.5">
              {history.slice(0,5).map((r,i) => (
                <div key={i} className="flex items-center gap-3 rounded-lg px-3 py-2"
                     style={{background: r.status==='success'?'rgba(6,50,40,.3)':'rgba(60,10,10,.3)',
                             border: r.status==='success'?'1px solid rgba(52,211,153,.15)':'1px solid rgba(239,68,68,.15)'}}>
                  <span style={{color: r.status==='success'?'#34d399':'#f87171'}}>
                    {r.status==='success'?'✓':'✗'}
                  </span>
                  <span className="font-mono text-xs flex-1 truncate opacity-70">{r.path || '—'}</span>
                  <span className="text-xs opacity-40">{r.stageCount||0} stages</span>
                  <span className="text-xs opacity-30">{timeSince(r.ts)}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Pipeline ──────────────────────────────────────────────────────────────────

function PipelineView() {
  const [expanded, setExpanded] = useState(null);

  const CORE   = STAGE_INFO_FULL.slice(0, 10);
  const POST   = STAGE_INFO_FULL.slice(10);
  const FLOW   = ['discover','normalize','docs','iac','cd','ci','e2e','review','test','scan','▶ APPROVAL','bridge'];
  const COLORS = ['#818cf8','#818cf8','#c084fc','#f59e0b','#f59e0b','#f59e0b','#f59e0b','#38bdf8','#38bdf8','#fb923c','#6b7280','#34d399'];

  return (
    <div className="slide-in space-y-6">

      {/* Flow diagram */}
      <div className="card bg-base-200/80 shadow">
        <div className="card-body py-5">
          <h3 className="text-xs font-bold uppercase tracking-widest opacity-40 mb-4">Pipeline Sequence</h3>
          <div className="flex flex-wrap items-center gap-1">
            {FLOW.map((id,i) => (
              <React.Fragment key={id}>
                <span className="rounded-lg px-2.5 py-1 text-xs font-mono font-semibold"
                      style={{background:'rgba(255,255,255,.05)', border:`1px solid ${COLORS[i]}40`, color:COLORS[i]}}>
                  {id === '▶ APPROVAL' ? id : id.toUpperCase()}
                </span>
                {i < FLOW.length-1 && <span className="text-base-content/20 text-xs">→</span>}
              </React.Fragment>
            ))}
          </div>
          <p className="text-xs opacity-30 mt-3">Post-merge (optional): DEPLOY → MONITOR</p>
        </div>
      </div>

      {/* How to run */}
      <div className="card bg-base-200/80 shadow">
        <div className="card-body py-5">
          <h3 className="text-xs font-bold uppercase tracking-widest opacity-40 mb-4">▶ How to Run</h3>
          <div className="space-y-3">
            {[
              { label:'Full pipeline with live browser GUI', cmd:'forgeflow run-all --gui ~/your-repo' },
              { label:'Full pipeline (terminal only)',        cmd:'forgeflow run-all ~/your-repo' },
              { label:'Single stage',                        cmd:'forgeflow discover --path ~/your-repo' },
              { label:'CI/CD generation only',               cmd:'forgeflow ci --path ~/your-repo' },
              { label:'Infrastructure only',                 cmd:'forgeflow iac --cloud aws --path ~/your-repo' },
              { label:'Security scan only',                  cmd:'forgeflow scan --severity high --path ~/your-repo' },
            ].map(({label,cmd}) => (
              <div key={cmd} className="flex items-center gap-3 rounded-lg px-4 py-2.5"
                   style={{background:'rgba(124,58,237,.07)', border:'1px solid rgba(124,58,237,.15)'}}>
                <div className="flex-1 min-w-0">
                  <div className="text-xs opacity-50 mb-0.5">{label}</div>
                  <code className="text-sm font-mono text-warning">{cmd}</code>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Core stages detail */}
      <div className="card bg-base-200/80 shadow">
        <div className="card-body py-5">
          <h3 className="text-xs font-bold uppercase tracking-widest opacity-40 mb-4">Core Stages (10)</h3>
          <div className="space-y-1">
            {CORE.map((s,i) => (
              <div key={s.id}>
                <div className="flex items-center gap-3 rounded-lg px-4 py-3 cursor-pointer"
                     style={{background: expanded===s.id?'rgba(124,58,237,.1)':'rgba(255,255,255,.03)',
                             border:'1px solid rgba(255,255,255,.06)'}}

// ── Sand Pendulum (Harmonograph) ──────────────────────────────────────────────
// Draws a unique Lissajous/sand pendulum figure for each pipeline stage.
// The canvas renders sand-grain particles along the harmonograph trajectory,
// creating the organic look of a real sand pendulum art piece.

// ── Hourglass (canvas) — animates while a stage is running ───────────────────

function HourGlass({ status = 'running', size = 160 }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    const cv = canvasRef.current;
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    const cx = W / 2, cy = H / 2;

    // Geometry
    const TW = W * 0.38;   // chamber half-width (top & bottom)
    const TH = H * 0.39;   // chamber half-height
    const NK = 2.8;         // neck half-width in px

    const outlinePath = () => {
      ctx.beginPath();
      ctx.moveTo(cx - TW, cy - TH);
      ctx.lineTo(cx + TW, cy - TH);
      ctx.lineTo(cx + NK,  cy);
      ctx.lineTo(cx + TW, cy + TH);
      ctx.lineTo(cx - TW, cy + TH);
      ctx.lineTo(cx - NK,  cy);
      ctx.closePath();
    };
    const topClip = () => {
      ctx.beginPath();
      ctx.moveTo(cx - TW, cy - TH);
      ctx.lineTo(cx + TW, cy - TH);
      ctx.lineTo(cx + NK,  cy);
      ctx.lineTo(cx - NK,  cy);
      ctx.closePath();
    };
    const botClip = () => {
      ctx.beginPath();
      ctx.moveTo(cx - NK,  cy);
      ctx.lineTo(cx + NK,  cy);
      ctx.lineTo(cx + TW, cy + TH);
      ctx.lineTo(cx - TW, cy + TH);
      ctx.closePath();
    };

    let level = 0;          // 0 = top full, 1 = top empty
    let grains = [];        // falling particles
    let alive = true;
    let rafId;
    let last = null;
    const CYCLE = 5500;     // ms for one full drain

    const frame = (ts) => {
      if (!alive) return;
      if (last === null) last = ts;
      const dt = Math.min(ts - last, 50);
      last = ts;

      level += dt / CYCLE;
      if (level > 1) level = 0;   // flip and restart

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0b0b16';
      ctx.fillRect(0, 0, W, H);

      // ── Outline ──
      const og = ctx.createLinearGradient(cx, cy - TH, cx, cy + TH);
      og.addColorStop(0,   'rgba(245,158,11,.75)');
      og.addColorStop(0.5, 'rgba(124, 58,237,.55)');
      og.addColorStop(1,   'rgba(245,158,11,.75)');
      ctx.save();
      outlinePath();
      ctx.strokeStyle = og;
      ctx.lineWidth = 1.8;
      ctx.stroke();
      ctx.restore();

      // ── Top sand (drains down) ──
      const topSandH   = TH * (1 - level);
      const topSandY   = cy - topSandH;
      const topSandSpan = NK + (TW - NK) * topSandH / TH;

      ctx.save();
      topClip(); ctx.clip();
      const tg = ctx.createLinearGradient(0, topSandY, 0, cy);
      tg.addColorStop(0, 'rgba(245,158,11,.12)');
      tg.addColorStop(1, 'rgba(245,158,11,.42)');
      ctx.beginPath();
      ctx.moveTo(cx - topSandSpan, topSandY);
      ctx.lineTo(cx + topSandSpan, topSandY);
      ctx.lineTo(cx + NK, cy); ctx.lineTo(cx - NK, cy);
      ctx.closePath(); ctx.fillStyle = tg; ctx.fill();
      // surface glint
      ctx.beginPath();
      ctx.moveTo(cx - topSandSpan, topSandY);
      ctx.lineTo(cx + topSandSpan, topSandY);
      ctx.strokeStyle = 'rgba(251,191,36,.7)'; ctx.lineWidth = 1.3; ctx.stroke();
      ctx.restore();

      // ── Bottom sand (fills up) ──
      const botSandH    = TH * level;
      const botSandY    = cy + TH - botSandH;
      const botSandSpan = NK + (TW - NK) * botSandH / TH;

      ctx.save();
      botClip(); ctx.clip();
      const bg2 = ctx.createLinearGradient(0, botSandY, 0, cy + TH);
      bg2.addColorStop(0, 'rgba(245,158,11,.20)');
      bg2.addColorStop(1, 'rgba(245,158,11,.52)');
      ctx.beginPath();
      ctx.moveTo(cx - botSandSpan, botSandY);
      ctx.lineTo(cx + botSandSpan, botSandY);
      ctx.lineTo(cx + TW, cy + TH); ctx.lineTo(cx - TW, cy + TH);
      ctx.closePath(); ctx.fillStyle = bg2; ctx.fill();
      // surface glint
      ctx.beginPath();
      ctx.moveTo(cx - botSandSpan, botSandY);
      ctx.lineTo(cx + botSandSpan, botSandY);
      ctx.strokeStyle = 'rgba(251,191,36,.55)'; ctx.lineWidth = 1.1; ctx.stroke();
      ctx.restore();

      // ── Falling grains through neck ──
      if (status === 'running') {
        if (Math.random() < 0.35) {
          grains.push({ x: cx + (Math.random()-.5)*3, y: cy + 1,
                        vy: 1.2 + Math.random()*2,
                        r: 0.7 + Math.random()*.9,
                        a: 0.6 + Math.random()*.4 });
        }
        grains = grains.filter(g => {
          g.y += g.vy; g.vy += 0.18;
          if (g.y > botSandY) return false;
          ctx.beginPath();
          ctx.arc(g.x, g.y, g.r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(251,191,36,${g.a})`;
          ctx.fill();
          return true;
        });
      }

      rafId = requestAnimationFrame(frame);
    };

    rafId = requestAnimationFrame(frame);
    return () => { alive = false; cancelAnimationFrame(rafId); };
  }, [status]);

  const glow = status === 'error' ? 'rgba(239,68,68,.35)' : 'rgba(245,158,11,.35)';

  return (
    <div className="pendulum-wrap" style={{ width: size, height: size,
         boxShadow: `0 0 20px ${glow}, 0 0 40px ${glow.replace('.35','.12')}` }}>
      <canvas ref={canvasRef} width={size} height={size} />
    </div>
  );
}


// ── Live View (SSE real-time pipeline progress) ────────────────────────────────

function LiveView({ liveState }) {
  const { connected, pipelinePath, stages, stageState, stageInfo, stageResults,
          currentStage, currentNum, totalStages, done, elapsed } = liveState;

  const pct = totalStages ? Math.round((Object.values(stageState).filter(s=>s==='success'||s==='error').length) / totalStages * 100) : 0;

  const stageColor = (id) => {
    const s = stageState[id];
    if (s === 'running') return 'border-warning bg-warning/10 animate-pulse';
    if (s === 'success') return 'border-emerald-600/50 bg-emerald-950/25';
    if (s === 'error')   return 'border-rose-600/50 bg-rose-950/25';
    return 'border-base-300 opacity-35';
  };

  const stageIcon = (id) => {
    const s = stageState[id];
    if (s === 'running') return <span className="spin text-warning text-lg">⟳</span>;
    if (s === 'success') return <span className="text-success text-lg">✓</span>;
    if (s === 'error')   return <span className="text-error text-lg">✗</span>;
    return <span className="opacity-30 text-lg">○</span>;
  };

  const stageEmoji = (id) => STAGES.find(s=>s.id===id)?.emoji || '▸';

  if (!connected) {
    return (
      <div className="slide-in flex flex-col items-center justify-center gap-8 py-16">
        {/* Sevaforge hero splash */}
        <div className="live-hero flex flex-col items-center gap-5 px-12 py-10 text-center max-w-lg w-full">
          <SevaForgeLogo size={72} animate={false} />
          <div>
            <div className="seva-wordmark text-3xl mb-1">Sevaforge</div>
            <NoCaaSBadge />
          </div>
          <div className="text-base-content/40 text-sm leading-relaxed">
            AI Platform Engineering · 14-stage pipeline automation<br/>
            <span className="font-mono opacity-60">ForgeFlow v2.1</span>
          </div>
          <div className="divider my-0 opacity-20" />
          <div className="text-base-content/50 text-center">
            <p className="font-semibold mb-2 text-base">Waiting for a pipeline run…</p>
            <code className="font-mono bg-base-300 px-3 py-1.5 rounded-lg text-sm text-warning">
              forgeflow run-all --gui ~/your-repo
            </code>
          </div>
        </div>

        {/* Idle hourglass — ambient drift */}
        <div className="opacity-25">
          <HourGlass status="running" size={140} />
        </div>
      </div>
    );
  }

  const activeInfo  = stageInfo[currentStage] || {};
  const allFinished = done && !currentStage;

  const hasFailed = Object.values(stageState).some(s=>s==='error');

  return (
    <div className="slide-in space-y-5">

      {/* ── Sevaforge branded header ── */}
      <div className="live-hero flex items-center gap-4 px-5 py-4">
        <SevaForgeLogo size={48} animate={!allFinished && !!currentStage} />
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="seva-wordmark text-xl">Sevaforge</span>
            <NoCaaSBadge />
          </div>
          <div className="font-semibold text-base mt-0.5">
            {allFinished
              ? (hasFailed ? '❌ Pipeline failed' : '✅ Pipeline complete')
              : currentStage
                ? <span>Running <span className="text-warning font-mono">{currentStage.toUpperCase()}</span>…</span>
                : 'Pipeline starting…'}
          </div>
          <div className="text-xs font-mono opacity-40 truncate">{pipelinePath || '—'}</div>
        </div>
        <div className="flex flex-col items-end gap-1">
          {elapsed > 0 && <div className="badge badge-outline font-mono text-xs">{elapsed}s</div>}
          {totalStages > 0 && <div className="badge badge-primary text-xs">{Math.min(currentNum,totalStages)}/{totalStages}</div>}
        </div>
      </div>

      {/* Progress bar */}
      {totalStages > 0 && (
        <div>
          <div className="flex justify-between text-xs opacity-50 mb-1">
            <span>Pipeline Progress</span><span>{pct}%</span>
          </div>
          <progress className="progress progress-primary w-full h-2.5" value={pct} max="100" />
        </div>
      )}

      {/* ── Current stage spotlight with SAND PENDULUM ── */}
      {currentStage && (
        <div className="card border-2 border-warning/60 shadow-xl"
             style={{background:'linear-gradient(135deg,rgba(245,158,11,.06),rgba(124,58,237,.06))'}}>
          <div className="card-body py-5">
            <div className="flex gap-5 items-start">

              {/* Hourglass — animates while stage runs */}
              <div className="flex-shrink-0">
                <HourGlass status="running" size={156} />
                <div className="text-center mt-2 text-xs font-mono opacity-40">stage {currentNum}/{totalStages}</div>
              </div>

              {/* Stage info */}
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-3 mb-4">
                  <span className="text-4xl">{stageEmoji(currentStage)}</span>
                  <div>
                    <div className="font-bold text-warning uppercase tracking-widest text-lg flex items-center gap-2">
                      <span className="spin inline-block text-base">⟳</span>
                      {currentStage}
                    </div>
                    <div className="text-xs opacity-50 font-mono mt-0.5">
                      {activeInfo.agent || ''}{activeInfo.mcp_server ? ` · ${activeInfo.mcp_server}` : ''}
                    </div>
                  </div>
                </div>

                {activeInfo.purpose && (
                  <div className="space-y-3">
                    <div>
                      <div className="text-xs font-bold uppercase tracking-widest opacity-40 mb-1">🎯 Purpose</div>
                      <div className="text-sm leading-relaxed">{activeInfo.purpose}</div>
                    </div>
                    <div>
                      <div className="text-xs font-bold uppercase tracking-widest opacity-40 mb-1">📦 Outputs</div>
                      <div className="text-sm opacity-70 leading-relaxed">{activeInfo.outputs}</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Stage pipeline flow — with sand-fill + burst animations */}
      {stages.length > 0 && (
        <div className="card bg-base-200/60 shadow backdrop-blur-sm">
          <div className="card-body py-4">
            <h3 className="text-xs font-semibold uppercase tracking-widest opacity-40 mb-3">Pipeline Flow</h3>
            <div className="flex flex-wrap gap-2">
              {stages.map((id, i) => {
                const s = stageState[id];
                const extraCls = s === 'success' ? 'sand-fill-success burst-success'
                               : s === 'error'   ? 'sand-fill-error burst-error' : '';
                return (
                  <div key={id}
                       className={`stage-card card border-2 p-2 flex flex-col items-center gap-1 min-w-[76px] ${stageColor(id)} ${extraCls}`}>
                    <span className="text-base">{stageEmoji(id)}</span>
                    <span className="text-xs font-mono font-semibold">{id}</span>
                    {stageIcon(id)}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── Stage results — clean tick/cross list ── */}
      {Object.entries(stageResults).length > 0 && (
        <div className="card bg-base-200/60 shadow backdrop-blur-sm">
          <div className="card-body py-4">
            <h3 className="text-xs font-semibold uppercase tracking-widest opacity-40 mb-3">Stage Results</h3>
            <div className="space-y-1.5">
              {Object.entries(stageResults).map(([id, result]) => {
                const ok = result.status === 'success';
                return (
                  <div key={id}
                       className="flex items-center gap-3 rounded-lg px-3 py-2"
                       style={{
                         background: ok ? 'rgba(6,50,40,.35)'   : 'rgba(60,10,10,.35)',
                         border:     ok ? '1px solid rgba(52,211,153,.2)' : '1px solid rgba(239,68,68,.2)',
                       }}>
                    {/* Tick / cross */}
                    <span className="text-base flex-shrink-0"
                          style={{color: ok ? '#34d399' : '#f87171'}}>
                      {ok ? '✓' : '✗'}
                    </span>
                    <span className="font-mono font-bold text-sm tracking-wide"
                          style={{color: ok ? '#6ee7b7' : '#fca5a5'}}>
                      {id.toUpperCase()}
                    </span>
                    <span className="text-xs opacity-50 flex-1 truncate">{result.summary || ''}</span>
                    {(result.findings||[]).length > 0 &&
                      <span className="text-xs opacity-40 flex-shrink-0">
                        {result.findings.length} findings
                      </span>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── Done banner ── */}
      {allFinished && (
        <div className="live-hero flex items-center gap-4 px-6 py-5"
             style={{border: `1px solid ${hasFailed ? 'rgba(239,68,68,.3)' : 'rgba(52,211,153,.2)'}`}}>
          <SevaForgeLogo size={48} animate={false} />
          <div className="flex-1">
            <div className="font-bold text-xl mb-1"
                 style={{color: hasFailed ? '#f87171' : '#6ee7b7'}}>
              {hasFailed ? '✗  Pipeline Failed' : '✓  Pipeline Complete'}
            </div>
            <div className="text-sm opacity-55 mb-2">
              {hasFailed
                ? 'One or more stages encountered errors — check the results above'
                : `All ${totalStages} stages passed · ${elapsed}s · Sevaforge did the work`}
            </div>
            <NoCaaSBadge />
          </div>
        </div>
      )}
    </div>
  );
}


// ── App Shell ─────────────────────────────────────────────────────────────────

function App() {
  const [view,         setView]         = useState('dashboard');
  const [connected,    setConnected]    = useState(null);
  const [history,      setHistory]      = useState([]);
  const [toasts,       setToasts]       = useState([]);

  // Live pipeline state (fed by SSE events from /events)
  const [liveState, setLiveState] = useState({
    connected:    false,
    pipelinePath: '',
    stages:       [],
    stageState:   {},   // { [stageId]: 'pending'|'running'|'success'|'error' }
    stageInfo:    {},   // { [stageId]: { purpose, outputs, agent, mcp_server } }
    stageResults: {},   // { [stageId]: resultObject }
    currentStage: null,
    currentNum:   0,
    totalStages:  0,
    done:         false,
    elapsed:      0,
  });

  const addToast = useCallback((msg, type = 'info') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  }, []);

  // Derive connection status from SSE (no REST polling — dashboard_server has no REST API)
  useEffect(() => {
    setConnected(liveState.connected ? true : null);
  }, [liveState.connected]);

  // ── SSE connection — live pipeline events from dashboard_server.py ──────────
  useEffect(() => {
    const es = new EventSource('/events');

    es.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      const { type } = msg;

      if (type === 'connected') {
        setLiveState(s => ({ ...s, connected: true }));

      } else if (type === 'pipeline_start') {
        const initState = {};
        (msg.stages || []).forEach(id => { initState[id] = 'pending'; });
        setLiveState({
          connected:    true,
          pipelinePath: msg.path || '',
          stages:       msg.stages || [],
          stageState:   initState,
          stageInfo:    {},
          stageResults: {},
          currentStage: null,
          currentNum:   0,
          totalStages:  msg.total || 0,
          done:         false,
          elapsed:      0,
        });
        setView('live'); // auto-switch the moment a pipeline starts

      } else if (type === 'stage_start') {
        setLiveState(s => ({
          ...s,
          currentStage: msg.stage,
          currentNum:   msg.num || s.currentNum,
          stageState:   { ...s.stageState, [msg.stage]: 'running' },
          stageInfo:    { ...s.stageInfo,  [msg.stage]: msg.info  || {} },
        }));

      } else if (type === 'stage_result') {
        const ok = (msg.result || {}).status === 'success';
        setLiveState(s => ({
          ...s,
          currentStage: s.currentStage === msg.stage ? null : s.currentStage,
          stageState:   { ...s.stageState,   [msg.stage]: ok ? 'success' : 'error' },
          stageResults: { ...s.stageResults, [msg.stage]: msg.result || {} },
        }));

      } else if (type === 'pipeline_done') {
        setLiveState(s => {
          // push history entry from SSE data + current live state
          const failedStage = Object.entries(s.stageState)
            .find(([, v]) => v === 'error')?.[0] || null;
          const entry = {
            path:       msg.path || s.pipelinePath || '—',
            status:     msg.success ? 'success' : 'error',
            stageCount: s.stages.length || msg.stage_count || 0,
            elapsed:    msg.elapsed_s || 0,
            failedStage,
            ts:         Date.now(),
          };
          setHistory(prev => [entry, ...prev.slice(0, 99)]);
          return { ...s, done: true, currentStage: null, elapsed: msg.elapsed_s || 0 };
        });
        addToast(
          msg.success
            ? `Pipeline complete in ${msg.elapsed_s}s 🎉`
            : 'Pipeline failed ❌',
          msg.success ? 'success' : 'error'
        );
      }
    };

    es.onerror = () => setLiveState(s => ({ ...s, connected: false }));
    return () => es.close();
  }, []); // single mount — SSE connection lives for the page lifetime

  return (
    <div className="flex h-screen overflow-hidden bg-base-300">

      {/* ── Sidebar ── */}
      <aside className="sidebar bg-base-200 border-r border-base-300 flex flex-col">
        {/* ── Sevaforge brand block ── */}
        <div className="px-4 py-4 border-b border-base-300"
             style={{background:'linear-gradient(160deg,rgba(124,58,237,.08),rgba(245,158,11,.05))'}}>
          <div className="flex items-center gap-3 mb-3">
            <SevaForgeLogo size={40} animate={false} />
            <div>
              <div className="seva-wordmark leading-tight">Sevaforge</div>
              <div className="text-xs font-mono opacity-35 mt-0.5">ForgeFlow v2.1</div>
            </div>
          </div>
          <NoCaaSBadge />
        </div>

        {/* Nav */}
        <nav className="flex-1 p-3 flex flex-col gap-0.5">
          {VIEWS.map(v => (
            <button
              key={v.id}
              onClick={() => setView(v.id)}
              className={`btn btn-sm justify-start gap-3 font-normal ${view === v.id ? 'btn-primary' : 'btn-ghost opacity-70'}`}
            >
              <span className="text-base w-5 text-center">{v.icon}</span>
              {v.label}
            </button>
          ))}
        </nav>

        {/* Connection status */}
        <div className="p-3 border-t border-base-300">
          <div className="flex items-center gap-2 px-2 py-1.5">
            <span className={`w-2 h-2 rounded-full ${connected===true?'bg-success animate-pulse':connected===false?'bg-error':'bg-base-content/20'}`} />
            <span className="text-xs opacity-60 flex-1">
              {connected===true ? 'Connected' : connected===false ? 'Offline' : 'Connecting…'}
            </span>
            {liveState.done && <span className="badge badge-xs badge-outline">DONE</span>}
          </div>
        </div>
      </aside>

      {/* ── Main ── */}
      <div className="main-content flex flex-col overflow-hidden">
        {/* Topbar */}
        <header className="bg-base-200 border-b border-base-300 h-13 flex items-center px-6 gap-3 min-h-[52px]">
          <span className="text-base font-semibold flex-1">{VIEWS.find(v=>v.id===view)?.label}</span>
          {liveState.connected
            ? <span className="badge badge-success badge-sm gap-1"><span className="w-1.5 h-1.5 rounded-full bg-current" />Live</span>
            : <span className="badge badge-ghost badge-sm"><Spinner /> Connecting…</span>
          }
          <span className="font-mono text-xs opacity-30 hidden md:block">{window.location.host}</span>
          <button className="btn btn-xs btn-ghost opacity-50" onClick={() => setView('settings')}>⚙</button>
        </header>

        {/* Content */}
        <main className="flex-1 overflow-y-auto p-6">
          {view === 'live'      && <LiveView      liveState={liveState} />}
          {view === 'dashboard' && <DashboardView history={history} onNavigate={setView} />}
          {view === 'pipeline'  && <PipelineView />}
          {view === 'health'    && <HealthView    sseConnected={liveState.connected} liveState={liveState} />}
          {view === 'history'   && <HistoryView   history={history} onClear={() => setHistory([])} />}
          {view === 'settings'  && <SettingsView />}
        </main>
      </div>

      <ToastStack toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
