# =============================================================================
# ForgeFlow — Test Workflow
# Stage 2 of 3: Unit · Integration · E2E · Coverage
# Triggered automatically when CI workflow succeeds (workflow_run).
# Triggers cd.yml on success via workflow_run.
# =============================================================================
name: Tests

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main, develop]

jobs:
  # Guard: only proceed if CI passed
  check-ci:
    name: "🚦 CI Status Gate"
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: CI passed — proceeding with tests
        run: echo "CI conclusion=${{ github.event.workflow_run.conclusion }}"

  # ---------------------------------------------------------------------------
  # 1. Unit Tests
  # ---------------------------------------------------------------------------
  unit:
    name: "🧪 Unit Tests"
    runs-on: ubuntu-latest
    needs: check-ci
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov --quiet

      - name: Run unit tests with coverage
        run: pytest tests/unit/ -v --cov=. --cov-report=xml --cov-report=term-missing


      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit-${{ matrix.python-version || 'default' }}
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # 2. Integration Tests (with service containers)
  # ---------------------------------------------------------------------------
  integration:
    name: "🔗 Integration Tests"
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: testdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest --quiet

      - name: Run integration tests
        run: pytest tests/integration/ -v
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379


  # ---------------------------------------------------------------------------
  # 3. End-to-End Tests
  # ---------------------------------------------------------------------------
  e2e:
    name: "🌐 E2E Tests"
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Playwright + dependencies
        run: |
          pip install playwright pytest-playwright --quiet
          playwright install --with-deps chromium

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --screenshot=on-failure
        env:
          BASE_URL: ${{ vars.STAGING_URL || 'http://localhost:8000' }}

      - name: Upload E2E screenshots/videos
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-screenshots
          path: test-results/
          retention-days: 7


  # ---------------------------------------------------------------------------
  # 4. Coverage Aggregation & Upload
  # ---------------------------------------------------------------------------
  coverage:
    name: "📊 Coverage Report"
    runs-on: ubuntu-latest
    needs: [unit, integration, e2e]
    if: always()
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Download all coverage artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-*
          merge-multiple: true
          path: coverage/

      - name: Upload combined coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          directory: coverage/
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

  # Final gate that cd.yml watches
  tests-passed:
    name: "✅ All Tests Passed"
    runs-on: ubuntu-latest
    needs: [unit, integration, e2e, coverage]
    if: success()
    steps:
      - name: Tests gate passed
        run: echo "All test suites succeeded — CD workflow will trigger."
