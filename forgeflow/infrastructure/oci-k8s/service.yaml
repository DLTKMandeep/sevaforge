apiVersion: v1
kind: Service
metadata:
  name: sevaforge
  namespace: sevaforge
  labels:
    app: sevaforge
  annotations:
    # OCI Flexible Load Balancer — 10 Mbps shape stays within Always Free limit
    oci.oraclecloud.com/load-balancer-type: "lb"
    service.beta.kubernetes.io/oci-load-balancer-shape: "flexible"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-min: "10"
    service.beta.kubernetes.io/oci-load-balancer-shape-flex-max: "10"
    service.beta.kubernetes.io/oci-load-balancer-connection-idle-timeout: "300"
spec:
  type: LoadBalancer
  selector:
    app: sevaforge
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
    - name: https
      port: 443
      targetPort: 8000
      protocol: TCP
