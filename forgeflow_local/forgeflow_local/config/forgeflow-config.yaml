# ForgeFlow Configuration - LOCAL MODE
# All MCPs run locally on your machine (full offline capability)

mode: local

# Pipeline configuration
pipeline:
  sequence:
    - discover
    - normalize
    - docs
    - generate
    - review
    - test
    - scan
  post_merge:
    - deploy
    - monitor
  approval_gates:
    - bridge

# Local mode: All MCP servers run as local subprocesses
local:
  mcp_servers:
    discovery-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/discovery_mcp/server.py"]
    normalize-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/normalize_mcp/server.py"]
    security-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/security_mcp/server.py"]
    deployment-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/deployment_mcp/server.py"]
    cloud-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/cloud_mcp/server.py"]
    cicd-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/cicd_mcp/server.py"]
    observability-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/observability_mcp/server.py"]
    diagram-generator-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/diagram_generator_mcp/server.py"]
    git-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/git_mcp/server.py"]
    github-mcp-server:
      type: local
      command: "python3"
      args: ["mcp_servers/github_mcp/server.py"]

# Feature flags
features:
  rich_display: true
  auto_save_reports: true
  telemetry: false
  parallel_execution: false

# Default parameters
defaults:
  security:
    severity_threshold: medium
  generation:
    stack: auto
    cloud_provider: aws
  deployment:
    target: staging
  bridge:
    default_branch: main
    auto_create_repo: true
