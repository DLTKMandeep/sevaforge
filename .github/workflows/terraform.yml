name: Terraform — Provision OCI Infrastructure

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run from (must contain forgeflow/infrastructure/oci)"
        required: true
        default: "gui-polish"
      action:
        description: "Terraform action"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_WORKING_DIR: forgeflow/infrastructure/oci
  OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Confirm branch and directory
        run: |
          echo "Checked out → $(git branch --show-current)"
          echo "Commit      → $(git rev-parse --short HEAD)"
          ls forgeflow/infrastructure/oci/

      # ── OCI credentials ───────────────────────────────────────────────────
      - name: Write OCI private key
        run: |
          mkdir -p ~/.oci
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          {
            echo "[DEFAULT]"
            echo "user=${{ secrets.OCI_USER_OCID }}"
            echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}"
            echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}"
            echo "region=${{ secrets.OCI_REGION }}"
            echo "key_file=$HOME/.oci/oci_api_key.pem"
          } > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Verify OCI auth
        run: oci iam region list --output table

      # ── Terraform ─────────────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init \
            -backend-config="bucket=sevaforge-tfstate" \
            -backend-config="key=oci/terraform.tfstate" \
            -backend-config="region=${{ secrets.OCI_REGION }}" \
            -backend-config="endpoint=https://${{ secrets.OCI_NAMESPACE }}.compat.objectstorage.${{ secrets.OCI_REGION }}.oraclecloud.com" \
            -backend-config="access_key=${{ secrets.OCI_BACKEND_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.OCI_BACKEND_SECRET_KEY }}"

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:        ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:           ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:         ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path:    /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:              ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:      ${{ secrets.OCI_TENANCY_OCID }}          # TF_VAR_node_image_id not needed — resolved by Terraform data source
        run: |
          terraform plan -out=tfplan -input=false
          terraform show -no-color tfplan

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:        ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:           ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:         ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path:    /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:              ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:      ${{ secrets.OCI_TENANCY_OCID }}          # TF_VAR_node_image_id not needed — resolved by Terraform data source
        run: terraform apply -auto-approve -input=false tfplan

      - name: Capture Terraform outputs
        if: github.event.inputs.action == 'apply'
        id: tf_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          CLUSTER_ID=$(terraform output -raw cluster_id)
          echo "cluster_id=${CLUSTER_ID}" >> "$GITHUB_OUTPUT"

      - name: Generate kubeconfig
        if: github.event.inputs.action == 'apply'
        id: kubeconfig
        run: |
          mkdir -p ~/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id "${{ steps.tf_outputs.outputs.cluster_id }}" \
            --region "${{ secrets.OCI_REGION }}" \
            --token-version 2.0.0 \
            --file ~/.kube/sevaforge-config
          echo "kube_config_b64=$(base64 -w0 ~/.kube/sevaforge-config)" >> "$GITHUB_OUTPUT"
          export KUBECONFIG=~/.kube/sevaforge-config
          kubectl cluster-info || echo "⚠️  Nodes may still be initialising"

      - name: Save OKE_CLUSTER_ID + KUBE_CONFIG as GitHub secrets
        if: github.event.inputs.action == 'apply'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh secret set OKE_CLUSTER_ID \
            --repo "${{ github.repository }}" \
            --body "${{ steps.tf_outputs.outputs.cluster_id }}"
          gh secret set KUBE_CONFIG \
            --repo "${{ github.repository }}" \
            --body "${{ steps.kubeconfig.outputs.kube_config_b64 }}"
          echo "✅ OKE_CLUSTER_ID and KUBE_CONFIG saved as GitHub secrets"

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:        ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:           ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:         ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path:    /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:              ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:      ${{ secrets.OCI_TENANCY_OCID }}          # TF_VAR_node_image_id not needed — resolved by Terraform data source
        run: terraform destroy -auto-approve -input=false

      - name: Job summary
        if: always()
        run: |
          echo "## Terraform ${{ github.event.inputs.action }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event.inputs.action }}" = "apply" ]; then
            echo "| Cluster ID | \`${{ steps.tf_outputs.outputs.cluster_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ OKE_CLUSTER_ID and KUBE_CONFIG saved as GitHub secrets." >> "$GITHUB_STEP_SUMMARY"
          fi
