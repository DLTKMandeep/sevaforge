name: Terraform — Provision OCI Infrastructure

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Terraform action"
        required: true
        default: plan
        type: choice
        options:
          - plan
          - apply
          - destroy
      node_image_id:
        description: "ARM node image OCID (optional — auto-discovered if blank)"
        required: false
        default: ""

env:
  TF_WORKING_DIR: forgeflow/infrastructure/oci
  OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ── Write OCI credentials ─────────────────────────────────────────────
      - name: Write OCI private key
        run: |
          mkdir -p ~/.oci
          printf '%s\n' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          cat > ~/.oci/config << 'OCIEOF'
          [DEFAULT]
          OCIEOF
          # Append values without heredoc interpolation issues
          echo "user=${{ secrets.OCI_USER_OCID }}"        >> ~/.oci/config
          echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}" >> ~/.oci/config
          echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}"  >> ~/.oci/config
          echo "region=${{ secrets.OCI_REGION }}"         >> ~/.oci/config
          echo "key_file=$HOME/.oci/oci_api_key.pem"      >> ~/.oci/config
          chmod 600 ~/.oci/config
          cat ~/.oci/config

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Verify OCI auth
        run: |
          oci iam region list --output table 2>&1 || true

      # ── Discover ARM node image (skip if passed as input) ─────────────────
      - name: Find ARM node image OCID
        id: node_image
        run: |
          # Use manually provided value if given
          IMAGE_OCID="${{ github.event.inputs.node_image_id }}"

          if [ -z "$IMAGE_OCID" ]; then
            echo "Auto-discovering ARM image..."

            # Try by display-name containing aarch64 (most reliable)
            IMAGE_OCID=$(oci compute image list \
              --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
              --operating-system "Oracle Linux" \
              --operating-system-version "8" \
              --sort-by TIMECREATED \
              --sort-order DESC \
              --all \
              --query "data[?contains(\"display-name\", 'aarch64')] | [0].id" \
              --raw-output 2>/dev/null || echo "")
          fi

          if [ -z "$IMAGE_OCID" ] || [ "$IMAGE_OCID" = "null" ]; then
            echo "⚠️  Could not auto-find ARM image."
            echo "    Re-run workflow and paste image OCID in the 'node_image_id' field."
            echo "    Find it: OCI Console → Compute → Images → Platform Images → Oracle Linux 8 → aarch64"
            exit 1
          fi

          echo "image_ocid=${IMAGE_OCID}" >> "$GITHUB_OUTPUT"
          echo "Using image → ${IMAGE_OCID}"

      # ── Discover Availability Domain ──────────────────────────────────────
      - name: Find Availability Domain
        id: avail_domain
        run: |
          AD=$(oci iam availability-domain list \
            --compartment-id "${{ secrets.OCI_TENANCY_OCID }}" \
            --query 'data[0].name' \
            --raw-output 2>/dev/null || echo "")

          if [ -z "$AD" ] || [ "$AD" = "null" ]; then
            echo "❌ Could not retrieve availability domain — check OCI secrets"
            exit 1
          fi

          echo "ad=${AD}" >> "$GITHUB_OUTPUT"
          echo "Availability domain → ${AD}"

      # ── Terraform ─────────────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:        ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:           ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:         ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path:    /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:              ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:      ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_availability_domain: ${{ steps.avail_domain.outputs.ad }}
          TF_VAR_node_image_id:       ${{ steps.node_image.outputs.image_ocid }}
        run: |
          terraform plan -out=tfplan -input=false
          terraform show -no-color tfplan

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:        ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:           ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:         ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path:    /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:              ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:      ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_availability_domain: ${{ steps.avail_domain.outputs.ad }}
          TF_VAR_node_image_id:       ${{ steps.node_image.outputs.image_ocid }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Capture Terraform outputs
        if: github.event.inputs.action == 'apply'
        id: tf_outputs
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          CLUSTER_ID=$(terraform output -raw cluster_id)
          echo "cluster_id=${CLUSTER_ID}" >> "$GITHUB_OUTPUT"
          echo "Cluster ID → ${CLUSTER_ID}"

      - name: Generate kubeconfig
        if: github.event.inputs.action == 'apply'
        id: kubeconfig
        run: |
          mkdir -p ~/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id "${{ steps.tf_outputs.outputs.cluster_id }}" \
            --region "${{ secrets.OCI_REGION }}" \
            --token-version 2.0.0 \
            --file ~/.kube/sevaforge-config
          KUBE_CONFIG_B64=$(base64 -w0 ~/.kube/sevaforge-config)
          echo "kube_config_b64=${KUBE_CONFIG_B64}" >> "$GITHUB_OUTPUT"
          export KUBECONFIG=~/.kube/sevaforge-config
          kubectl cluster-info || echo "⚠️  Nodes may still be initialising"

      - name: Save OKE_CLUSTER_ID + KUBE_CONFIG as GitHub secrets
        if: github.event.inputs.action == 'apply'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh secret set OKE_CLUSTER_ID \
            --repo "${{ github.repository }}" \
            --body "${{ steps.tf_outputs.outputs.cluster_id }}"
          gh secret set KUBE_CONFIG \
            --repo "${{ github.repository }}" \
            --body "${{ steps.kubeconfig.outputs.kube_config_b64 }}"
          echo "✅ OKE_CLUSTER_ID and KUBE_CONFIG saved as GitHub secrets"

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:        ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:           ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:         ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path:    /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:              ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:      ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_availability_domain: ${{ steps.avail_domain.outputs.ad }}
          TF_VAR_node_image_id:       ${{ steps.node_image.outputs.image_ocid }}
        run: terraform destroy -auto-approve -input=false

      - name: Job summary
        if: always()
        run: |
          echo "## Terraform ${{ github.event.inputs.action }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event.inputs.action }}" = "apply" ]; then
            echo "| Output | Value |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
            echo "| Cluster ID | \`${{ steps.tf_outputs.outputs.cluster_id }}\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "| OCIR | \`${{ secrets.OCI_REGION_KEY }}.ocir.io\` |" >> "$GITHUB_STEP_SUMMARY"
            echo "✅ OKE_CLUSTER_ID and KUBE_CONFIG saved as GitHub secrets." >> "$GITHUB_STEP_SUMMARY"
            echo "Push to main — CI builds image, CD deploys automatically." >> "$GITHUB_STEP_SUMMARY"
          fi
