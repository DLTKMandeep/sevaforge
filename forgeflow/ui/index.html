// ── History — full run log as a sortable table ─────────────────────────────────
function HistoryView({ history, onClear }) {
  const [filter, setFilter] = React.useState('all'); // all | passed | failed
  const successes = history.filter(r=>r.status==='success').length;
  const failures  = history.length - successes;
  const rate      = history.length ? Math.round(successes/history.length*100) : null;
  const avgTime   = history.filter(r=>r.elapsed).length
    ? Math.round(history.filter(r=>r.elapsed).reduce((a,r)=>a+r.elapsed,0)/history.filter(r=>r.elapsed).length)
    : null;

  const filtered = history.filter(r=>
    filter==='all' ? true : filter==='passed' ? r.status==='success' : r.status!=='success'
  );

  return (
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <PageHeader title="Run History"
        sub={`${history.length} runs saved to ~/.sevaforge/run_history.json`}

          <button className="btn-secondary" onClick={onClear}

                {rate!=null?`${rate}%`:'—'}

                <span style={{color:'var(--err)',fontWeight:600}}>✗ {failures} failed</span>

  );

// ── Health — system status ────────────────────────────────────────────────────
function HealthView({ connected, liveState }) {
  const { stages=[], stageState={}, done=false, elapsed=0, totalStages=0 } = liveState;
  const passedCount = Object.values(stageState).filter(s=>s==='success'||s==='preview').length;
  const hasFailed   = Object.values(stageState).some(s=>s==='error');

  const checks = [
    {category:'Connection', label:'SSE Dashboard Stream', ok:connected,
     detail:connected?'Real-time events flowing':'Run forgeflow dashboard to connect'},
    {category:'Connection', label:'Pipeline Engine',      ok:true,
     detail:'ForgeFlow CLI installed and operational'},
    {category:'Runtime',    label:'React UI',             ok:true,
     detail:'UI rendering correctly in browser'},
    {category:'Runtime',    label:'Hourglass Animation',  ok:true,
     detail:'Canvas animation engine active'},
    {category:'Platform',   label:'NoCaaS Mode',          ok:true,
     detail:'Running at zero infrastructure cost'},
    {category:'Platform',   label:'Stage Descriptions',   ok:true,
     detail:`All ${STAGE_INFO_FULL.length} stage descriptions loaded`},
    {category:'Platform',   label:'Inter Font',           ok:true,
     detail:'UI font loaded from CDN'},
    {category:'Pipeline',   label:'Last Pipeline',
     ok: done ? !hasFailed : stages.length===0,
     detail: done
       ? (hasFailed ? `Failed — ${passedCount}/${totalStages} stages passed`
                    : `Complete — all ${passedCount} stages passed in ${elapsed}s`)
       : stages.length>0 ? `Running — ${passedCount}/${totalStages} stages done`
                         : 'No pipeline run in this session'},
  ];

  const passing = checks.filter(c=>c.ok).length;
  const pct     = Math.round(passing/checks.length*100);
  const cats    = [...new Set(checks.map(c=>c.category))];

  return (
    <div className="fade-in" style={{display:'flex',flexDirection:'column',gap:20}}>
      <PageHeader title="System Health" sub={`${passing} of ${checks.length} checks passing`} />

      {/* Score banner */}
      <div style={{
        background: pct===100 ? 'linear-gradient(135deg,#ecfdf5,#f0fdf4)' : 'linear-gradient(135deg,#fffbeb,#fef9c3)',
        border:`1.5px solid ${pct===100?'var(--ok-br)':'#fde68a'}`,
        borderRadius:14,padding:'20px 24px',
        display:'flex',alignItems:'center',gap:20,
      }}>
        <div style={{
          fontSize:'48px',fontWeight:900,letterSpacing:'-3px',lineHeight:1,
          color:pct===100?'var(--ok)':'var(--warn)',
        }}>{pct}%</div>
        <div style={{flex:1}}>
          <div style={{fontWeight:700,fontSize:'17px',color:pct===100?'#065f46':'#92400e',marginBottom:4}}>
            {pct===100?'All Systems Operational':`${checks.length-passing} check${checks.length-passing!==1?'s':''} need attention`}
          </div>
          <div style={{height:7,borderRadius:4,background:'rgba(0,0,0,.07)',overflow:'hidden'}}>
            <div style={{height:'100%',borderRadius:4,background:pct===100?'var(--ok)':'var(--warn)',
                         width:`${pct}%`,transition:'width 1s ease'}}/>
          </div>
        </div>
      </div>

      {/* Checks by category */}
      {cats.map(cat=>(
        <div key={cat}>
          <div style={{fontSize:'12px',fontWeight:700,color:'var(--muted)',textTransform:'uppercase',
                       letterSpacing:'0.1em',marginBottom:8}}>{cat}</div>
          <div className="sf-card" style={{overflow:'hidden'}}>
            {checks.filter(c=>c.category===cat).map((c,i,arr)=>(
              <div key={c.label} style={{
                display:'flex',alignItems:'center',gap:14,padding:'13px 18px',
                borderBottom:i<arr.length-1?'1px solid var(--border-lt)':undefined,
              }}>
                <div style={{
                  width:28,height:28,borderRadius:'50%',flexShrink:0,
                  background:c.ok?'var(--ok-bg)':'var(--err-bg)',
                  border:`1.5px solid ${c.ok?'var(--ok-br)':'var(--err-br)'}`,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:'13px',color:c.ok?'var(--ok)':'var(--err)',fontWeight:800,
                }}>{c.ok?'✓':'✗'}</div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600,fontSize:'14px',color:'var(--text)',marginBottom:2}}>{c.label}</div>
                  <div style={{fontSize:'13px',color:'var(--muted)'}}>{c.detail}</div>
                </div>
                <span style={{
                  fontSize:'12px',fontWeight:700,padding:'3px 10px',borderRadius:20,
                  background:c.ok?'var(--ok-bg)':'var(--err-bg)',
                  color:c.ok?'var(--ok)':'var(--err)',
                  border:`1px solid ${c.ok?'var(--ok-br)':'var(--err-br)'}`,
                }}>{c.ok?'OK':'FAIL'}</span>
              </div>
            ))}
          </div>
        </div>
      ))}
    </div>
  );

// ── App shell ─────────────────────────────────────────────────────────────────
function App() {
  const [view,    setView]    = useState('live');
  const [history, setHistory] = useState([]);
  const [toasts,  setToasts]  = useState([]);

  // Load history from server on mount (works in local + cloud portal modes).
  // Falls back to localStorage if the API is unreachable (standalone file usage).
  useEffect(()=>{
    fetch('/api/history')
      .then(r=>r.ok?r.json():null)
      .then(d=>{ if(d?.history) setHistory(d.history); })
      .catch(()=>{
        try { const s=localStorage.getItem('sf_run_history'); if(s) setHistory(JSON.parse(s)); } catch {}
      });
  },[]);
  const [logs,    setLogs]    = useState([]);
  const currentStageRef = useRef(null);   // tracks active stage for log tagging
  const [liveState, setLiveState] = useState({
    connected:false, pipelinePath:'', stages:[], stageState:{},
    stageInfo:{}, stageResults:{}, currentStage:null, currentNum:0,
    totalStages:0, done:false, elapsed:0, dryRun:false,
  });

  const addToast = useCallback((msg,type='info')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4500);
  },[]);

  // SSE connection
  useEffect(()=>{
    const es=new EventSource('/events');
    es.onmessage=(e)=>{
      let msg; try{msg=JSON.parse(e.data);}catch{return;}
      const {type}=msg;
      if (type==='connected') {
        setLiveState(s=>({...s,connected:true}));
      } else if (type==='pipeline_start') {
        const init={}; (msg.stages||[]).forEach(id=>{init[id]='pending';});
        currentStageRef.current = null;
        setLiveState({connected:true,pipelinePath:msg.path||'',stages:msg.stages||[],
          stageState:init,stageInfo:{},stageResults:{},currentStage:null,
          currentNum:0,totalStages:msg.total||0,done:false,elapsed:0,dryRun:!!msg.dry_run});
        setLogs([]);
        setView('live');
      } else if (type==='stage_start') {
        currentStageRef.current = msg.stage;
        setLiveState(s=>({...s,currentStage:msg.stage,currentNum:msg.num||s.currentNum,
          stageState:{...s.stageState,[msg.stage]:'running'},
          stageInfo:{...s.stageInfo,[msg.stage]:msg.info||{}}}));
      } else if (type==='stage_result') {
        const rs=(msg.result||{}).status;
        // Map backend status → UI state key
        const uiState = rs==='preview'  ? 'preview'
                      : rs==='skipped'  ? 'skipped'
                      : rs==='success'||rs==='warning' ? 'success'
                      : 'error';
        setLiveState(s=>({...s,
          currentStage:s.currentStage===msg.stage?null:s.currentStage,
          stageState:{...s.stageState,[msg.stage]:uiState},
          stageResults:{...s.stageResults,[msg.stage]:msg.result||{}}}));
      } else if (type==='pipeline_done') {
        setLiveState(s=>{
          // Prepend to local state immediately for instant UI update.
          // The server already persisted this to ~/.sevaforge/run_history.json.
          const failedStage=Object.entries(s.stageState).find(([,v])=>v==='error')?.[0]||null;
          const entry={path:msg.path||s.pipelinePath||'—',status:msg.success?'success':'error',
            stageCount:s.stages.length||msg.stage_count||0,elapsed:msg.elapsed_s||0,failedStage,ts:Date.now()};
          setHistory(prev=>[entry,...prev.slice(0,199)]);
          return{...s,done:true,currentStage:null,elapsed:msg.elapsed_s||0};
        });
        addToast(msg.success?`✓ Pipeline complete in ${msg.elapsed_s}s`:'✗ Pipeline failed',
                 msg.success?'success':'error');
      } else if (type==='log') {
        setLogs(prev=>[...prev.slice(-499), {
          msg:   msg.msg || msg.message || '',
          level: msg.level || 'INFO',
          name:  msg.name || '',
          stage: msg.stage || currentStageRef.current || '',
          t: new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),
        }]);
      }
    };
    es.onerror=()=>setLiveState(s=>({...s,connected:false}));
    return ()=>es.close();
  },[]);

  // Reset back to idle screen (clears pipeline state, keeps connection + history)
  const handleReset = useCallback(()=>{
    // Clear server-side pipeline state so SSE replays don't re-trigger RunningView
    fetch('/api/reset', {method:'POST'}).catch(()=>{});
    setLiveState(s=>({
      connected: s.connected, pipelinePath:'', stages:[], stageState:{},
      stageInfo:{}, stageResults:{}, currentStage:null, currentNum:0,
      totalStages:0, done:false, elapsed:0, dryRun:false,
    }));
    setLogs([]);
  },[]);

  const { connected, stages, done } = liveState;
  const pipelineActive = stages.length>0 || done;
  const showIdle = !pipelineActive;

  const breadcrumbs = {
    live:'Run Pipeline', dashboard:'Dashboard', pipeline:'Pipeline Stages',
    history:'History', health:'System Health', settings:'Settings',
  };

  // Sub-nav items per view
  const subNavItems = {
    live:      [{id:'overview',label:'Overview',icon:'◉'},{id:'stages',label:'Stage Detail',icon:'⬡'},{id:'logs',label:'Activity Log',icon:'≡'},{id:'options',label:'Run Options',icon:'⚙'}],
    dashboard: [{id:'overview',label:'Overview',icon:'◉'},{id:'recent',label:'Recent Runs',icon:'⊙'},{id:'system',label:'System Health',icon:'♡'}],
    pipeline:  [{id:'overview',label:'All Stages',icon:'◉'},{id:'docs',label:'Documentation',icon:'≡'}],
    history:   [{id:'overview',label:'Run History',icon:'⊙'},{id:'stats',label:'Statistics',icon:'◈'}],
    health:    [{id:'overview',label:'Health Check',icon:'♡'},{id:'agents',label:'Agent Status',icon:'⬡'}],
    settings:  [{id:'overview',label:'Configuration',icon:'⚙'},{id:'about',label:'About',icon:'◉'}],
  };
  const [subView, setSubView] = React.useState('overview');

  const iconNav = [
    {id:'live',      symbol:'▶', label:'Pipeline'},
    {id:'dashboard', symbol:'◈', label:'Dashboard'},
    {id:'pipeline',  symbol:'⬡', label:'Stages'},
    {id:'history',   symbol:'⊙', label:'History'},
    {id:'health',    symbol:'♡', label:'Health'},
    {id:'settings',  symbol:'⚙', label:'Settings'},
  ];

  const projectName = liveState.pipelinePath
    ? (liveState.pipelinePath.split('/').filter(Boolean).pop() || liveState.pipelinePath)
    : 'your-project';

  const allFinishedApp = liveState.done && !liveState.currentStage;
  const hasFailedApp   = Object.values(liveState.stageState).some(s=>s==='error');
  const statusInfoApp  = allFinishedApp
    ? (hasFailedApp ? {cls:'pill-error',text:'FAILED'} : liveState.dryRun ? {cls:'pill-preview',text:'PREVIEW'} : {cls:'pill-done',text:'COMPLETE'})
    : {cls:'pill-running', text: liveState.dryRun ? 'DRY RUN' : 'RUNNING'};

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>

      {/* ── Icon sidebar ── */}
      <aside className="sf-icon-sidebar">
        <div className="sf-icon-logo">
          <SevaForgeLogo size={32} />
        </div>
        <nav className="sf-icon-nav">
          {iconNav.map(v=>(
            <button key={v.id} className={`sf-icon-btn ${view===v.id?'active':''}`}
                    onClick={()=>{ setView(v.id); setSubView('overview'); }}>
              <div className="sf-icon-symbol">
                {v.symbol}
                {v.id==='live' && pipelineActive && (
                  <span style={{
                    position:'absolute',top:6,right:6,width:7,height:7,borderRadius:'50%',
                    background:done?'var(--ok)':'var(--blue)',
                    boxShadow:done?'0 0 5px var(--ok)':'0 0 5px var(--blue)',
                    animation:done?'none':'pulse 1.6s ease-in-out infinite',
                  }}/>
                )}
              </div>
              <span className="sf-icon-label">{v.label}</span>
            </button>
          ))}
        </nav>
        <div className="sf-icon-footer">
          <div style={{
            width:36,height:36,borderRadius:'50%',background:'var(--blue)',
            display:'flex',alignItems:'center',justifyContent:'center',fontSize:'17px',cursor:'pointer',
          }}>💬</div>
          <span style={{fontSize:'9px',fontWeight:700,color:'rgba(255,255,255,.3)',textTransform:'uppercase',letterSpacing:'0.06em',marginTop:1}}>Chat</span>
          <span style={{fontSize:'9px',color:'rgba(255,255,255,.18)',marginTop:1}}>v2.1</span>
        </div>
      </aside>

      {/* ── Secondary sidebar ── */}
      <aside className="sf-sub-sidebar">
        <div className="sf-sub-header">
          <div style={{fontSize:'16px',fontWeight:800,color:'var(--text)',letterSpacing:'-0.2px',marginBottom:2}}>
            {view==='live' ? 'Pipelines' : view==='dashboard' ? 'Dashboard' : (VIEWS.find(v2=>v2.id===view)||{}).label || ''}
          </div>
          {view==='live' && pipelineActive && (
            <div style={{fontSize:'12px',color:'var(--muted)'}}>
              {projectName}
            </div>
          )}
        </div>
        <nav className="sf-sub-nav">
          {(subNavItems[view] || subNavItems.live).map(item=>(
            <button key={item.id}
                    className={`sf-sub-item ${subView===item.id?'active':''}`}
                    onClick={()=>setSubView(item.id)}>
              <span style={{fontSize:'12px',opacity:.65}}>{item.icon}</span>
              {item.label}
            </button>
          ))}
          {view==='live' && pipelineActive && !done && (
            <button className="sf-sub-item" onClick={handleReset}
                    style={{color:'var(--muted)',marginTop:'auto'}}>
              <span style={{fontSize:'12px',opacity:.65}}>←</span>
              New Run
            </button>
          )}
        </nav>
        <div className="sf-sub-footer">
          <span style={{
            width:7,height:7,borderRadius:'50%',display:'inline-block',
            background:connected?'var(--ok)':'#94a3b8',
            boxShadow:connected?'0 0 5px var(--ok)':'none',
          }}/>
          <span style={{fontSize:'13px',color:'var(--muted)'}}>{connected?'Connected':'Connecting…'}</span>
        </div>
      </aside>

      {/* ── Main ── */}
      <div className="sf-main">

        {/* Pipeline header bar — shown when running */}
        {pipelineActive && view==='live' && (
          <div className="sf-pipeline-bar">
            {/* Run number */}
            <div style={{display:'flex',alignItems:'center',gap:5,flexShrink:0}}>
              <span style={{color:'var(--blue)',fontSize:'18px',fontWeight:800}}>↑</span>
              <span style={{fontSize:'15px',fontWeight:700,color:'var(--muted)'}}>#{liveState.totalStages} stages</span>
            </div>
            <div style={{width:1,height:26,background:'var(--border)',flexShrink:0}}/>
            {/* Source */}
            <div style={{display:'flex',alignItems:'center',gap:9,flexShrink:0}}>
              <div style={{
                width:34,height:34,borderRadius:8,flexShrink:0,
                background:'linear-gradient(135deg,#0f172a,#1e293b)',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.05rem',
                border:'1px solid rgba(255,255,255,.08)',
              }}>📂</div>
              <div>
                <div style={{fontWeight:700,fontSize:'15px',color:'var(--text)',lineHeight:1.1,
                             maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                  {projectName}
                </div>
                <div style={{fontSize:'12px',color:'var(--muted)',marginTop:1}}>
                  Local codebase · Runs all stages
                </div>
              </div>
            </div>
            {/* Arrow */}
            <span style={{fontSize:'20px',color:'var(--blue)',flexShrink:0}}>→</span>
            {/* Destination */}
            <div style={{display:'flex',alignItems:'center',gap:9,flexShrink:0}}>
              <div style={{
                width:34,height:34,borderRadius:8,flexShrink:0,
                background:'linear-gradient(135deg,#1e3a8a,#2563eb)',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.05rem',
                border:'1px solid rgba(96,165,250,.2)',
              }}>☁️</div>
              <div>
                <div style={{fontWeight:700,fontSize:'15px',color:'var(--text)',lineHeight:1.1}}>
                  GitHub + Cloud
                </div>
                <div style={{fontSize:'12px',color:'var(--muted)',marginTop:1}}>
                  AWS · GCP · Azure · Loads all stages
                </div>
              </div>
            </div>
            {/* Status + controls */}
            <div style={{marginLeft:'auto',display:'flex',alignItems:'center',gap:8,flexShrink:0}}>
              <span className={`pill ${statusInfoApp.cls}`}
                    style={{fontSize:'13px',fontWeight:700,letterSpacing:'.04em',padding:'5px 14px'}}>
                {!allFinishedApp && <span style={{
                  display:'inline-block',width:7,height:7,borderRadius:'50%',
                  background:'currentColor',marginRight:5,verticalAlign:'middle',
                  animation:'pulse 1.4s ease-in-out infinite',
                }}/>}
                {statusInfoApp.text}
              </span>
              {liveState.elapsed>0 && (
                <span style={{fontSize:'15px',color:'var(--muted)',fontWeight:600}}>{liveState.elapsed}s</span>
              )}
              {!allFinishedApp && (
                <button className="btn-secondary" style={{padding:'6px 14px',fontSize:'15px'}}>
                  ⏸ Pause
                </button>
              )}
              {allFinishedApp && (
                <button onClick={handleReset} className="btn-secondary"
                        style={{padding:'6px 14px',fontSize:'15px'}}>← New Run</button>
              )}
              <span style={{color:'var(--light)',fontSize:'20px',cursor:'pointer',lineHeight:1}}>⋮</span>
            </div>
          </div>
        )}

        {/* Idle topbar */}
        {(!pipelineActive || view!=='live') && (
          <div className="sf-topbar">
            <div className="sf-breadcrumb">
              <span style={{opacity:.6}}>Sevaforge</span>
              <span style={{color:'var(--border)',fontSize:'18px',fontWeight:300}}>›</span>
              <span className="current">{breadcrumbs[view]||view}</span>
            </div>
            <div className="sf-topbar-right">
              {pipelineActive && view!=='live' && (
                <button className="btn-secondary" onClick={()=>setView('live')}
                        style={{fontSize:'15px',padding:'6px 13px'}}>
                  {done?'← View Results':'↗ View Live Run'}
                </button>
              )}
              <span className="sf-version-chip">v2.1.0</span>
            </div>
          </div>
        )}

        {/* Content */}
        <div className="sf-content">
          {view==='live' && (
            showIdle
              ? <IdleScreen connected={connected} onLaunch={()=>setView('live')} />
              : <RunningView liveState={liveState} logs={logs} onReset={handleReset} />
          )}
          {view==='dashboard' && <DashboardView history={history} connected={connected} onNavigate={setView} />}
          {view==='pipeline'  && <StagesView />}
          {view==='history'   && <HistoryView history={history} onClear={()=>{
            fetch('/api/history/clear',{method:'POST'}).catch(()=>{});
            setHistory([]);
          }} />}
          {view==='health'    && <HealthView connected={connected} liveState={liveState} />}
          {view==='settings'  && <SettingsView />}
        </div>
      </div>

      {/* Toast notifications */}
      <div style={{position:'fixed',bottom:24,right:24,display:'flex',flexDirection:'column',gap:8,zIndex:9999}}>
        {toasts.map(t=>(
          <div key={t.id} style={{
            padding:'11px 18px',borderRadius:9,fontSize:'17px',fontWeight:500,minWidth:220,
            background:t.type==='success'?'var(--ok)':t.type==='error'?'var(--err)':'var(--navy)',
            color:'#fff',
            boxShadow:'0 4px 16px rgba(0,0,0,.18), 0 1px 4px rgba(0,0,0,.12)',
            animation:'fadeIn .25s ease both',
          }}>{t.msg}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
