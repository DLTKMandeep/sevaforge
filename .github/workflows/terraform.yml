name: Terraform — Provision OCI Infrastructure

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy from"
        required: true
        default: "gui-polish"
      action:
        required: true
        default: plan
        type: choice
        options: [plan, apply, destroy]
      node_pool:
        description: "Node pool type (arm = A1.Flex free tier, amd = E4.Flex fallback)"
        required: true
        default: arm
        type: choice
        options: [arm, amd]

env:
  TF_WORKING_DIR: forgeflow/infrastructure/oci
  OCI_CLI_SUPPRESS_FILE_PERMISSIONS_WARNING: "True"

jobs:
  terraform:
    name: Terraform ${{ github.event.inputs.action }} (${{ github.event.inputs.node_pool }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}

      - name: Confirm branch and directory
        run: |
          echo "Branch    → $(git branch --show-current)"
          echo "Commit    → $(git rev-parse --short HEAD)"
          echo "Action    → ${{ github.event.inputs.action }}"
          echo "Node pool → ${{ github.event.inputs.node_pool }}"
          ls ${{ env.TF_WORKING_DIR }}/

      - name: Write OCI private key
        run: |
          mkdir -p ~/.oci
          printf '%s' "${{ secrets.OCI_PRIVATE_KEY }}" > ~/.oci/oci_api_key.pem
          chmod 600 ~/.oci/oci_api_key.pem

      - name: Configure OCI CLI
        run: |
          mkdir -p ~/.oci
          {
            echo "[DEFAULT]"
            echo "user=${{ secrets.OCI_USER_OCID }}"
            echo "fingerprint=${{ secrets.OCI_FINGERPRINT }}"
            echo "tenancy=${{ secrets.OCI_TENANCY_OCID }}"
            echo "region=${{ secrets.OCI_REGION }}"
            echo "key_file=$HOME/.oci/oci_api_key.pem"
          } > ~/.oci/config
          chmod 600 ~/.oci/config

      - name: Install OCI CLI
        run: pip install oci-cli --quiet

      - name: Verify OCI auth
        run: oci iam region list --output table

      - name: Restore Terraform state
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_STATE: ${{ secrets.TF_STATE }}
        run: |
          if [ -n "${TF_STATE}" ]; then
            echo "${TF_STATE}" | base64 -d > terraform.tfstate
            echo "✅ State restored ($(wc -c < terraform.tfstate) bytes)"
          else
            echo "No previous state — fresh run"
          fi

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.x"
          terraform_wrapper: false

      - name: Terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      # Migrate state from non-indexed to indexed resource address
      # (oci_containerengine_node_pool.arm → oci_containerengine_node_pool.arm[0])
      - name: Migrate state for count-based node pools
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          # Check if old non-indexed resource exists in state
          if terraform state list 2>/dev/null | grep -q '^oci_containerengine_node_pool\.arm$'; then
            echo "Migrating ARM node pool state: arm → arm[0]"
            terraform state mv \
              'oci_containerengine_node_pool.arm' \
              'oci_containerengine_node_pool.arm[0]' || true
            echo "✅ State migration done"
          else
            echo "No migration needed — state is already indexed or empty"
          fi

      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:       ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:          ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:        ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path:   /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:             ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:     ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_enable_arm_pool:    ${{ github.event.inputs.node_pool == 'arm' }}
          TF_VAR_enable_amd_fallback: ${{ github.event.inputs.node_pool == 'amd' }}
        run: |
          terraform plan -out=tfplan -input=false
          terraform show -no-color tfplan

      - name: Terraform apply
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:       ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:          ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:        ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path:   /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:             ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:     ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_enable_arm_pool:    ${{ github.event.inputs.node_pool == 'arm' }}
          TF_VAR_enable_amd_fallback: ${{ github.event.inputs.node_pool == 'amd' }}
        run: terraform apply -auto-approve -input=false tfplan

      - name: Save Terraform state
        if: always() && (github.event.inputs.action == 'apply' || github.event.inputs.action == 'destroy')
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          STATE_FILE="terraform.tfstate"
          [ ! -f "$STATE_FILE" ] && STATE_FILE="errored.tfstate"
          if [ -f "$STATE_FILE" ]; then
            gh secret set TF_STATE --repo "${{ github.repository }}" --body "$(base64 -w0 $STATE_FILE)"
            echo "✅ State saved ($(wc -c < $STATE_FILE) bytes)"
          fi

      - name: Save cluster outputs
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          CLUSTER_ID=$(terraform output -raw cluster_id)
          gh secret set OKE_CLUSTER_ID --repo "${{ github.repository }}" --body "$CLUSTER_ID"
          echo "✅ Cluster ID: $CLUSTER_ID"
          echo "Active pool: $(terraform output -raw active_node_pool)"

      - name: Generate and save kubeconfig
        if: github.event.inputs.action == 'apply'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          CLUSTER_ID=$(terraform output -raw cluster_id)
          mkdir -p ~/.kube
          oci ce cluster create-kubeconfig \
            --cluster-id "$CLUSTER_ID" \
            --region "${{ secrets.OCI_REGION }}" \
            --token-version 2.0.0 \
            --file ~/.kube/sevaforge-config
          gh secret set KUBE_CONFIG \
            --repo "${{ github.repository }}" \
            --body "$(base64 -w0 ~/.kube/sevaforge-config)"
          echo "✅ Kubeconfig saved"

      - name: Terraform destroy
        if: github.event.inputs.action == 'destroy'
        working-directory: ${{ env.TF_WORKING_DIR }}
        env:
          TF_VAR_tenancy_ocid:       ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_user_ocid:          ${{ secrets.OCI_USER_OCID }}
          TF_VAR_fingerprint:        ${{ secrets.OCI_FINGERPRINT }}
          TF_VAR_private_key_path:   /home/runner/.oci/oci_api_key.pem
          TF_VAR_region:             ${{ secrets.OCI_REGION }}
          TF_VAR_compartment_id:     ${{ secrets.OCI_TENANCY_OCID }}
          TF_VAR_enable_arm_pool:    ${{ github.event.inputs.node_pool == 'arm' }}
          TF_VAR_enable_amd_fallback: ${{ github.event.inputs.node_pool == 'amd' }}
        run: terraform destroy -auto-approve -input=false

      - name: Job summary
        if: always()
        run: |
          echo "## Terraform ${{ github.event.inputs.action }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Branch: ${{ github.event.inputs.branch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Node pool: ${{ github.event.inputs.node_pool }}" >> "$GITHUB_STEP_SUMMARY"
