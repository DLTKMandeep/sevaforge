<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sevaforge — AIDDaaS</title>
  <link rel="preconnect" href="https://fonts.bunny.net">
  <link href="https://fonts.bunny.net/css?family=inter:300,400,500,600,700,800,900&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      /* ── Sidebar (dark slate) ─────────────────────────── */
      --navy:      #0f172a;
      --navy-md:   #1e293b;
      --navy-lt:   #334155;
      /* ── Primary blue ────────────────────────────────── */
      --blue:      #2563eb;
      --blue2:     #1d4ed8;
      --blue3:     #60a5fa;   /* lighter blue for dark backgrounds */
      --blue-lt:   #eff6ff;
      --blue-br:   #bfdbfe;
      /* ── Backgrounds ─────────────────────────────────── */
      --bg:        #f8fafc;
      --bg2:       #f1f5f9;
      /* ── Surfaces ────────────────────────────────────── */
      --card:      #ffffff;
      --border:    #e2e8f0;
      --border-lt: #f1f5f9;
      /* ── Typography ──────────────────────────────────── */
      --text:      #0f172a;
      --text2:     #334155;
      --muted:     #64748b;
      --light:     #94a3b8;
      /* ── Semantic ─────────────────────────────────────── */
      --ok:        #059669;
      --ok-bg:     #ecfdf5;
      --ok-br:     #6ee7b7;
      --err:       #dc2626;
      --err-bg:    #fef2f2;
      --err-br:    #fca5a5;
      --warn:      #d97706;
      --purple:    #7c3aed;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg); color: var(--text); height: 100vh; overflow: hidden;
    }
    #root { height: 100vh; display: flex; }

    /* ─── Sidebar ─────────────────────────────────────────────────────── */
    .sf-sidebar {
      width: 252px; min-width: 252px;
      background: var(--navy);
      display: flex; flex-direction: column; height: 100vh;
      border-right: 1px solid rgba(255,255,255,.04);
      position: relative;
    }

    /* Logo block */
    .sf-logo-block {
      padding: 20px 16px 16px;
      border-bottom: 1px solid rgba(255,255,255,.06);
    }
    .sf-logo-row {
      display: flex; align-items: center; gap: 10px;
    }
    .sf-logo-text { flex: 1; min-width: 0; }
    .sf-logo-name {
      font-size: 15px; font-weight: 800; color: #fff;
      letter-spacing: -0.3px; line-height: 1.1;
    }
    .sf-logo-sub {
      font-size: 9px; font-weight: 700; color: var(--blue3);
      letter-spacing: 0.12em; text-transform: uppercase; margin-top: 2px;
    }
    .sf-logo-divider { height: 1px; background: rgba(255,255,255,.06); margin: 12px 0 10px; }
    .sf-logo-tagline {
      font-size: 10.5px; color: rgba(255,255,255,.28); line-height: 1.45;
      font-weight: 400; padding: 0 2px;
    }
    .sf-aidaas-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(96,165,250,.1); border: 1px solid rgba(96,165,250,.2);
      color: var(--blue3); padding: 3px 9px; border-radius: 20px;
      font-size: 9px; font-weight: 700; letter-spacing: 0.08em;
      text-transform: uppercase; margin-top: 8px;
    }

    /* Nav */
    .sf-nav { flex: 1; padding: 10px 10px 6px; display: flex; flex-direction: column; gap: 1px; overflow-y: auto; }
    .sf-nav-group-label {
      font-size: 9px; font-weight: 700; color: rgba(255,255,255,.2);
      text-transform: uppercase; letter-spacing: 0.12em;
      padding: 10px 8px 5px;
    }
    .sf-nav-item {
      display: flex; align-items: center; gap: 9px;
      padding: 8px 10px; border-radius: 7px; cursor: pointer;
      font-size: 13.5px; font-weight: 500; color: rgba(255,255,255,.45);
      transition: all .12s ease; border: none; background: transparent;
      width: 100%; text-align: left; position: relative;
    }
    .sf-nav-item:hover  { background: rgba(255,255,255,.06); color: rgba(255,255,255,.85); }
    .sf-nav-item.active { background: rgba(96,165,250,.12); color: #fff; font-weight: 600; }
    .sf-nav-item.active::before {
      content: ''; position: absolute; left: 0; top: 20%; height: 60%;
      width: 3px; background: var(--blue3); border-radius: 0 3px 3px 0;
    }
    .sf-nav-icon {
      width: 16px; height: 16px; text-align: center; flex-shrink: 0;
      font-size: 12px; display: flex; align-items: center; justify-content: center;
      opacity: 0.55;
    }
    .sf-nav-item.active .sf-nav-icon, .sf-nav-item:hover .sf-nav-icon { opacity: 1; }
    .sf-nav-badge {
      margin-left: auto; width: 7px; height: 7px; border-radius: 50%;
      flex-shrink: 0;
    }

    /* Status bar */
    .sf-status-bar {
      padding: 12px 16px;
      border-top: 1px solid rgba(255,255,255,.05);
      display: flex; align-items: center; gap: 8px;
    }
    .sf-status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ─── Main content ─────────────────────────────────────────────────── */
    .sf-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .sf-topbar {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 1px 0 rgba(15,23,42,.04);
      padding: 0 28px; height: 52px; display: flex; align-items: center;
      gap: 12px; flex-shrink: 0;
    }
    .sf-breadcrumb {
      font-size: 13px; color: var(--muted);
      display: flex; align-items: center; gap: 8px; flex: 1;
    }
    .sf-breadcrumb .current { color: var(--text); font-weight: 600; }
    .sf-topbar-right { display: flex; align-items: center; gap: 10px; }
    .sf-version-chip {
      background: var(--blue-lt); border: 1px solid var(--blue-br);
      color: var(--blue); font-size: 10px; font-weight: 700;
      padding: 3px 10px; border-radius: 20px; letter-spacing: 0.03em;
    }
    .sf-content { flex: 1; overflow-y: auto; padding: 20px 24px; }

    /* ─── Cards ───────────────────────────────────────────────────────── */
    .sf-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 1px 3px rgba(15,23,42,.05), 0 4px 12px rgba(15,23,42,.04);
    }
    .sf-card-header {
      padding: 10px 16px; border-bottom: 1px solid var(--border-lt);
      font-size: 10.5px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.08em;
      display: flex; align-items: center; gap: 8px;
      background: #fafbfc; border-radius: 12px 12px 0 0;
    }
    .sf-card-body { padding: 14px 16px; }

    /* ─── Buttons ─────────────────────────────────────────────────────── */
    .btn-primary {
      background: var(--blue); color: #fff; border: none;
      padding: 9px 20px; border-radius: 8px; font-size: 13.5px; font-weight: 600;
      cursor: pointer; transition: all .15s; font-family: inherit;
      display: inline-flex; align-items: center; gap: 7px; letter-spacing: -0.1px;
      box-shadow: 0 1px 2px rgba(37,99,235,.2), 0 2px 8px rgba(37,99,235,.12);
    }
    .btn-primary:hover { background: var(--blue2); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,.3); }
    .btn-primary:active { transform: none; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-secondary {
      background: var(--card); color: var(--text2);
      border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px;
      font-size: 13px; font-weight: 500; cursor: pointer; transition: all .12s;
      display: inline-flex; align-items: center; gap: 6px; font-family: inherit;
    }
    .btn-secondary:hover { border-color: var(--blue-br); background: var(--blue-lt); color: var(--blue); }

    /* ─── Pills/tags ──────────────────────────────────────────────────── */
    .pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 9px; border-radius: 20px;
      font-size: 11px; font-weight: 600; white-space: nowrap;
    }
    .pill-running  { background: var(--blue-lt); color: var(--blue); border: 1px solid var(--blue-br); }
    .pill-done     { background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok-br); }
    .pill-error    { background: var(--err-bg); color: var(--err); border: 1px solid var(--err-br); }
    .pill-pending  { background: var(--bg2); color: var(--light); border: 1px solid var(--border); }
    .pill-preview  { background: rgba(124,58,237,.08); color: #7c3aed; border: 1px solid rgba(124,58,237,.25); }
    .pill-skipped  { background: var(--bg2); color: var(--muted); border: 1px solid var(--border); font-style: italic; }

    /* ─── Pipeline node graph ─────────────────────────────────────────── */
    .pipeline-canvas {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 12px; padding: 22px 18px;
      overflow-x: auto; overflow-y: visible;
    }
    .pipeline-node {
      width: 136px; flex-shrink: 0;
      background: var(--card); border: 1.5px solid var(--border);
      border-radius: 10px; padding: 12px 10px 10px;
      position: relative; transition: all .18s ease;
      box-shadow: 0 1px 4px rgba(15,23,42,.05);
    }
    .pipeline-node.running {
      border-color: var(--blue); background: var(--blue-lt);
      box-shadow: 0 0 0 3px rgba(37,99,235,.1), 0 4px 16px rgba(37,99,235,.1);
    }
    .pipeline-node.done  { border-color: var(--ok); background: var(--ok-bg); }
    .pipeline-node.error { border-color: var(--err); background: var(--err-bg); }
    .pipeline-node.pending { opacity: .4; }
    .pipeline-arrow { display: flex; align-items: center; flex-shrink: 0; width: 20px; }
    .node-num { position: absolute; top: 5px; right: 7px; font-size: 9px; font-weight: 700; color: var(--light); }

    /* ─── Progress bar ────────────────────────────────────────────────── */
    .sf-progress-track { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .sf-progress-fill  { height: 100%; border-radius: 4px; transition: width .8s ease; background: linear-gradient(90deg, var(--blue), var(--ok)); }

    /* ─── Folder picker ───────────────────────────────────────────────── */
    .folder-drop-zone {
      border: 2px dashed #cbd5e1; border-radius: 10px;
      padding: 28px 24px; text-align: center; cursor: pointer;
      transition: all .18s ease; background: var(--bg2);
    }
    .folder-drop-zone:hover, .folder-drop-zone.has-path { border-color: var(--blue); background: var(--blue-lt); }
    .folder-icon { font-size: 2rem; margin-bottom: 10px; }

    /* ─── Idle hero banner ────────────────────────────────────────────── */
    .idle-hero {
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 55%, #1d4ed8 100%);
      border-radius: 14px; padding: 22px 26px; margin-bottom: 0;
      color: white; position: relative; overflow: hidden;
    }
    .idle-hero::before {
      content: ''; position: absolute; top: -80px; right: -60px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(96,165,250,.22) 0%, transparent 70%);
    }
    .idle-hero::after {
      content: ''; position: absolute; bottom: -60px; left: 10px;
      width: 300px; height: 200px;
      background: radial-gradient(ellipse, rgba(59,130,246,.1) 0%, transparent 70%);
    }

    /* ─── Stat cards ──────────────────────────────────────────────────── */
    .stat-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px 20px;
      box-shadow: 0 1px 3px rgba(15,23,42,.04);
    }
    .stat-label { font-size: 10.5px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 800; line-height: 1; margin-bottom: 3px; letter-spacing: -1px; }
    .stat-sub   { font-size: 11.5px; color: var(--muted); }

    /* ─── Ticker ──────────────────────────────────────────────────────── */
    .ticker-wrap { background: var(--blue-lt); border: 1px solid var(--blue-br); border-radius: 8px; padding: 10px 13px; margin-top: 10px; }
    .ticker-label { font-size: 9.5px; font-weight: 700; color: var(--blue); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 5px; }

    /* ─── Hourglass ───────────────────────────────────────────────────── */
    .hg-wrap { border-radius: 10px; overflow: hidden; box-shadow: 0 0 0 1.5px rgba(37,99,235,.2), 0 6px 24px rgba(37,99,235,.12); }
    .hg-wrap canvas { display: block; border-radius: 9px; }

    /* ─── Victory ─────────────────────────────────────────────────────── */
    .victory-card {
      background: linear-gradient(145deg, #ecfdf5 0%, #f0fdf4 100%);
      border: 1.5px solid var(--ok-br); border-radius: 14px; overflow: hidden;
    }
    .victory-header {
      background: linear-gradient(135deg, #059669 0%, #047857 100%);
      padding: 24px 28px; display: flex; align-items: center; gap: 18px;
    }

    /* ─── Page header ─────────────────────────────────────────────────── */
    .page-title { font-size: 22px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 4px; }
    .page-sub   { color: var(--muted); font-size: 13.5px; line-height: 1.5; }

    /* ─── Divider ─────────────────────────────────────────────────────── */
    .divider { height: 1px; background: var(--border); margin: 6px 0; }

    /* ─── Feature item ────────────────────────────────────────────────── */
    .feature-item {
      display: flex; gap: 12px; align-items: flex-start;
      padding: 11px 14px; border-radius: 9px;
      background: var(--bg2); border: 1px solid var(--border);
      transition: all .15s;
    }
    .feature-item:hover { border-color: var(--blue-br); background: var(--blue-lt); }
    .feature-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
    .feature-label { font-size: 12.5px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .feature-sub   { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* ─── Input ───────────────────────────────────────────────────────── */
    .sf-input {
      flex: 1; padding: 9px 13px; border-radius: 8px;
      font-family: 'SFMono-Regular', 'Menlo', 'Consolas', monospace;
      font-size: 12.5px; border: 1.5px solid var(--border);
      outline: none; background: var(--card); color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }
    .sf-input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    .sf-input.err   { border-color: var(--err); }

    /* ─── Stage result row ────────────────────────────────────────────── */
    .stage-result-row {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 14px; border-radius: 8px;
    }
    .stage-result-row.ok   { background: var(--ok-bg); border: 1px solid var(--ok-br); }
    .stage-result-row.fail { background: var(--err-bg); border: 1px solid var(--err-br); }

    /* ─── Animations ──────────────────────────────────────────────────── */
    @keyframes spin     { to   { transform: rotate(360deg); } }
    @keyframes pulse    { 0%,100%{opacity:1} 50%{opacity:.35} }
    @keyframes fadeIn   { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
    @keyframes victoryPop { 0%{transform:scale(.93);opacity:0} 100%{transform:scale(1);opacity:1} }
    @keyframes runnerGlow {
      0%,100%{box-shadow:0 0 0 3px rgba(37,99,235,.1),0 4px 16px rgba(37,99,235,.1)}
      50%{box-shadow:0 0 0 4px rgba(37,99,235,.2),0 6px 20px rgba(37,99,235,.18)}
    }
    .spin        { animation: spin .7s linear infinite; display: inline-block; }
    .pulse       { animation: pulse 1.6s ease-in-out infinite; }
    .fade-in     { animation: fadeIn .25s ease both; }
    .victory-pop { animation: victoryPop .45s cubic-bezier(.34,1.56,.64,1) both; }
    .runner-glow { animation: runnerGlow 2s ease-in-out infinite; }

    /* ─── Agent at Work Banner ────────────────────────────────────────────── */
    .aaw-wrap {
      border-radius: 14px; overflow: hidden; position: relative;
      background: linear-gradient(130deg, #0f172a 0%, #1e293b 55%, #0f2351 100%);
      border: 1px solid rgba(96,165,250,.2);
      box-shadow: 0 0 0 1px rgba(59,130,246,.06), 0 8px 40px rgba(15,23,42,.35),
                  inset 0 1px 0 rgba(255,255,255,.04);
      display: flex; align-items: center; gap: 0; min-height: 200px;
    }
    .aaw-glow-bg {
      position: absolute; left: 0; top: 0; width: 240px; height: 100%;
      background: radial-gradient(ellipse at 50% 50%, rgba(59,130,246,.15) 0%, transparent 70%);
      animation: aawGlowPulse 3s ease-in-out infinite;
      pointer-events: none;
    }
    @keyframes aawGlowPulse { 0%,100%{opacity:.6; transform:scale(1)} 50%{opacity:1; transform:scale(1.12)} }
    .aaw-orb-col {
      width: 180px; flex-shrink: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; position: relative; padding: 24px 0;
    }
    .aaw-stage-counter {
      font-size: 10px; font-weight: 700; color: rgba(255,255,255,.3);
      font-family: 'Inter', system-ui, sans-serif; letter-spacing: 0.05em;
    }
    .aaw-sep {
      width: 1px; align-self: stretch;
      background: linear-gradient(to bottom, transparent 5%, rgba(96,165,250,.25) 30%,
                  rgba(96,165,250,.25) 70%, transparent 95%);
      flex-shrink: 0;
    }
    .aaw-content {
      flex: 1; padding: 28px 32px; display: flex; flex-direction: column;
      justify-content: center;
    }
    .aaw-badge {
      display: inline-flex; align-items: center; gap: 7px; margin-bottom: 14px;
      background: rgba(96,165,250,.12); border: 1px solid rgba(96,165,250,.25);
      color: var(--blue3); padding: 4px 12px; border-radius: 20px;
      font-size: 10px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      width: fit-content;
    }
    .aaw-badge-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--blue3);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .aaw-stage-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .aaw-stage-emoji { font-size: 1.5rem; line-height: 1; }
    .aaw-stage-name { font-size: 21px; font-weight: 900; color: #fff; letter-spacing: -0.4px; line-height: 1.1; }
    .aaw-expect { font-size: 12.5px; color: rgba(255,255,255,.48); margin-bottom: 16px; line-height: 1.55; max-width: 420px; }
    .aaw-step-box {
      background: rgba(59,130,246,.08); border: 1px solid rgba(59,130,246,.2);
      border-radius: 8px; padding: 11px 14px; margin-bottom: 14px;
    }
    .aaw-step-label {
      font-size: 9px; font-weight: 800; color: rgba(147,197,253,.8);
      text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px;
    }
    .aaw-step-text { font-size: 13px; color: rgba(255,255,255,.8); line-height: 1.5; min-height: 1.5em; transition: opacity .3s ease; }
    .aaw-bottom { display: flex; align-items: center; gap: 10px; }
    .aaw-counter {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,.35);
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08);
      padding: 4px 12px; border-radius: 20px;
    }
    .aaw-wave { display: flex; align-items: center; gap: 3px; height: 20px; margin-left: auto; }
    .aaw-wave span {
      width: 3px; border-radius: 2px; background: var(--blue3); opacity: .7;
      animation: aawWaveBar 1.1s ease-in-out infinite;
    }
    .aaw-wave span:nth-child(1){height:5px; animation-delay:.0s}
    .aaw-wave span:nth-child(2){height:11px;animation-delay:.1s}
    .aaw-wave span:nth-child(3){height:18px;animation-delay:.2s}
    .aaw-wave span:nth-child(4){height:9px; animation-delay:.3s}
    .aaw-wave span:nth-child(5){height:15px;animation-delay:.4s}
    .aaw-wave span:nth-child(6){height:7px; animation-delay:.15s}
    .aaw-wave span:nth-child(7){height:13px;animation-delay:.25s}
    @keyframes aawWaveBar { 0%,100%{transform:scaleY(.3);opacity:.3} 50%{transform:scaleY(1);opacity:.85} }

    /* ─── Scrollbar ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Stage metadata ────────────────────────────────────────────────────────────
const STAGE_INFO_FULL = [
  { id:'discover',  emoji:'🔍', label:'Discover',
    consumer:'Sevaforge reads your project for the first time — detecting language, framework, port, and all dependencies — so every later stage is tailored to your codebase.',
    outputs:'Tech stack · Entry points · Port · Dependency list',
    steps:['Scanning directory tree and file extensions…','Detecting language and runtime version…','Identifying web framework and entry point…','Mapping declared dependencies…','Detecting exposed port and env vars…','Checking for existing Dockerfiles or CI configs…','Writing tech-stack manifest to staging/…'] },
  { id:'normalize', emoji:'🔧', label:'Normalize',
    consumer:'Your project gets tidied up — a proper .gitignore so passwords never leak, a README, and consistent code-style settings so the whole team formats code the same way.',

const timeSince = (ts) => {
  if (!ts) return '—';
  const d = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (d < 60) return `${d}s ago`;
  if (d < 3600) return `${Math.floor(d/60)}m ago`;
  return new Date(ts).toLocaleTimeString();
};

// ── Hourglass animation canvas ────────────────────────────────────────────────
function HourGlass({ status = 'running', size = 140 }) {
  const canvasRef = useRef(null);
  useEffect(() => {
    const cv = canvasRef.current; if (!cv) return;
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height, cx = W/2, cy = H/2;
    const TW = W*.38, TH = H*.39, NK = 2.8;
    const outlinePath = () => { ctx.beginPath(); ctx.moveTo(cx-TW,cy-TH); ctx.lineTo(cx+TW,cy-TH); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx+TW,cy+TH); ctx.lineTo(cx-TW,cy+TH); ctx.lineTo(cx-NK,cy); ctx.closePath(); };
    const topClip = () => { ctx.beginPath(); ctx.moveTo(cx-TW,cy-TH); ctx.lineTo(cx+TW,cy-TH); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx-NK,cy); ctx.closePath(); };
    const botClip = () => { ctx.beginPath(); ctx.moveTo(cx-NK,cy); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx+TW,cy+TH); ctx.lineTo(cx-TW,cy+TH); ctx.closePath(); };
    let level=0, grains=[], alive=true, rafId, last=null; const CYCLE=5500;
    const frame = (ts) => {
      if (!alive) return;
      if (last===null) last=ts;
      const dt=Math.min(ts-last,50); last=ts;
      level+=dt/CYCLE; if(level>1) level=0;
      ctx.clearRect(0,0,W,H); ctx.fillStyle='#f0f6ff'; ctx.fillRect(0,0,W,H);
      const og=ctx.createLinearGradient(cx,cy-TH,cx,cy+TH);
      og.addColorStop(0,'rgba(37,99,235,.8)'); og.addColorStop(.5,'rgba(29,78,216,.6)'); og.addColorStop(1,'rgba(37,99,235,.8)');
      ctx.save(); outlinePath(); ctx.strokeStyle=og; ctx.lineWidth=2; ctx.stroke(); ctx.restore();
      const topSandH=TH*(1-level), topSandY=cy-topSandH, topSandSpan=NK+(TW-NK)*topSandH/TH;
      ctx.save(); topClip(); ctx.clip();
      const tg=ctx.createLinearGradient(0,topSandY,0,cy);
      tg.addColorStop(0,'rgba(37,99,235,.18)'); tg.addColorStop(1,'rgba(37,99,235,.45)');
      ctx.beginPath(); ctx.moveTo(cx-topSandSpan,topSandY); ctx.lineTo(cx+topSandSpan,topSandY); ctx.lineTo(cx+NK,cy); ctx.lineTo(cx-NK,cy); ctx.closePath(); ctx.fillStyle=tg; ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx-topSandSpan,topSandY); ctx.lineTo(cx+topSandSpan,topSandY); ctx.strokeStyle='rgba(37,99,235,.7)'; ctx.lineWidth=1.3; ctx.stroke(); ctx.restore();
      const botSandH=TH*level, botSandY=cy+TH-botSandH, botSandSpan=NK+(TW-NK)*botSandH/TH;
      ctx.save(); botClip(); ctx.clip();
      const bg2=ctx.createLinearGradient(0,botSandY,0,cy+TH);
      bg2.addColorStop(0,'rgba(37,99,235,.22)'); bg2.addColorStop(1,'rgba(37,99,235,.5)');
      ctx.beginPath(); ctx.moveTo(cx-botSandSpan,botSandY); ctx.lineTo(cx+botSandSpan,botSandY); ctx.lineTo(cx+TW,cy+TH); ctx.lineTo(cx-TW,cy+TH); ctx.closePath(); ctx.fillStyle=bg2; ctx.fill();
      ctx.beginPath(); ctx.moveTo(cx-botSandSpan,botSandY); ctx.lineTo(cx+botSandSpan,botSandY); ctx.strokeStyle='rgba(37,99,235,.55)'; ctx.lineWidth=1.1; ctx.stroke(); ctx.restore();
      if (status==='running') {
        if (Math.random()<.35) grains.push({x:cx+(Math.random()-.5)*3,y:cy+1,vy:1.2+Math.random()*2,r:.7+Math.random()*.9,a:.6+Math.random()*.4});
        grains=grains.filter(g=>{ g.y+=g.vy; g.vy+=.18; if(g.y>botSandY) return false; ctx.beginPath(); ctx.arc(g.x,g.y,g.r,0,Math.PI*2); ctx.fillStyle=`rgba(37,99,235,${g.a})`; ctx.fill(); return true; });
      }
      rafId=requestAnimationFrame(frame);
    };
    rafId=requestAnimationFrame(frame);
    return ()=>{ alive=false; cancelAnimationFrame(rafId); };
  }, [status]);
  return <div className="hg-wrap" style={{width:size,height:size}}><canvas ref={canvasRef} width={size} height={size} /></div>;
}

// ── Activity ticker ───────────────────────────────────────────────────────────
function ActivityTicker({ stageId, running }) {
  const steps = (STAGE_INFO_FULL.find(s=>s.id===stageId)||{}).steps || ['Working…'];
  const [idx, setIdx] = useState(0);
  const [vis, setVis] = useState(true);
  useEffect(() => {
    if (!running) return;
    setIdx(0); setVis(true);
    const iv = setInterval(()=>{ setVis(false); setTimeout(()=>{ setIdx(i=>(i+1)%steps.length); setVis(true); },280); },4000);
    return ()=>clearInterval(iv);
  }, [stageId, running]);
  return (
    <div className="ticker-wrap">
      <div className="ticker-label">⚡ Live activity</div>
      <div style={{fontSize:'12px',color:'#1e40af',lineHeight:1.55,opacity:vis?1:0,transition:'opacity .28s',minHeight:'1.3rem'}}>
        {steps[idx]}
      </div>
      <div style={{display:'flex',gap:4,marginTop:7}}>
        {steps.map((_,i)=><span key={i} style={{width:5,height:5,borderRadius:'50%',display:'inline-block',background:i===idx?'var(--blue)':'var(--blue-br)',transition:'background .3s'}} />)}
      </div>
    </div>
  );
}

// ── Built-in folder browser (cross-platform, no OS dialog needed) ─────────────
function FolderBrowserModal({ onSelect, onCancel }) {
  const [cwd,     setCwd]     = useState(null);
  const [parent,  setParent]  = useState(null);
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(false);
  const [errMsg,  setErrMsg]  = useState('');

  const nav = async (path) => {
    setLoading(true); setErrMsg('');
    try {
      const res  = await fetch(`/api/ls?path=${encodeURIComponent(path)}`);
      const data = await res.json();
      if (data.error) { setErrMsg(data.error); setLoading(false); return; }
      setCwd(data.path); setParent(data.parent); setEntries(data.entries);
    } catch(e) { setErrMsg(`Server error: ${e.message}`); }
    setLoading(false);
  };

  useEffect(() => { nav('~'); }, []);

  // Split cwd into breadcrumb parts
  const parts = cwd ? cwd.split('/').filter(Boolean) : [];

  return (
    <div style={{
      position:'fixed',inset:0,background:'rgba(15,23,42,.55)',
      display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000,
      backdropFilter:'blur(3px)',
    }}>
      <div style={{
        background:'var(--card)',borderRadius:14,width:560,maxHeight:'78vh',
        display:'flex',flexDirection:'column',
        boxShadow:'0 24px 64px rgba(15,23,42,.28),0 4px 16px rgba(15,23,42,.12)',
        border:'1px solid var(--border)',overflow:'hidden',
      }}>

        {/* Header */}
        <div style={{
          padding:'16px 20px',borderBottom:'1px solid var(--border)',
          display:'flex',alignItems:'center',gap:12,background:'#fafbfd',
        }}>
          <span style={{fontSize:'1.3rem'}}>📁</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontWeight:700,fontSize:'14px',color:'var(--text)',marginBottom:3}}>
              Select Project Folder
            </div>
            {/* Breadcrumb */}
            <div style={{display:'flex',alignItems:'center',gap:3,flexWrap:'wrap'}}>
              <span style={{
                fontSize:'10.5px',color:'var(--blue)',cursor:'pointer',fontWeight:600,
              }} onClick={()=>nav('/')}>
                /
              </span>
              {parts.map((part,i)=>{
                const fullPath = '/' + parts.slice(0,i+1).join('/');
                const isLast   = i===parts.length-1;
                return (
                  <React.Fragment key={fullPath}>
                    <span style={{fontSize:'10px',color:'var(--light)'}}>›</span>
                    <span
                      onClick={()=>!isLast && nav(fullPath)}
                      style={{
                        fontSize:'10.5px',fontWeight:isLast?700:500,
                        color:isLast?'var(--text)':'var(--blue)',
                        cursor:isLast?'default':'pointer',
                        maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
                      }}>{part}</span>
                  </React.Fragment>
                );
              })}
            </div>
          </div>
          <button onClick={onCancel} style={{
            background:'none',border:'none',cursor:'pointer',fontSize:'18px',
            color:'var(--light)',lineHeight:1,padding:'4px',
          }}>✕</button>
        </div>

        {/* Directory listing */}
        <div style={{flex:1,overflowY:'auto',padding:'8px 10px'}}>
          {/* Up one level */}
          {parent && (
            <div onClick={()=>nav(parent)} style={{
              display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
              borderRadius:7,cursor:'pointer',marginBottom:2,
              color:'var(--muted)',fontSize:'13px',fontWeight:500,
              transition:'background .1s',
            }}
            onMouseEnter={e=>e.currentTarget.style.background='var(--bg2)'}
            onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
              <span style={{fontSize:'1rem'}}>↑</span>
              <span>.. (up one level)</span>
            </div>
          )}

          {/* Loading */}
          {loading && (
            <div style={{padding:'24px',textAlign:'center',color:'var(--muted)',fontSize:'13px'}}>
              <span className="spin" style={{display:'inline-block',marginRight:8}}>⟳</span>Loading…
            </div>
          )}

          {/* Error */}
          {errMsg && !loading && (
            <div style={{padding:'16px',color:'var(--err)',fontSize:'12.5px',textAlign:'center'}}>
              ⚠ {errMsg}
            </div>
          )}

          {/* Entries */}
          {!loading && entries.map(e=>(
            <div key={e.path}
              style={{
                display:'flex',alignItems:'center',gap:10,padding:'8px 12px',
                borderRadius:7,cursor:'pointer',marginBottom:1,
                transition:'background .1s',
              }}
              onMouseEnter={ev=>ev.currentTarget.style.background='var(--bg2)'}
              onMouseLeave={ev=>ev.currentTarget.style.background='transparent'}
              onClick={()=>nav(e.path)}
            >
              <span style={{fontSize:'1rem',flexShrink:0}}>📁</span>
              <span style={{flex:1,fontSize:'13px',color:'var(--text)',fontWeight:500,
                            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {e.name}
              </span>
              <span style={{fontSize:'11px',color:'var(--light)',flexShrink:0}}>›</span>
            </div>
          ))}

          {!loading && !errMsg && entries.length===0 && (
            <div style={{padding:'24px',textAlign:'center',color:'var(--muted)',fontSize:'12.5px'}}>
              No subfolders here
            </div>
          )}
        </div>

        {/* Footer — current path + confirm */}
        <div style={{
          padding:'14px 20px',borderTop:'1px solid var(--border)',
          background:'#fafbfd',display:'flex',alignItems:'center',gap:10,
        }}>
          <div style={{
            flex:1,fontFamily:'monospace',fontSize:'11.5px',color:'var(--muted)',
            overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',
            background:'var(--bg2)',border:'1px solid var(--border)',
            padding:'6px 10px',borderRadius:6,
          }}>
            {cwd || '…'}
          </div>
          <button className="btn-primary" onClick={()=>cwd && onSelect(cwd)}
                  disabled={!cwd} style={{flexShrink:0,padding:'8px 18px',fontSize:'13px'}}>
            ✓ Select this folder
          </button>
        </div>
      </div>
    </div>
  );
}

function AgentAtWorkBanner({ currentStage, currentNum = 0, totalStages = 0 }) {
  const [stepIdx, setStepIdx] = useState(0);
  const [stepVis, setStepVis] = useState(true);

  const steps  = (currentStage && AAW_STEPS[currentStage]) || ['Preparing next stage…'];
  const meta   = STAGE_INFO_FULL.find(s => s.id === currentStage) || {};
  const emoji  = meta.emoji  || '⚡';
  const label  = meta.label  || (currentStage ? currentStage : 'Pipeline');

  // Cycle step text when stage changes
  useEffect(() => {
    setStepIdx(0); setStepVis(true);
    const iv = setInterval(() => {
      setStepVis(false);
      setTimeout(() => { setStepIdx(i => (i + 1) % steps.length); setStepVis(true); }, 350);
    }, 3200);
    return () => clearInterval(iv);
  }, [currentStage, steps.length]);

  return (
    <div className="aaw-wrap fade-in">
      {/* Ambient glow behind orb */}
      <div className="aaw-glow-bg" />

      {/* Left: hourglass */}
      <div className="aaw-orb-col">
        <HourGlass status="running" size={150} />
        {totalStages > 0 && (
          <div className="aaw-stage-counter">
            stage {currentNum || '…'} / {totalStages}
          </div>
        )}
      </div>

      {/* Vertical separator */}
      <div className="aaw-sep" />

      {/* Right: text content */}
      <div className="aaw-content">
        <div className="aaw-badge">
          <span className="aaw-badge-dot" />
          Agent at work — sit back and relax ☕
        </div>

        {/* Stage name */}
        <div className="aaw-stage-row">
          <span className="aaw-stage-emoji">{emoji}</span>
          <div className="aaw-stage-name">{label}</div>
        </div>

        {/* What to expect */}
        {meta.consumer && (
          <div className="aaw-expect">{meta.consumer}</div>
        )}

        {/* Cycling step */}
        <div className="aaw-step-box">
          <div className="aaw-step-label">⚡ Right now</div>
          <div className="aaw-step-text" style={{opacity: stepVis ? 1 : 0}}>
            {steps[stepIdx]}
          </div>
        </div>

        <div className="aaw-bottom">
          {totalStages > 0 && (
            <div className="aaw-counter">Stage {currentNum} of {totalStages}</div>
          )}
          <div className="aaw-wave">
            <span/><span/><span/><span/><span/><span/><span/>
          </div>
        </div>
      </div>
    </div>
  );
}

                  🌱 {gfParent.replace(/\/$/,'')}/{gfName}
                </div>
              )}

          <div style={{
            marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',

                boxShadow:'0 1px 4px rgba(0,0,0,.25)',

            </div>
          </div>
          {/* ── Dry Run toggle ── */}
          <div style={{
            marginTop:10,paddingTop:10,borderTop:'1px solid var(--border)',
            display:'flex',alignItems:'center',justifyContent:'space-between',
          }}>
            <div style={{display:'flex',alignItems:'center',gap:8}}>
              <span style={{fontSize:'13px'}}>🔬</span>
              <div>
                <div style={{fontSize:'12.5px',fontWeight:600,color:dryRun?'#7c3aed':'var(--text)'}}>

                </div>
                <div style={{fontSize:'10.5px',color:'var(--muted)'}}>
                  {dryRun ? 'Agents simulate work — no files will be written' : 'Preview what each agent would do without writing files'}
                </div>
              </div>
            </div>
            <div onClick={()=>{setDryRun(d=>!d); if(!dryRun) setSelectedStages(PIPELINE_STAGE_IDS.slice());}} style={{
              width:44,height:24,borderRadius:12,cursor:'pointer',
              background: dryRun ? '#7c3aed' : '#cbd5e1',
              position:'relative',transition:'background .2s',flexShrink:0,
            }}>
              <div style={{
                position:'absolute',top:3,
                left: dryRun ? 23 : 3,
                width:18,height:18,borderRadius:'50%',
                background:'#fff',transition:'left .2s',
                boxShadow:'0 1px 4px rgba(0,0,0,.25)',
              }}/>
            </div>
          </div>

          {/* ── Stage selector (only shown when dry run is on) ── */}
          {dryRun && (
            <div style={{
              marginTop:10,padding:'12px 14px',
              background:'rgba(124,58,237,.05)',
              border:'1px solid rgba(124,58,237,.2)',
              borderRadius:8,
            }}>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
                <div style={{fontSize:'11px',fontWeight:700,color:'#7c3aed',textTransform:'uppercase',letterSpacing:'0.07em'}}>
                  🔬 Choose stages to preview
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={()=>setSelectedStages(PIPELINE_STAGE_IDS.slice())} style={{
                    fontSize:'10px',fontWeight:600,color:'#7c3aed',background:'none',border:'none',
                    cursor:'pointer',padding:'2px 6px',borderRadius:4,
                    textDecoration:selectedStages.length===PIPELINE_STAGE_IDS.length?'none':'underline',
                  }}>All</button>
                  <button onClick={()=>setSelectedStages([])} style={{
                    fontSize:'10px',fontWeight:600,color:'var(--muted)',background:'none',border:'none',
                    cursor:'pointer',padding:'2px 6px',borderRadius:4,
                    textDecoration:selectedStages.length===0?'none':'underline',
                  }}>None</button>
                </div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:5}}>
                {PIPELINE_STAGE_IDS.map(id => {
                  const info = STAGE_INFO_FULL.find(s=>s.id===id)||{emoji:'◈',label:id};
                  const on   = selectedStages.includes(id);
                  return (
                    <div key={id} onClick={()=>toggleStage(id)} style={{
                      display:'flex',alignItems:'center',gap:5,
                      padding:'6px 9px',borderRadius:6,cursor:'pointer',
                      border: on ? '1.5px solid rgba(124,58,237,.5)' : '1.5px solid var(--border)',
                      background: on ? 'rgba(124,58,237,.08)' : 'var(--bg2)',
                      transition:'all .12s',
                    }}>
                      <span style={{
                        width:14,height:14,borderRadius:3,flexShrink:0,
                        background: on ? '#7c3aed' : 'transparent',
                        border: on ? '1.5px solid #7c3aed' : '1.5px solid #cbd5e1',
                        display:'flex',alignItems:'center',justifyContent:'center',
                        fontSize:'9px',color:'#fff',fontWeight:800,
                        transition:'all .12s',
                      }}>{on?'✓':''}</span>
                      <span style={{fontSize:'9.5px'}}>{info.emoji}</span>
                      <span style={{fontSize:'11px',fontWeight:600,color:on?'#7c3aed':'var(--text2)',lineHeight:1.2}}>
                        {info.label}
                      </span>
                    </div>
                  );
                })}
              </div>
              {selectedStages.length === 0 && (
                <div style={{marginTop:8,fontSize:'11px',color:'var(--err)',fontWeight:500}}>
                  ⚠ Select at least one stage to preview.
                </div>
              )}
              {selectedStages.length > 0 && selectedStages.length < PIPELINE_STAGE_IDS.length && (
                <div style={{marginTop:8,fontSize:'11px',color:'var(--muted)'}}>
                  {selectedStages.length} of {PIPELINE_STAGE_IDS.length} stages selected — others will be skipped.
                </div>
              )}
            </div>
          )}

          {launchErr && (
            <div style={{color:'var(--err)',fontSize:'12px',marginTop:12,display:'flex',alignItems:'center',gap:5}}>
              <span>⚠</span> {launchErr}
            </div>
          )}
        </div>
      </div>

      {/* ── Feature grid ── */}
      <div className="sf-card">
        <div className="sf-card-header">What Sevaforge generates for you</div>
        <div style={{padding:'16px 18px',display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {[
            {emoji:'🏗️', label:'Terraform + Docker',    sub:'VPC, EKS/GKE/AKS, multi-stage Dockerfile'},
            {emoji:'🚀', label:'ArgoCD + Kustomize',    sub:'dev / staging / prod overlays, auto-rollback'},
            {emoji:'⚙️', label:'GitHub Actions CI/CD',  sub:'Security → Tests → Build → Release pipeline'},
            {emoji:'📚', label:'Full Documentation',     sub:'Architecture diagram, threat model, API docs'},
            {emoji:'🧪', label:'Playwright E2E Tests',   sub:'Auth, navigation, form and API test specs'},
            {emoji:'🔒', label:'Security Scan Report',   sub:'SAST, CVE check, secrets detection, SARIF'},
            {emoji:'🌉', label:'GitHub Repository Push', sub:'All files committed, PR opened for review'},
            {emoji:'📊', label:'Prometheus + Grafana',   sub:'Dashboards, alerts, SLOs, runbook links'},
          ].map(({emoji,label,sub})=>(
            <div key={label} className="feature-item">
              <span className="feature-icon">{emoji}</span>
              <div>
                <div className="feature-label">{label}</div>
                <div className="feature-sub">{sub}</div>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Connection indicator */}
      <div style={{marginTop:4,display:'flex',alignItems:'center',gap:7,justifyContent:'center'}}>
        <span style={{
          width:7,height:7,borderRadius:'50%',
          background:connected?'var(--ok)':'#94a3b8',
          boxShadow:connected?'0 0 6px var(--ok)':'none',display:'inline-block',
        }}/>
        <span style={{fontSize:'11.5px',color:'var(--muted)'}}>
          {connected ? 'Dashboard server connected — ready to run' : 'Connecting to dashboard server…'}
        </span>
      </div>

      </div>
    </div>
  );
}

// ── Live console (right-hand vertical log panel) ──────────────────────────────
function LiveConsole({ logs, currentStage }) {
  const scrollRef = useRef(null);

  // Auto-scroll to newest entry
  useEffect(()=>{
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [logs.length]);

  const stageLabel = id => (STAGE_INFO_FULL.find(s=>s.id===id)||{}).label || id;
  const stageEmoji = id => (STAGE_INFO_FULL.find(s=>s.id===id)||{}).emoji || '▸';

  const levelColor = lvl => {
    if (lvl==='ERROR')                    return '#f87171';
    if (lvl==='WARNING'||lvl==='WARN')    return '#fb923c';
    return 'rgba(200,210,230,.72)';
  };

  // Build a flat list, inserting a stage-header row whenever the stage changes
  const rows = [];
  let lastStage = null;
  logs.forEach((entry, i) => {
    if (entry.stage && entry.stage !== lastStage) {
      rows.push({ _header: true, stage: entry.stage, key: `h${i}` });
      lastStage = entry.stage;
    }
    rows.push({ ...entry, key: `l${i}` });
  });

  const activeMeta = STAGE_INFO_FULL.find(s=>s.id===currentStage);

  return (
    <div style={{
      display:'flex',flexDirection:'column',
      background:'#0d1117',border:'1px solid rgba(255,255,255,.09)',
      borderRadius:10,overflow:'hidden',
      position:'sticky',top:0,
      height:'calc(100vh - 108px)',minHeight:480,
    }}>
      {/* ── Header: title + live stage pill ── */}
      <div style={{
        padding:'10px 13px 9px',borderBottom:'1px solid rgba(255,255,255,.07)',
        flexShrink:0,background:'rgba(255,255,255,.025)',
      }}>
        <div style={{display:'flex',alignItems:'center',gap:7,marginBottom: currentStage?7:0}}>
          <span style={{
            width:7,height:7,borderRadius:'50%',flexShrink:0,display:'inline-block',
            background: currentStage ? '#22c55e' : '#374151',
            boxShadow:  currentStage ? '0 0 8px #22c55e' : 'none',
            transition:'all .3s',
          }}/>
          <span style={{fontSize:'10.5px',fontWeight:700,color:'rgba(255,255,255,.5)',letterSpacing:'0.1em',flex:1}}>
            LIVE OUTPUT
          </span>
          <span style={{fontSize:'9px',color:'rgba(255,255,255,.2)',fontFamily:'monospace'}}>
            {logs.length} lines
          </span>
        </div>
        {/* Active stage badge */}
        {currentStage && activeMeta && (
          <div style={{
            display:'flex',alignItems:'center',gap:6,
            padding:'5px 9px',borderRadius:6,
            background:'rgba(34,197,94,.1)',border:'1px solid rgba(34,197,94,.25)',
          }}>
            <span style={{fontSize:'13px',lineHeight:1}}>{activeMeta.emoji}</span>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:'11px',fontWeight:700,color:'#4ade80',letterSpacing:'-0.1px'}}>
                {activeMeta.label}
              </div>
              <div style={{fontSize:'9.5px',color:'rgba(255,255,255,.35)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                {activeMeta.consumer}
              </div>
            </div>
            <span style={{
              width:6,height:6,borderRadius:'50%',background:'#22c55e',flexShrink:0,
              animation:'pulse 1.4s ease-in-out infinite',display:'inline-block',
            }}/>
          </div>
        )}
      </div>

      {/* ── Scrollable log body ── */}
      <div ref={scrollRef} style={{flex:1,overflowY:'auto',padding:'4px 0',fontFamily:'monospace',fontSize:'10.5px',lineHeight:1.6}}>
        {logs.length===0 && (
          <div style={{padding:'32px 14px',color:'rgba(255,255,255,.15)',textAlign:'center',fontSize:'11.5px'}}>
            Agent output will appear here…
          </div>
        )}
        {rows.map(row => row._header
          ? (
            <div key={row.key} style={{
              padding:'8px 12px 4px',margin:'6px 0 2px',
              borderTop:'1px solid rgba(255,255,255,.05)',
              display:'flex',alignItems:'center',gap:6,
            }}>
              <span style={{fontSize:'11px'}}>{stageEmoji(row.stage)}</span>
              <span style={{fontSize:'9px',fontWeight:800,color:'rgba(99,102,241,.8)',
                textTransform:'uppercase',letterSpacing:'0.12em'}}>
                {stageLabel(row.stage)}
              </span>
              <div style={{flex:1,height:'1px',background:'rgba(255,255,255,.04)',marginLeft:4}}/>
            </div>
          ) : (
            <div key={row.key} style={{
              padding:'1px 13px',display:'flex',gap:8,alignItems:'baseline',
            }}>
              <span style={{color:'rgba(255,255,255,.16)',flexShrink:0,fontSize:'8.5px',minWidth:44,paddingTop:1}}>{row.t}</span>
              <span style={{color:levelColor(row.level),wordBreak:'break-word',whiteSpace:'pre-wrap',flex:1,fontSize:'10.5px'}}>
                {row.msg}
              </span>
            </div>
          )
        )}
      </div>
    </div>
  );
}

// ── Running / pipeline live view ──────────────────────────────────────────────
function RunningView({ liveState, logs, onReset }) {
  const { pipelinePath, stages, stageState, stageInfo, stageResults,
          currentStage, currentNum, totalStages, done, elapsed, dryRun } = liveState;

  const stageEmoji = id => (STAGE_INFO_FULL.find(s=>s.id===id)||{}).emoji || '▸';
  const stageLabel = id => (STAGE_INFO_FULL.find(s=>s.id===id)||{}).label || id;

  const allFinished = done && !currentStage;
  const hasFailed   = Object.values(stageState).some(s=>s==='error');
  // For progress counting: preview and success both count as "passed"
  const passedCount = Object.values(stageState).filter(s=>s==='success'||s==='preview').length;
  const skippedCount= Object.values(stageState).filter(s=>s==='skipped').length;
  const pct         = totalStages ? Math.round(passedCount / totalStages * 100) : 0;

  const nodeClass = id => {
    if (id===currentStage) return 'pipeline-node running runner-glow';
    const s = stageState[id];
    if (s==='success' || s==='preview') return 'pipeline-node done';
    if (s==='error')                    return 'pipeline-node error';
    if (s==='skipped')                  return 'pipeline-node pending';
    return 'pipeline-node pending';
  };

  const nodeStatus = id => {
    if (id===currentStage) return { cls:'pill pill-running', text: dryRun ? '🔬 Simulating' : 'Running' };
    const s = stageState[id];
    if (s==='preview') return { cls:'pill pill-preview', text:'Preview' };
    if (s==='success') return { cls:'pill pill-done',    text:'Done' };
    if (s==='error')   return { cls:'pill pill-error',   text:'Error' };
    if (s==='skipped') return { cls:'pill pill-skipped', text:'Skipped' };
    return { cls:'pill pill-pending', text:'Queued' };
  };

  return (
    <div className="fade-in" style={{display:'grid',gridTemplateColumns:'1fr 320px',gap:16,alignItems:'start'}}>

      {/* ── Left column: main pipeline content ── */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>

      {/* ── DRY RUN banner (shown above status bar when in dry run mode) ── */}
      {dryRun && (
        <div style={{
          display:'flex',alignItems:'center',gap:10,
          padding:'10px 16px',borderRadius:8,
          background:'rgba(124,58,237,.08)',border:'1px solid rgba(124,58,237,.25)',
        }}>
          <span style={{fontSize:'18px'}}>🔬</span>
          <div style={{flex:1}}>
            <div style={{fontSize:'12.5px',fontWeight:700,color:'#7c3aed'}}>
              DRY RUN — Preview Mode
            </div>
            <div style={{fontSize:'11px',color:'var(--muted)'}}>
              Agents are simulating work — no files will be written to disk. Results show what each stage <em>would</em> produce.
            </div>
          </div>
          {skippedCount > 0 && (
            <span className="pill pill-skipped">
              {skippedCount} skipped
            </span>
          )}
        </div>
      )}

      {/* ── Status bar ── */}
      <div className="sf-card" style={{padding:'16px 20px',display:'flex',alignItems:'center',gap:16}}>
        <SevaForgeLogo size={40} spinning={!!currentStage && !allFinished} />
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,fontSize:'15px',color:'var(--text)',marginBottom:3,letterSpacing:'-0.2px'}}>
            {allFinished
              ? (hasFailed
                  ? '⚠ Pipeline completed with errors'
                  : dryRun ? '🔬 Dry run complete — preview finished!' : '🎉 All stages complete!')
              : currentStage
                ? <>{dryRun?'🔬 Simulating':'Running'} <span style={{color: dryRun?'#7c3aed':'var(--blue)'}}>{stageLabel(currentStage)}</span> — stage {currentNum} of {totalStages}</>
                : 'Pipeline starting…'}
          </div>
          <div style={{fontFamily:'monospace',fontSize:'11px',color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
            {pipelinePath || '—'}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0,alignItems:'center'}}>
          {dryRun && <span className="pill pill-preview">🔬 Dry Run</span>}
          {totalStages>0 && (
            <span className={`pill ${allFinished?(hasFailed?'pill-error': dryRun?'pill-preview':'pill-done'):'pill-running'}`}>
              {allFinished?(hasFailed?'✗ Failed': dryRun?'◈ Previewed':'✓ Done'):`${Math.min(currentNum,totalStages)} / ${totalStages} stages`}
            </span>
          )}
          {elapsed>0 && <span className="pill pill-pending">{elapsed}s</span>}
        </div>
      </div>

      {/* ── Progress ── */}
      {totalStages>0 && (
        <div>
          <div className="sf-progress-track">
            <div className="sf-progress-fill" style={{width:`${pct}%`}} />
          </div>
          <div style={{display:'flex',justifyContent:'space-between',marginTop:5,fontSize:'11px',color:'var(--muted)'}}>
            <span>{pct}% complete</span>
            <span>{passedCount} of {totalStages} stages passed</span>
          </div>
        </div>
      )}

      {/* ── Pipeline node graph ── */}
      {stages.length>0 && (
        <div>
          <div style={{fontSize:'10.5px',fontWeight:700,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.07em'}}>
            Pipeline Flow
          </div>
          <div className="pipeline-canvas">
            <div style={{display:'flex',alignItems:'center',gap:0,minWidth:'max-content'}}>
              {stages.map((id,i)=>{
                const ns = nodeStatus(id);
                return (
                  <React.Fragment key={id}>
                    <div className={nodeClass(id)}>
                      <span className="node-num">{i+1}</span>
                      <div style={{fontSize:'1.2rem',marginBottom:5,lineHeight:1}}>{stageEmoji(id)}</div>
                      <div style={{fontSize:'10.5px',fontWeight:700,color:'var(--text2)',marginBottom:6,
                                   whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                        {stageLabel(id)}
                      </div>
                      <span className={ns.cls} style={{fontSize:'9.5px',padding:'2px 7px'}}>
                        {id===currentStage && (
                          <span className="pulse" style={{display:'inline-block',width:5,height:5,borderRadius:'50%',
                                                          background:'currentColor',marginRight:4,verticalAlign:'middle'}} />
                        )}
                        {ns.text}
                      </span>
                    </div>
                    {i<stages.length-1 && (
                      <div className="pipeline-arrow">
                        <svg width="20" height="10" viewBox="0 0 20 10">
                          <line x1="0" y1="5" x2="13" y2="5"
                                stroke={stageState[id]==='success'?'var(--ok)':'#cbd5e1'} strokeWidth="1.5"/>
                          <polyline points="10,2 17,5 10,8"
                                    stroke={stageState[id]==='success'?'var(--ok)':'#cbd5e1'}
                                    strokeWidth="1.5" fill="none"/>
                        </svg>
                      </div>
                    )}
                  </React.Fragment>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── Agent at Work Banner ── */}
      {!allFinished && stages.length > 0 && (
        <AgentAtWorkBanner
          currentStage={currentStage}
          currentNum={currentNum}
          totalStages={totalStages}
        />
      )}

      {/* ── Stage results grid ── */}
      {Object.entries(stageResults).length>0 && (
        <div>
          <div style={{fontSize:'10.5px',fontWeight:700,color:'var(--muted)',marginBottom:8,textTransform:'uppercase',letterSpacing:'0.07em'}}>
            Completed Stages
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:7}}>
            {Object.entries(stageResults).map(([id,result])=>{
              const st      = result.status;
              const ok      = st==='success';
              const preview = st==='preview';
              const skipped = st==='skipped';
              const meta = STAGE_INFO_FULL.find(s=>s.id===id)||{};
              const rowCls = ok||preview ? 'ok' : skipped ? '' : 'fail';
              const rowBg  = preview ? 'rgba(124,58,237,.07)' : skipped ? 'var(--bg2)' : undefined;
              const rowBdr = preview ? '1px solid rgba(124,58,237,.2)' : skipped ? '1px solid var(--border)' : undefined;
              const textColor = ok ? '#065f46' : preview ? '#6d28d9' : skipped ? 'var(--muted)' : '#991b1b';
              const subColor  = ok ? '#047857' : preview ? '#7c3aed' : skipped ? 'var(--light)' : '#b91c1c';
              const iconColor = ok ? 'var(--ok)' : preview ? '#7c3aed' : skipped ? 'var(--light)' : 'var(--err)';
              const icon      = ok ? '✓' : preview ? '◈' : skipped ? '⊘' : '✗';
              return (
                <div key={id} className={`stage-result-row ${rowCls}`}
                     style={rowBg?{background:rowBg,border:rowBdr}:{}}>
                  <span style={{fontSize:'1.05rem',flexShrink:0}}>{meta.emoji||'▸'}</span>
                  <div style={{minWidth:0,flex:1}}>
                    <div style={{fontSize:'12px',fontWeight:700,color:textColor}}>
                      {meta.label||id}
                    </div>
                    {result.summary && (
                      <div style={{fontSize:'10.5px',color:subColor,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                        {result.summary.slice(0,72)}
                      </div>
                    )}
                  </div>
                  <span style={{fontSize:'13px',fontWeight:700,color:iconColor,flexShrink:0}}>
                    {icon}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {/* ── Victory screen ── */}

            ['AI Agents','13 production-ready'],['Core Stages','11 (discover → bridge)'],
            ['CI Generator','GitHub Actions + GitLab CI'],['Cloud Support','AWS · GCP · Azure'],
            ['CD Engine','ArgoCD + Kustomize'],['E2E Framework','Playwright'],
            ['Cost','🆓 NoCaaS — zero charge'],['Brand','Sevaforge / AIDDaaS'],
          ].map(([k,v])=>(
            <div key={k} style={{display:'flex',justifyContent:'space-between',alignItems:'center',
                                   padding:'8px 11px',borderRadius:7,background:'var(--bg2)',border:'1px solid var(--border)'}}>
              <span style={{fontSize:'11.5px',color:'var(--muted)'}}>{k}</span>
              <span style={{fontSize:'11.5px',fontWeight:600,color:'var(--text)'}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
      <div className="sf-card">
        <div className="sf-card-header">CLI Reference</div>
        <div style={{padding:'16px 18px',display:'flex',flexDirection:'column',gap:8}}>
          {[
            ['Open dashboard (no pipeline)', 'forgeflow dashboard'],
            ['Run full pipeline with GUI',   'forgeflow run-all --gui ~/repo'],
            ['Run full pipeline (terminal)', 'forgeflow run-all ~/repo'],
            ['Security scan only',          'forgeflow scan --severity high ~/repo'],
            ['Push to GitHub only',         'forgeflow bridge --path ~/repo'],
          ].map(([desc,cmd])=>(
            <div key={cmd} style={{padding:'10px 14px',borderRadius:8,background:'var(--bg2)',border:'1px solid var(--border)'}}>
              <div style={{fontSize:'10.5px',color:'var(--muted)',marginBottom:4,fontWeight:500}}>{desc}</div>
              <code style={{fontSize:'12px',color:'var(--blue)',fontWeight:600}}>{cmd}</code>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ── App shell ─────────────────────────────────────────────────────────────────
function App() {
  const [view,    setView]    = useState('live');
  const [history, setHistory] = useState([]);
  const [toasts,  setToasts]  = useState([]);

  // Load history from server on mount (works in local + cloud portal modes).
  // Falls back to localStorage if the API is unreachable (standalone file usage).
  useEffect(()=>{
    fetch('/api/history')
      .then(r=>r.ok?r.json():null)
      .then(d=>{ if(d?.history) setHistory(d.history); })
      .catch(()=>{
        try { const s=localStorage.getItem('sf_run_history'); if(s) setHistory(JSON.parse(s)); } catch {}
      });
  },[]);
  const [logs,    setLogs]    = useState([]);
  const currentStageRef = useRef(null);   // tracks active stage for log tagging
  const [liveState, setLiveState] = useState({
    connected:false, pipelinePath:'', stages:[], stageState:{},
    stageInfo:{}, stageResults:{}, currentStage:null, currentNum:0,
    totalStages:0, done:false, elapsed:0, dryRun:false,
  });

  const addToast = useCallback((msg,type='info')=>{
    const id=Date.now();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4500);
  },[]);

  // SSE connection
  useEffect(()=>{
    const es=new EventSource('/events');
    es.onmessage=(e)=>{
      let msg; try{msg=JSON.parse(e.data);}catch{return;}
      const {type}=msg;
      if (type==='connected') {
        setLiveState(s=>({...s,connected:true}));
      } else if (type==='pipeline_start') {
        const init={}; (msg.stages||[]).forEach(id=>{init[id]='pending';});
        currentStageRef.current = null;
        setLiveState({connected:true,pipelinePath:msg.path||'',stages:msg.stages||[],
          stageState:init,stageInfo:{},stageResults:{},currentStage:null,
          currentNum:0,totalStages:msg.total||0,done:false,elapsed:0,dryRun:!!msg.dry_run});
        setLogs([]);
        setView('live');
      } else if (type==='stage_start') {
        currentStageRef.current = msg.stage;
        setLiveState(s=>({...s,currentStage:msg.stage,currentNum:msg.num||s.currentNum,
          stageState:{...s.stageState,[msg.stage]:'running'},
          stageInfo:{...s.stageInfo,[msg.stage]:msg.info||{}}}));
      } else if (type==='stage_result') {
        const rs=(msg.result||{}).status;
        // Map backend status → UI state key
        const uiState = rs==='preview'  ? 'preview'
                      : rs==='skipped'  ? 'skipped'
                      : rs==='success'||rs==='warning' ? 'success'
                      : 'error';
        setLiveState(s=>({...s,
          currentStage:s.currentStage===msg.stage?null:s.currentStage,
          stageState:{...s.stageState,[msg.stage]:uiState},
          stageResults:{...s.stageResults,[msg.stage]:msg.result||{}}}));
      } else if (type==='pipeline_done') {
        setLiveState(s=>{
          // Prepend to local state immediately for instant UI update.
          // The server already persisted this to ~/.sevaforge/run_history.json.
          const failedStage=Object.entries(s.stageState).find(([,v])=>v==='error')?.[0]||null;
          const entry={path:msg.path||s.pipelinePath||'—',status:msg.success?'success':'error',
            stageCount:s.stages.length||msg.stage_count||0,elapsed:msg.elapsed_s||0,failedStage,ts:Date.now()};
          setHistory(prev=>[entry,...prev.slice(0,199)]);
          return{...s,done:true,currentStage:null,elapsed:msg.elapsed_s||0};
        });
        addToast(msg.success?`✓ Pipeline complete in ${msg.elapsed_s}s`:'✗ Pipeline failed',
                 msg.success?'success':'error');
      } else if (type==='log') {
        setLogs(prev=>[...prev.slice(-499), {
          msg:   msg.msg || msg.message || '',
          level: msg.level || 'INFO',
          name:  msg.name || '',
          stage: msg.stage || currentStageRef.current || '',
          t: new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}),
        }]);
      }
    };
    es.onerror=()=>setLiveState(s=>({...s,connected:false}));
    return ()=>es.close();
  },[]);

  // Reset back to idle screen (clears pipeline state, keeps connection + history)
  const handleReset = useCallback(()=>{
    // Clear server-side pipeline state so SSE replays don't re-trigger RunningView
    fetch('/api/reset', {method:'POST'}).catch(()=>{});
    setLiveState(s=>({
      connected: s.connected, pipelinePath:'', stages:[], stageState:{},
      stageInfo:{}, stageResults:{}, currentStage:null, currentNum:0,
      totalStages:0, done:false, elapsed:0, dryRun:false,
    }));
    setLogs([]);
  },[]);

  const { connected, stages, done } = liveState;
  const pipelineActive = stages.length>0 || done;
  const showIdle = !pipelineActive;

  const breadcrumbs = {
    live:'Run Pipeline', dashboard:'Dashboard', pipeline:'Pipeline Stages',
    history:'History', health:'System Health', settings:'Settings',
  };

  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>

      {/* ── Sidebar ── */}
      <aside className="sf-sidebar">

        {/* Logo */}
        <div className="sf-logo-block">
          <div className="sf-logo-row">
            <SevaForgeLogo size={36} />
            <div className="sf-logo-text">
              <div className="sf-logo-name">Sevaforge</div>
              <div className="sf-logo-sub">AIDDaaS</div>
            </div>
          </div>
          <div className="sf-logo-divider" />
          <div className="sf-logo-tagline">
            AI Dev to Delivery as a Service
          </div>
        </div>

        {/* Nav */}
        <nav className="sf-nav">
          <div className="sf-nav-group-label">Pipeline</div>
          {VIEWS.slice(0,1).map(v=>(
            <button key={v.id} className={`sf-nav-item ${view===v.id?'active':''}`} onClick={()=>setView(v.id)}>
              <span className="sf-nav-icon">{v.icon}</span>
              {v.label}
              {pipelineActive && (
                <span className="sf-nav-badge" style={{
                  background:done?'var(--ok)':'var(--blue)',
                  boxShadow:done?'0 0 5px var(--ok)':'0 0 5px var(--blue)',
                  animation:done?'none':'pulse 1.6s ease-in-out infinite',
                }}/>
              )}
            </button>
          ))}

          <div className="sf-nav-group-label" style={{marginTop:6}}>Overview</div>
          {VIEWS.slice(1).map(v=>(
            <button key={v.id} className={`sf-nav-item ${view===v.id?'active':''}`} onClick={()=>setView(v.id)}>
              <span className="sf-nav-icon">{v.icon}</span>
              {v.label}
            </button>
          ))}
        </nav>

        {/* Status bar */}
        <div className="sf-status-bar">
          <span className="sf-status-dot" style={{
            background:connected?'var(--ok)':'#475569',
            boxShadow:connected?'0 0 5px var(--ok)':'none',
          }}/>
          <span style={{fontSize:'11px',color:'rgba(255,255,255,.38)',flex:1}}>
            {connected?'Connected':'Connecting…'}
          </span>
          {done && (
            <span style={{fontSize:'9.5px',color:'rgba(255,255,255,.28)',fontWeight:700,
                           textTransform:'uppercase',letterSpacing:'0.06em'}}>
              Done
            </span>
          )}
        </div>
        <div style={{padding:'10px 16px',fontSize:'10px',color:'rgba(255,255,255,.18)',fontWeight:500}}>
          ForgeFlow v2.1.0 · NoCaaS Mode
        </div>
      </aside>

      {/* ── Main ── */}
      <div className="sf-main">

        {/* Topbar */}
        <div className="sf-topbar">
          <div className="sf-breadcrumb">
            <span style={{opacity:.6}}>Sevaforge</span>
            <span style={{color:'var(--border)',fontSize:'16px',fontWeight:300}}>›</span>
            <span className="current">{breadcrumbs[view]||view}</span>
          </div>
          <div className="sf-topbar-right">
            {pipelineActive && view!=='live' && (
              <button className="btn-secondary" onClick={()=>setView('live')}
                      style={{fontSize:'12px',padding:'6px 13px'}}>
                {done?'← View Results':'↗ View Live Run'}
              </button>
            )}
            <span className="sf-version-chip">v2.1.0</span>
          </div>
        </div>

        {/* Content */}
        <div className="sf-content">
          {view==='live' && (
            showIdle
              ? <IdleScreen connected={connected} onLaunch={()=>setView('live')} />
              : <RunningView liveState={liveState} logs={logs} onReset={handleReset} />
          )}
          {view==='dashboard' && <DashboardView history={history} connected={connected} onNavigate={setView} />}
          {view==='pipeline'  && <StagesView />}
          {view==='history'   && <HistoryView history={history} onClear={()=>{
            fetch('/api/history/clear',{method:'POST'}).catch(()=>{});
            setHistory([]);
          }} />}
          {view==='health'    && <HealthView connected={connected} liveState={liveState} />}
          {view==='settings'  && <SettingsView />}
        </div>
      </div>

      {/* Toast notifications */}
      <div style={{position:'fixed',bottom:24,right:24,display:'flex',flexDirection:'column',gap:8,zIndex:9999}}>
        {toasts.map(t=>(
          <div key={t.id} style={{
            padding:'11px 18px',borderRadius:9,fontSize:'13px',fontWeight:500,minWidth:220,
            background:t.type==='success'?'var(--ok)':t.type==='error'?'var(--err)':'var(--navy)',
            color:'#fff',
            boxShadow:'0 4px 16px rgba(0,0,0,.18), 0 1px 4px rgba(0,0,0,.12)',
            animation:'fadeIn .25s ease both',
          }}>{t.msg}</div>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
