<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sevaforge — No Charge as a Service Hub</title>

  <!-- Tailwind + DaisyUI -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    /* ── Sevaforge Design System ───────────────────────────────────────────── */
    :root {
      --sidebar-w: 260px;
      --forge-amber: #f59e0b;
      --forge-purple: #7c3aed;
      --forge-glow: rgba(245,158,11,0.35);
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      /* Forge-branded deep background with subtle grid */
      background-color: #0d0d14;
      background-image:
        radial-gradient(ellipse 60% 40% at 15% 10%, rgba(124,58,237,0.10) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 85% 85%, rgba(245,158,11,0.07) 0%, transparent 55%),
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
      background-attachment: fixed;
    }

    /* ── Layout ─────────────────────────────────────────────────────────── */
    .sidebar { width: var(--sidebar-w); min-width: var(--sidebar-w); }
    .main-content { width: calc(100vw - var(--sidebar-w)); }
    .stage-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
    .stage-card { transition: all .18s ease; }
    .stage-card:hover { transform: translateY(-2px); }

    /* ── Brand logo ─────────────────────────────────────────────────────── */
    .seva-logo-hex polygon { stroke: url(#logoGrad); }
    .seva-logo-hex path    { fill:   url(#logoGrad); }
    .brand-gradient {
      background: linear-gradient(135deg, var(--forge-amber) 0%, var(--forge-purple) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .seva-wordmark {
      font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;
      background: linear-gradient(100deg, #f59e0b 0%, #c084fc 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* ── NoCaaS badge ───────────────────────────────────────────────────── */
    .nocaas-badge {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 10px; border-radius: 999px;
      background: linear-gradient(135deg, rgba(245,158,11,.12), rgba(124,58,237,.12));
      border: 1px solid rgba(245,158,11,.25);
      font-size: 0.65rem; font-weight: 600; letter-spacing: 0.04em;
      color: #fbbf24;
      backdrop-filter: blur(4px);
    }
    .nocaas-badge .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: #f59e0b;
      box-shadow: 0 0 6px #f59e0b;
      animation: pulse 1.4s ease-in-out infinite;
    }

    /* ── Animations ─────────────────────────────────────────────────────── */
    .spin { animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .slide-in { animation: slideIn .25s ease; }
    @keyframes slideIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:none; } }
    .finding-row:not(:last-child) { border-bottom: 1px solid oklch(var(--b3)); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.45} }
    .step-running > .step-content { animation: pulse 1.2s ease-in-out infinite; }

    /* Forge fire flicker on the logo while pipeline runs */
    @keyframes forgeFlicker {
      0%,100% { filter: drop-shadow(0 0 5px rgba(245,158,11,.7)); }
      33%     { filter: drop-shadow(0 0 12px rgba(245,158,11,.9)) drop-shadow(0 0 24px rgba(245,158,11,.3)); }
      66%     { filter: drop-shadow(0 0 8px rgba(245,158,11,.5)); }
    }
    .forge-fire { animation: forgeFlicker 1.8s ease-in-out infinite; }

    /* Sand settle — fills stage card from bottom when stage completes */
    .sand-fill-success { position:relative; overflow:hidden; }
    .sand-fill-success::after {
      content:''; position:absolute; inset:0;
      background: linear-gradient(to top, rgba(34,197,94,.18) 0%, rgba(34,197,94,.04) 100%);
      animation: sandRise .8s cubic-bezier(.22,1,.36,1) forwards;
    }
    .sand-fill-error::after {
      content:''; position:absolute; inset:0;
      background: linear-gradient(to top, rgba(239,68,68,.2) 0%, rgba(239,68,68,.05) 100%);
      animation: sandRise .8s cubic-bezier(.22,1,.36,1) forwards;
    }
    @keyframes sandRise {
      from { clip-path: inset(100% 0 0 0); }
      to   { clip-path: inset(0% 0 0 0); }
    }

    /* Stage card ring-burst on completion */
    @keyframes burstFlash {
      0%  { box-shadow: 0 0 0 0 rgba(34,197,94,.8); }
      70% { box-shadow: 0 0 0 16px rgba(34,197,94,0); }
      100%{ box-shadow: 0 0 0 0 rgba(34,197,94,0); }
    }
    .burst-success { animation: burstFlash .55s ease-out; }
    @keyframes burstFlashErr {
      0%  { box-shadow: 0 0 0 0 rgba(239,68,68,.8); }
      70% { box-shadow: 0 0 0 16px rgba(239,68,68,0); }
      100%{ box-shadow: 0 0 0 0 rgba(239,68,68,0); }
    }
    .burst-error { animation: burstFlashErr .55s ease-out; }

    /* Pendulum canvas container glow */
    .pendulum-wrap { border-radius: 12px; overflow: hidden; position: relative; }
    .pendulum-wrap::before {
      content:''; position:absolute; inset:-1px; border-radius:13px;
      background: linear-gradient(135deg, rgba(245,158,11,.4), rgba(124,58,237,.4));
      z-index:0;
    }
    .pendulum-wrap canvas { position:relative; z-index:1; border-radius:11px; display:block; }

    /* Stat colors */
    .stat-primary .stat-value { color: oklch(var(--p)); }
    .stat-success .stat-value { color: oklch(var(--su)); }
    .stat-warning .stat-value { color: oklch(var(--wa)); }
    .stat-error   .stat-value { color: oklch(var(--er)); }

    /* Live view hero */
    .live-hero {
      background: linear-gradient(135deg, rgba(124,58,237,.12) 0%, rgba(245,158,11,.08) 100%);
      border: 1px solid rgba(245,158,11,.15);
      border-radius: 16px;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body class="bg-base-300 min-h-screen">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

// ── Data ──────────────────────────────────────────────────────────────────────

const STAGES = [
  { id:'discover',  label:'Discover',  emoji:'🔍', endpoint:'/api/v1/discover',  desc:'Scan structure',      color:'primary',   tag:null },
  { id:'normalize', label:'Normalize', emoji:'🔧', endpoint:'/api/v1/normalize', desc:'Standardize repo',    color:'primary',   tag:null },
  { id:'docs',      label:'Docs',      emoji:'📚', endpoint:'/api/v1/docs',      desc:'Documentation',       color:'secondary', tag:null },
  { id:'iac',       label:'IAC',       emoji:'🏗️',  endpoint:'/api/v1/iac',       desc:'Infra as Code',       color:'accent',    tag:'v2.1' },
  { id:'cd',        label:'CD',        emoji:'🚀', endpoint:'/api/v1/cd',        desc:'Deployment config',   color:'accent',    tag:'v2.1' },
  { id:'ci',        label:'CI',        emoji:'⚙️',  endpoint:'/api/v1/ci',        desc:'CI pipelines',        color:'accent',    tag:'v2.1' },
  { id:'e2e',       label:'E2E',       emoji:'🧪', endpoint:'/api/v1/e2e',       desc:'E2E test setup',      color:'accent',    tag:'v2.1' },
  { id:'review',    label:'Review',    emoji:'👁️',  endpoint:'/api/v1/review',    desc:'Code quality',        color:'info',      tag:null },
  { id:'test',      label:'Test',      emoji:'✅', endpoint:'/api/v1/test',      desc:'Run test suite',      color:'info',      tag:null },
  { id:'scan',      label:'Scan',      emoji:'🔒', endpoint:'/api/v1/scan',      desc:'Security scan',       color:'warning',   tag:null },
  { id:'bridge',    label:'Bridge',    emoji:'🌉', endpoint:'/api/v1/bridge',    desc:'GitHub sync',         color:'secondary', tag:null },
  { id:'generate',  label:'Generate',  emoji:'📦', endpoint:'/api/v1/generate',  desc:'Artifacts',           color:'primary',   tag:null },
  { id:'deploy',    label:'Deploy',    emoji:'☁️',  endpoint:'/api/v1/deploy',    desc:'Deploy to cloud',     color:'error',     tag:'post-merge' },
  { id:'monitor',   label:'Monitor',   emoji:'📊', endpoint:'/api/v1/monitor',   desc:'Observability stack', color:'success',   tag:'post-merge' },
];

const VIEWS = [
  { id:'live',      label:'Live Run',   icon:'⚡' },
  { id:'dashboard', label:'Dashboard',  icon:'◈' },
  { id:'pipeline',  label:'Pipeline',   icon:'▶' },
  { id:'health',    label:'Health',     icon:'♥' },
  { id:'history',   label:'History',    icon:'◷' },
  { id:'settings',  label:'Settings',   icon:'⚙' },
];

// ── API Hook ──────────────────────────────────────────────────────────────────

function useApi({ apiUrl, apiKey }) {
  return useCallback(async (method, path, body) => {
    const headers = { 'Content-Type': 'application/json' };
    if (apiKey) headers['X-API-Key'] = apiKey;
    const res = await fetch(`${apiUrl}${path}`, {
      method, headers,
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!res.ok) {
      const txt = await res.text().catch(() => '');
      throw new Error(`HTTP ${res.status}${txt ? ': ' + txt.slice(0,120) : ''}`);
    }
    return res.json();
  }, [apiUrl, apiKey]);
}

// ── Small helpers ─────────────────────────────────────────────────────────────

const timeSince = (ts) => {
  if (!ts) return '—';
  const diff = Math.floor((Date.now() - new Date(ts)) / 1000);
  if (diff < 60) return `${diff}s ago`;
  if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
  return new Date(ts).toLocaleTimeString();
};

function StatusBadge({ status }) {
  const map = {
    success: 'badge-success',  running: 'badge-warning',
    error:   'badge-error',    warning: 'badge-warning',
    healthy: 'badge-success',  down:    'badge-error',
  };
  const labels = {
    success:'Success', running:'Running', error:'Error',
    warning:'Warning', healthy:'Healthy', down:'Offline',
  };
  return (
    <span className={`badge badge-sm font-semibold ${map[status] || 'badge-ghost'}`}>
      {labels[status] || status}
    </span>
  );
}

function Spinner({ size = 'sm' }) {
  return <span className={`loading loading-spinner loading-${size}`} />;
}

// ── Toast ─────────────────────────────────────────────────────────────────────

function ToastStack({ toasts }) {
  return (
    <div className="toast toast-end toast-bottom z-50">
      {toasts.map(t => (
        <div key={t.id} className={`alert shadow-lg slide-in ${t.type === 'error' ? 'alert-error' : t.type === 'success' ? 'alert-success' : 'alert-info'}`}>
          <span className="text-sm">{t.msg}</span>
        </div>
      ))}
    </div>
  );
}

// ── Dashboard ─────────────────────────────────────────────────────────────────

function DashboardView({ history, serverStatus, connected, onNavigate }) {
  const runs = history.length;
  const successes = history.filter(r => r.status === 'success').length;
  const rate = runs ? Math.round(successes / runs * 100) : null;
  const last = history[0];

  return (
    <div className="slide-in">
      {/* Hero header */}
      <div className="flex items-center gap-3 mb-8">
        <div className="w-12 h-12 rounded-2xl bg-primary/20 flex items-center justify-center text-2xl">⚡</div>
        <div>
          <h1 className="text-2xl font-bold brand-gradient">ForgeFlow</h1>
          <p className="text-base-content/50 text-sm">AI Platform Engineering CLI</p>
        </div>
        <div className="ml-auto flex gap-2 items-center">
          {connected === true && <span className="badge badge-success gap-1"><span className="w-2 h-2 rounded-full bg-current inline-block" />Connected</span>}
          {connected === false && <span className="badge badge-error gap-1"><span className="w-2 h-2 rounded-full bg-current inline-block" />Offline</span>}
          {serverStatus && <span className="badge badge-outline">{serverStatus.mode?.toUpperCase()}</span>}
        </div>
      </div>

      {/* Stats row */}
      <div className="stats stats-horizontal shadow w-full mb-6 bg-base-200">
        <div className="stat stat-primary">
          <div className="stat-figure text-primary text-3xl">▶</div>
          <div className="stat-title">Total Runs</div>
          <div className="stat-value">{runs}</div>
          <div className="stat-desc">pipeline executions</div>
        </div>
        <div className={`stat ${rate === null ? '' : rate >= 80 ? 'stat-success' : 'stat-warning'}`}>
          <div className="stat-figure text-2xl">{rate === null ? '—' : rate >= 80 ? '✓' : '⚠'}</div>
          <div className="stat-title">Success Rate</div>
          <div className="stat-value">{rate === null ? '—' : `${rate}%`}</div>
          <div className="stat-desc">{successes} of {runs} succeeded</div>
        </div>
        <div className={`stat ${last ? (last.status === 'success' ? 'stat-success' : 'stat-error') : ''}`}>
          <div className="stat-figure text-2xl">{last ? (last.status === 'success' ? '✓' : '✗') : '—'}</div>
          <div className="stat-title">Last Run</div>
          <div className="stat-value text-lg">{last ? (last.status === 'success' ? 'Passed' : 'Failed') : 'None'}</div>
          <div className="stat-desc">{last ? timeSince(last.ts) : 'no runs yet'}</div>
        </div>
        <div className="stat">
          <div className="stat-figure text-2xl">🔬</div>
          <div className="stat-title">Stages Executed</div>
          <div className="stat-value">{history.reduce((a,r) => a + (r.stages||0), 0)}</div>
          <div className="stat-desc">across all runs</div>
        </div>
      </div>

      {/* Cards row */}
      <div className="grid grid-cols-2 gap-5 mb-6">
        {/* Quick actions */}
        <div className="card bg-base-200 shadow">
          <div className="card-body gap-3">
            <h2 className="card-title text-sm font-semibold uppercase tracking-widest text-base-content/50">Quick Actions</h2>
            <button className="btn btn-primary w-full justify-start gap-2" onClick={() => onNavigate('pipeline')}>
              <span>▶</span> Run Full Pipeline
            </button>
            <button className="btn btn-outline w-full justify-start gap-2" onClick={() => onNavigate('pipeline')}>
              <span>⚡</span> Run Selected Stages
            </button>
            <button className="btn btn-ghost w-full justify-start gap-2" onClick={() => onNavigate('health')}>
              <span>♥</span> Health Check
            </button>
          </div>
        </div>

        {/* Recent runs */}
        <div className="card bg-base-200 shadow">
          <div className="card-body">
            <h2 className="card-title text-sm font-semibold uppercase tracking-widest text-base-content/50">Recent Runs</h2>
            {history.length === 0
              ? <p className="text-base-content/40 text-sm mt-2">No runs yet. Start a pipeline!</p>
              : <div className="overflow-x-auto">
                  <table className="table table-xs">
                    <tbody>
                      {history.slice(0,6).map((r,i) => (
                        <tr key={i}>
                          <td>{r.status === 'success' ? '✅' : '❌'}</td>
                          <td className="font-mono text-xs max-w-[120px] truncate">{r.path?.split('/').pop() || 'repo'}</td>
                          <td className="text-base-content/50">{r.stages} stages</td>
                          <td><StatusBadge status={r.status} /></td>
                          <td className="text-base-content/40 text-xs">{timeSince(r.ts)}</td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
            }
          </div>
        </div>
      </div>

      {/* Server details */}
      {serverStatus && (
        <div className="card bg-base-200 shadow">
          <div className="card-body">
            <h2 className="card-title text-sm font-semibold uppercase tracking-widest text-base-content/50 mb-2">Server Details</h2>
            <div className="grid grid-cols-3 gap-4">
              {[
                ['Version',       serverStatus.version    || '—'],
                ['Mode',          serverStatus.mode?.toUpperCase() || '—'],
                ['Active Tasks',  serverStatus.active_tasks ?? '—'],
                ['Status',        serverStatus.status     || '—'],
                ['Uptime',        serverStatus.uptime_seconds ? `${Math.round(serverStatus.uptime_seconds/60)}m` : '—'],
                ['API Docs',      '/api/docs'],
              ].map(([k,v]) => (
                <div key={k}>
                  <div className="text-xs text-base-content/40 uppercase">{k}</div>
                  {k === 'API Docs'
                    ? <a href={v} target="_blank" className="link link-primary text-sm font-semibold">{v} ↗</a>
                    : <div className="text-sm font-semibold">{v}</div>}
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── Pipeline ──────────────────────────────────────────────────────────────────

function PipelineView({ call, onRunComplete }) {
  const [repoPath,   setRepoPath]   = useState('');
  const [selected,   setSelected]   = useState(new Set(STAGES.filter(s=>!s.tag).map(s=>s.id)));
  const [stageState, setStageState] = useState({});  // id -> 'running'|'success'|'error'
  const [results,    setResults]    = useState({});
  const [running,    setRunning]    = useState(false);
  const [expanded,   setExpanded]   = useState({});
  const [severity,   setSeverity]   = useState('medium');
  const [postMerge,  setPostMerge]  = useState(false);
  const cancelRef = useRef(false);

  const visible = STAGES.filter(s => postMerge || s.tag !== 'post-merge');
  const toggle  = id => setSelected(p => { const n=new Set(p); n.has(id)?n.delete(id):n.add(id); return n; });

  const done  = Object.values(stageState).filter(s => s === 'success' || s === 'error').length;
  const total = visible.filter(s => selected.has(s.id)).length;
  const pct   = total ? Math.round(done / total * 100) : 0;

  const runStages = async (stages) => {
    if (!repoPath.trim()) { alert('Please enter a repo path.'); return; }
    setRunning(true); cancelRef.current = false;
    setStageState({}); setResults({});
    let allOk = true; let count = 0;

    for (const stage of stages) {
      if (cancelRef.current) break;
      if (!selected.has(stage.id)) continue;
      count++;
      setStageState(p => ({ ...p, [stage.id]: 'running' }));
      try {
        const body = { path: repoPath };
        if (stage.id === 'scan') body.severity = severity;
        const r = await call('POST', stage.endpoint, body);
        setResults(p => ({ ...p, [stage.id]: r }));
        const ok = ['success','accepted'].includes(r.status);
        setStageState(p => ({ ...p, [stage.id]: ok ? 'success' : 'error' }));
        if (!ok) allOk = false;
      } catch (e) {
        setResults(p => ({ ...p, [stage.id]: { status:'error', summary: e.message, findings:[] } }));
        setStageState(p => ({ ...p, [stage.id]: 'error' }));
        allOk = false;
      }
    }
    setRunning(false);
    onRunComplete({ path: repoPath, status: allOk?'success':'error', stages: count, ts: new Date() });
  };

  const stageIcon = (s) => {
    const st = stageState[s.id];
    if (st === 'running') return <span className="spin inline-block">⟳</span>;
    if (st === 'success') return '✓';
    if (st === 'error')   return '✗';
    return null;
  };

  const stageClass = (s) => {
    const st  = stageState[s.id];
    const sel = selected.has(s.id);
    const base = 'stage-card card bg-base-200 border-2 cursor-pointer p-3 text-center relative select-none';
    if (st === 'running') return `${base} border-warning animate-pulse`;
    if (st === 'success') return `${base} border-success bg-success/10`;
    if (st === 'error')   return `${base} border-error bg-error/10`;
    if (sel)              return `${base} border-primary bg-primary/10`;
    return `${base} border-base-300 opacity-60`;
  };

  const colorMap = { primary:'badge-primary', secondary:'badge-secondary', accent:'badge-accent', success:'badge-success', warning:'badge-warning', error:'badge-error', info:'badge-info' };

  return (
    <div className="slide-in">
      <h2 className="text-xl font-bold mb-5 flex items-center gap-2">▶ Pipeline Runner</h2>

      {/* Repo input */}
      <div className="card bg-base-200 shadow mb-5">
        <div className="card-body py-4">
          <div className="flex gap-3 items-end">
            <div className="form-control flex-1">
              <label className="label py-0 mb-1"><span className="label-text text-xs font-semibold uppercase tracking-wider opacity-60">Repository Path or Git URL</span></label>
              <input
                className="input input-bordered input-sm font-mono w-full"
                placeholder="/path/to/repo   or   https://github.com/org/repo.git"
                value={repoPath} onChange={e => setRepoPath(e.target.value)}
                disabled={running}
              />
            </div>
            <div className="form-control">
              <label className="label py-0 mb-1"><span className="label-text text-xs uppercase tracking-wider opacity-60">Severity</span></label>
              <select className="select select-bordered select-sm" value={severity} onChange={e => setSeverity(e.target.value)}>
                <option value="low">Low+</option>
                <option value="medium">Medium+</option>
                <option value="high">High+</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      {/* Stage selector */}
      <div className="card bg-base-200 shadow mb-5">
        <div className="card-body">
          <div className="flex items-center justify-between mb-4">
            <h3 className="font-semibold">Select Stages <span className="badge badge-ghost ml-1">{selected.size} selected</span></h3>
            <div className="flex gap-2 items-center">
              <button className="btn btn-xs btn-ghost" onClick={() => setSelected(new Set(visible.map(s=>s.id)))}>All</button>
              <button className="btn btn-xs btn-ghost" onClick={() => setSelected(new Set())}>None</button>
              <label className="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" className="toggle toggle-xs toggle-primary" checked={postMerge} onChange={e => setPostMerge(e.target.checked)} />
                <span className="text-xs opacity-60">Post-merge</span>
              </label>
            </div>
          </div>

          <div className="stage-grid">
            {visible.map(stage => (
              <div key={stage.id} className={stageClass(stage)} onClick={() => !running && toggle(stage.id)}>
                {stage.tag && (
                  <span className={`badge badge-xs absolute top-1 left-1 ${colorMap[stage.color]}`}>{stage.tag}</span>
                )}
                <div className="text-xl mb-1">{stage.emoji}</div>
                <div className="text-xs font-bold">{stage.label}</div>
                <div className="text-xs opacity-50 mt-0.5 leading-tight">{stage.desc}</div>
                {stageIcon(stage) && (

// ── Health ────────────────────────────────────────────────────────────────────

function HealthView({ call }) {
  const [data,      setData]      = useState(null);
  const [loading,   setLoading]   = useState(false);
  const [lastCheck, setLastCheck] = useState(null);
  const [autoRefr,  setAutoRefr]  = useState(false);

  const run = useCallback(async () => {
    setLoading(true);
    try {
      const r = await call('GET', '/api/v1/doctor');
      setData(r); setLastCheck(new Date());
    } catch (e) {
      setData({ status:'error', summary: e.message, findings:[] });
    }
    setLoading(false);
  }, [call]);

  useEffect(() => { run(); }, []);
  useEffect(() => {
    if (!autoRefr) return;
    const t = setInterval(run, 30000);
    return () => clearInterval(t);
  }, [autoRefr, run]);

  const findings = data?.findings || [];
  const okCount  = findings.filter(f => (typeof f === 'string' ? f : '').startsWith('OK:')).length;
  const pct      = findings.length ? Math.round(okCount / findings.length * 100) : 0;

  return (
    <div className="slide-in">
      <div className="flex items-center justify-between mb-5">
        <h2 className="text-xl font-bold flex items-center gap-2">♥ Health Check</h2>
        <div className="flex items-center gap-3">
          {lastCheck && <span className="text-xs opacity-40">Checked {timeSince(lastCheck)}</span>}
          <label className="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" className="toggle toggle-xs toggle-primary" checked={autoRefr} onChange={e => setAutoRefr(e.target.checked)} />
            <span className="text-xs opacity-60">Auto-refresh</span>
          </label>
          <button className="btn btn-sm btn-outline gap-1" onClick={run} disabled={loading}>
            {loading ? <Spinner /> : '↻'} Refresh
          </button>
        </div>
      </div>

      {/* Summary card */}
      {data && (
        <div className="card bg-base-200 shadow mb-5">
          <div className="card-body flex-row items-center gap-6 py-4">
            <div className={`radial-progress text-lg font-bold ${pct === 100 ? 'text-success' : pct > 70 ? 'text-warning' : 'text-error'}`}
              style={{ '--value': pct, '--size': '80px', '--thickness': '6px' }} role="progressbar">
              {pct}%
            </div>
            <div className="flex-1">
              <div className="flex items-center gap-2 mb-1">
                <StatusBadge status={data.status === 'success' ? 'healthy' : 'down'} />
                <span className="font-semibold">{data.summary || 'Health check complete'}</span>
              </div>
              <div className="text-sm opacity-50">{okCount} of {findings.length} components passing</div>
              <progress className={`progress w-full mt-2 ${pct===100?'progress-success':pct>70?'progress-warning':'progress-error'}`} value={okCount} max={findings.length} />
            </div>
          </div>
        </div>
      )}

      {loading && !data && (
        <div className="hero py-16"><div className="hero-content flex-col gap-3"><Spinner size="lg" /><p className="opacity-40">Running health checks…</p></div></div>
      )}

      {findings.length > 0 && (
        <div className="grid grid-cols-3 gap-3">
          {findings.map((f, i) => {
            const txt = typeof f === 'string' ? f : JSON.stringify(f);
            const ok  = txt.startsWith('OK:');
            const name = txt.replace(/^(OK|FAIL|WARN):\s*/i, '');
            return (
              <div key={i} className={`card shadow border ${ok ? 'border-success/20 bg-success/5' : 'border-error/20 bg-error/5'}`}>
                <div className="card-body py-2.5 px-3 flex-row items-center gap-2">
                  <span className={`text-lg ${ok ? 'text-success' : 'text-error'}`}>{ok ? '●' : '●'}</span>
                  <span className="text-sm flex-1">{name}</span>
                  <span className={`badge badge-xs font-bold ${ok ? 'badge-success' : 'badge-error'}`}>{ok ? 'OK' : 'FAIL'}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ── Sand Pendulum (Harmonograph) ──────────────────────────────────────────────
// Draws a unique Lissajous/sand pendulum figure for each pipeline stage.
// The canvas renders sand-grain particles along the harmonograph trajectory,
// creating the organic look of a real sand pendulum art piece.

// ── Hourglass (canvas) — animates while a stage is running ───────────────────

function HourGlass({ status = 'running', size = 160 }) {
  const canvasRef = useRef(null);

  useEffect(() => {
    const cv = canvasRef.current;
    if (!cv) return;
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;
    const cx = W / 2, cy = H / 2;

    // Geometry
    const TW = W * 0.38;   // chamber half-width (top & bottom)
    const TH = H * 0.39;   // chamber half-height
    const NK = 2.8;         // neck half-width in px

    const outlinePath = () => {
      ctx.beginPath();
      ctx.moveTo(cx - TW, cy - TH);
      ctx.lineTo(cx + TW, cy - TH);
      ctx.lineTo(cx + NK,  cy);
      ctx.lineTo(cx + TW, cy + TH);
      ctx.lineTo(cx - TW, cy + TH);
      ctx.lineTo(cx - NK,  cy);
      ctx.closePath();
    };
    const topClip = () => {
      ctx.beginPath();
      ctx.moveTo(cx - TW, cy - TH);
      ctx.lineTo(cx + TW, cy - TH);
      ctx.lineTo(cx + NK,  cy);
      ctx.lineTo(cx - NK,  cy);
      ctx.closePath();
    };
    const botClip = () => {
      ctx.beginPath();
      ctx.moveTo(cx - NK,  cy);
      ctx.lineTo(cx + NK,  cy);
      ctx.lineTo(cx + TW, cy + TH);
      ctx.lineTo(cx - TW, cy + TH);
      ctx.closePath();
    };

    let level = 0;          // 0 = top full, 1 = top empty
    let grains = [];        // falling particles
    let alive = true;
    let rafId;
    let last = null;
    const CYCLE = 5500;     // ms for one full drain

    const frame = (ts) => {
      if (!alive) return;
      if (last === null) last = ts;
      const dt = Math.min(ts - last, 50);
      last = ts;

      level += dt / CYCLE;
      if (level > 1) level = 0;   // flip and restart

      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#0b0b16';
      ctx.fillRect(0, 0, W, H);

      // ── Outline ──
      const og = ctx.createLinearGradient(cx, cy - TH, cx, cy + TH);
      og.addColorStop(0,   'rgba(245,158,11,.75)');
      og.addColorStop(0.5, 'rgba(124, 58,237,.55)');
      og.addColorStop(1,   'rgba(245,158,11,.75)');
      ctx.save();
      outlinePath();
      ctx.strokeStyle = og;
      ctx.lineWidth = 1.8;
      ctx.stroke();
      ctx.restore();

      // ── Top sand (drains down) ──
      const topSandH   = TH * (1 - level);
      const topSandY   = cy - topSandH;
      const topSandSpan = NK + (TW - NK) * topSandH / TH;

      ctx.save();
      topClip(); ctx.clip();
      const tg = ctx.createLinearGradient(0, topSandY, 0, cy);
      tg.addColorStop(0, 'rgba(245,158,11,.12)');
      tg.addColorStop(1, 'rgba(245,158,11,.42)');
      ctx.beginPath();
      ctx.moveTo(cx - topSandSpan, topSandY);
      ctx.lineTo(cx + topSandSpan, topSandY);
      ctx.lineTo(cx + NK, cy); ctx.lineTo(cx - NK, cy);
      ctx.closePath(); ctx.fillStyle = tg; ctx.fill();
      // surface glint
      ctx.beginPath();
      ctx.moveTo(cx - topSandSpan, topSandY);
      ctx.lineTo(cx + topSandSpan, topSandY);
      ctx.strokeStyle = 'rgba(251,191,36,.7)'; ctx.lineWidth = 1.3; ctx.stroke();
      ctx.restore();

      // ── Bottom sand (fills up) ──
      const botSandH    = TH * level;
      const botSandY    = cy + TH - botSandH;
      const botSandSpan = NK + (TW - NK) * botSandH / TH;

      ctx.save();
      botClip(); ctx.clip();
      const bg2 = ctx.createLinearGradient(0, botSandY, 0, cy + TH);
      bg2.addColorStop(0, 'rgba(245,158,11,.20)');
      bg2.addColorStop(1, 'rgba(245,158,11,.52)');
      ctx.beginPath();
      ctx.moveTo(cx - botSandSpan, botSandY);
      ctx.lineTo(cx + botSandSpan, botSandY);
      ctx.lineTo(cx + TW, cy + TH); ctx.lineTo(cx - TW, cy + TH);
      ctx.closePath(); ctx.fillStyle = bg2; ctx.fill();
      // surface glint
      ctx.beginPath();
      ctx.moveTo(cx - botSandSpan, botSandY);
      ctx.lineTo(cx + botSandSpan, botSandY);
      ctx.strokeStyle = 'rgba(251,191,36,.55)'; ctx.lineWidth = 1.1; ctx.stroke();
      ctx.restore();

      // ── Falling grains through neck ──
      if (status === 'running') {
        if (Math.random() < 0.35) {
          grains.push({ x: cx + (Math.random()-.5)*3, y: cy + 1,
                        vy: 1.2 + Math.random()*2,
                        r: 0.7 + Math.random()*.9,
                        a: 0.6 + Math.random()*.4 });
        }
        grains = grains.filter(g => {
          g.y += g.vy; g.vy += 0.18;
          if (g.y > botSandY) return false;
          ctx.beginPath();
          ctx.arc(g.x, g.y, g.r, 0, Math.PI*2);
          ctx.fillStyle = `rgba(251,191,36,${g.a})`;
          ctx.fill();
          return true;
        });
      }

      rafId = requestAnimationFrame(frame);
    };

    rafId = requestAnimationFrame(frame);
    return () => { alive = false; cancelAnimationFrame(rafId); };
  }, [status]);

  const glow = status === 'error' ? 'rgba(239,68,68,.35)' : 'rgba(245,158,11,.35)';

  return (
    <div className="pendulum-wrap" style={{ width: size, height: size,
         boxShadow: `0 0 20px ${glow}, 0 0 40px ${glow.replace('.35','.12')}` }}>
      <canvas ref={canvasRef} width={size} height={size} />
    </div>
  );
}

        <SevaForgeLogo size={48} animate={!allFinished && !!currentStage} />
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="seva-wordmark text-xl">Sevaforge</span>
            <NoCaaSBadge />
          </div>
          <div className="font-semibold text-base mt-0.5">
            {allFinished
              ? (hasFailed ? '❌ Pipeline failed' : '✅ Pipeline complete')
              : currentStage
                ? <span>Running <span className="text-warning font-mono">{currentStage.toUpperCase()}</span>…</span>
                : 'Pipeline starting…'}
          </div>
          <div className="text-xs font-mono opacity-40 truncate">{pipelinePath || '—'}</div>
        </div>
        <div className="flex flex-col items-end gap-1">
          {elapsed > 0 && <div className="badge badge-outline font-mono text-xs">{elapsed}s</div>}
          {totalStages > 0 && <div className="badge badge-primary text-xs">{Math.min(currentNum,totalStages)}/{totalStages}</div>}
        </div>
      </div>

      {/* Progress bar */}
      {totalStages > 0 && (
        <div>
          <div className="flex justify-between text-xs opacity-50 mb-1">
            <span>Pipeline Progress</span><span>{pct}%</span>
          </div>
          <progress className="progress progress-primary w-full h-2.5" value={pct} max="100" />
        </div>
      )}

      {/* ── Current stage spotlight with SAND PENDULUM ── */}
      {currentStage && (
        <div className="card border-2 border-warning/60 shadow-xl"
             style={{background:'linear-gradient(135deg,rgba(245,158,11,.06),rgba(124,58,237,.06))'}}>
          <div className="card-body py-5">
            <div className="flex gap-5 items-start">

              {/* Hourglass — animates while stage runs */}
              <div className="flex-shrink-0">
                <HourGlass status="running" size={156} />
                <div className="text-center mt-2 text-xs font-mono opacity-40">stage {currentNum}/{totalStages}</div>
              </div>

              {/* Stage info */}
              <div className="flex-1 min-w-0">
                <div className="flex items-center gap-3 mb-4">
                  <span className="text-4xl">{stageEmoji(currentStage)}</span>
                  <div>
                    <div className="font-bold text-warning uppercase tracking-widest text-lg flex items-center gap-2">
                      <span className="spin inline-block text-base">⟳</span>
                      {currentStage}
                    </div>
                    <div className="text-xs opacity-50 font-mono mt-0.5">
                      {activeInfo.agent || ''}{activeInfo.mcp_server ? ` · ${activeInfo.mcp_server}` : ''}
                    </div>
                  </div>
                </div>

                {activeInfo.purpose && (
                  <div className="space-y-3">
                    <div>
                      <div className="text-xs font-bold uppercase tracking-widest opacity-40 mb-1">🎯 Purpose</div>
                      <div className="text-sm leading-relaxed">{activeInfo.purpose}</div>
                    </div>
                    <div>
                      <div className="text-xs font-bold uppercase tracking-widest opacity-40 mb-1">📦 Outputs</div>
                      <div className="text-sm opacity-70 leading-relaxed">{activeInfo.outputs}</div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* Stage pipeline flow — with sand-fill + burst animations */}
      {stages.length > 0 && (
        <div className="card bg-base-200/60 shadow backdrop-blur-sm">
          <div className="card-body py-4">
            <h3 className="text-xs font-semibold uppercase tracking-widest opacity-40 mb-3">Pipeline Flow</h3>
            <div className="flex flex-wrap gap-2">
              {stages.map((id, i) => {
                const s = stageState[id];
                const extraCls = s === 'success' ? 'sand-fill-success burst-success'
                               : s === 'error'   ? 'sand-fill-error burst-error' : '';
                return (
                  <div key={id}
                       className={`stage-card card border-2 p-2 flex flex-col items-center gap-1 min-w-[76px] ${stageColor(id)} ${extraCls}`}>
                    <span className="text-base">{stageEmoji(id)}</span>
                    <span className="text-xs font-mono font-semibold">{id}</span>
                    {stageIcon(id)}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── Stage results — clean tick/cross list ── */}
      {Object.entries(stageResults).length > 0 && (
        <div className="card bg-base-200/60 shadow backdrop-blur-sm">
          <div className="card-body py-4">
            <h3 className="text-xs font-semibold uppercase tracking-widest opacity-40 mb-3">Stage Results</h3>
            <div className="space-y-1.5">
              {Object.entries(stageResults).map(([id, result]) => {
                const ok = result.status === 'success';
                return (
                  <div key={id}
                       className="flex items-center gap-3 rounded-lg px-3 py-2"
                       style={{
                         background: ok ? 'rgba(6,50,40,.35)'   : 'rgba(60,10,10,.35)',
                         border:     ok ? '1px solid rgba(52,211,153,.2)' : '1px solid rgba(239,68,68,.2)',
                       }}>
                    {/* Tick / cross */}
                    <span className="text-base flex-shrink-0"
                          style={{color: ok ? '#34d399' : '#f87171'}}>
                      {ok ? '✓' : '✗'}
                    </span>
                    <span className="font-mono font-bold text-sm tracking-wide"
                          style={{color: ok ? '#6ee7b7' : '#fca5a5'}}>
                      {id.toUpperCase()}
                    </span>
                    <span className="text-xs opacity-50 flex-1 truncate">{result.summary || ''}</span>
                    {(result.findings||[]).length > 0 &&
                      <span className="text-xs opacity-40 flex-shrink-0">
                        {result.findings.length} findings
                      </span>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      )}

      {/* ── Done banner ── */}
      {allFinished && (
        <div className="live-hero flex items-center gap-4 px-6 py-5"
             style={{border: `1px solid ${hasFailed ? 'rgba(239,68,68,.3)' : 'rgba(52,211,153,.2)'}`}}>
          <SevaForgeLogo size={48} animate={false} />
          <div className="flex-1">
            <div className="font-bold text-xl mb-1"
                 style={{color: hasFailed ? '#f87171' : '#6ee7b7'}}>
              {hasFailed ? '✗  Pipeline Failed' : '✓  Pipeline Complete'}
            </div>
            <div className="text-sm opacity-55 mb-2">
              {hasFailed
                ? 'One or more stages encountered errors — check the results above'
                : `All ${totalStages} stages passed · ${elapsed}s · Sevaforge did the work`}
            </div>
            <NoCaaSBadge />
          </div>
        </div>
      )}
    </div>
  );
}


// ── App Shell ─────────────────────────────────────────────────────────────────

function App() {
  const [view,         setView]         = useState('dashboard');
  const [config,       setConfig]       = useState({ apiUrl: window.location.origin, apiKey: '' });
  const [serverStatus, setServerStatus] = useState(null);
  const [connected,    setConnected]    = useState(null);
  const [history,      setHistory]      = useState([]);
  const [toasts,       setToasts]       = useState([]);

  // Live pipeline state (fed by SSE events from /events)
  const [liveState, setLiveState] = useState({
    connected:    false,
    pipelinePath: '',
    stages:       [],
    stageState:   {},   // { [stageId]: 'pending'|'running'|'success'|'error' }
    stageInfo:    {},   // { [stageId]: { purpose, outputs, agent, mcp_server } }
    stageResults: {},   // { [stageId]: resultObject }
    currentStage: null,
    currentNum:   0,
    totalStages:  0,
    done:         false,
    elapsed:      0,
  });

  const call = useApi(config);

  const addToast = useCallback((msg, type = 'info') => {
    const id = Date.now();
    setToasts(p => [...p, { id, msg, type }]);
    setTimeout(() => setToasts(p => p.filter(t => t.id !== id)), 4000);
  }, []);

  // Server health polling
  useEffect(() => {
    const check = async () => {
      try {
        const r = await call('GET', '/api/v1/status');
        setServerStatus(r); setConnected(true);
      } catch {
        setConnected(false); setServerStatus(null);
      }
    };
    check();
    const t = setInterval(check, 20000);
    return () => clearInterval(t);
  }, [call]);

  // ── SSE connection — live pipeline events from dashboard_server.py ──────────
  useEffect(() => {
    const es = new EventSource('/events');

    es.onmessage = (e) => {
      let msg;
      try { msg = JSON.parse(e.data); } catch { return; }
      const { type } = msg;

      if (type === 'connected') {
        setLiveState(s => ({ ...s, connected: true }));

      } else if (type === 'pipeline_start') {
        const initState = {};
        (msg.stages || []).forEach(id => { initState[id] = 'pending'; });
        setLiveState({
          connected:    true,
          pipelinePath: msg.path || '',
          stages:       msg.stages || [],
          stageState:   initState,
          stageInfo:    {},
          stageResults: {},
          currentStage: null,
          currentNum:   0,
          totalStages:  msg.total || 0,
          done:         false,
          elapsed:      0,
        });
        setView('live'); // auto-switch the moment a pipeline starts

      } else if (type === 'stage_start') {
        setLiveState(s => ({
          ...s,
          currentStage: msg.stage,
          currentNum:   msg.num || s.currentNum,
          stageState:   { ...s.stageState, [msg.stage]: 'running' },
          stageInfo:    { ...s.stageInfo,  [msg.stage]: msg.info  || {} },
        }));

      } else if (type === 'stage_result') {
        const ok = (msg.result || {}).status === 'success';
        setLiveState(s => ({
          ...s,
          currentStage: s.currentStage === msg.stage ? null : s.currentStage,
          stageState:   { ...s.stageState,   [msg.stage]: ok ? 'success' : 'error' },
          stageResults: { ...s.stageResults, [msg.stage]: msg.result || {} },
        }));

      } else if (type === 'pipeline_done') {
        setLiveState(s => ({
          ...s,
          done:         true,
          currentStage: null,
          elapsed:      msg.elapsed_s || 0,
        }));
        addToast(
          msg.success
            ? `Pipeline complete in ${msg.elapsed_s}s 🎉`
            : 'Pipeline failed ❌',
          msg.success ? 'success' : 'error'
        );
      }
    };

    es.onerror = () => setLiveState(s => ({ ...s, connected: false }));
    return () => es.close();
  }, []); // single mount — SSE connection lives for the page lifetime

  const handleRunComplete = (run) => {
    setHistory(p => [run, ...p.slice(0, 99)]);
    addToast(`Pipeline ${run.status === 'success' ? 'succeeded' : 'failed'} (${run.stages} stages)`, run.status === 'success' ? 'success' : 'error');
  };

  return (
    <div className="flex h-screen overflow-hidden bg-base-300">

      {/* ── Sidebar ── */}
      <aside className="sidebar bg-base-200 border-r border-base-300 flex flex-col">
        {/* ── Sevaforge brand block ── */}
        <div className="px-4 py-4 border-b border-base-300"
             style={{background:'linear-gradient(160deg,rgba(124,58,237,.08),rgba(245,158,11,.05))'}}>
          <div className="flex items-center gap-3 mb-3">
            <SevaForgeLogo size={40} animate={false} />
            <div>
              <div className="seva-wordmark leading-tight">Sevaforge</div>
              <div className="text-xs font-mono opacity-35 mt-0.5">ForgeFlow v2.1</div>
            </div>
          </div>
          <NoCaaSBadge />
        </div>

        {/* Nav */}
        <nav className="flex-1 p-3 flex flex-col gap-0.5">
          {VIEWS.map(v => (
            <button
              key={v.id}
              onClick={() => setView(v.id)}
              className={`btn btn-sm justify-start gap-3 font-normal ${view === v.id ? 'btn-primary' : 'btn-ghost opacity-70'}`}
            >
              <span className="text-base w-5 text-center">{v.icon}</span>
              {v.label}
            </button>
          ))}
        </nav>

        {/* Connection status */}
        <div className="p-3 border-t border-base-300">
          <div className="flex items-center gap-2 px-2 py-1.5">
            <span className={`w-2 h-2 rounded-full ${connected===true?'bg-success animate-pulse':connected===false?'bg-error':'bg-base-content/20'}`} />
            <span className="text-xs opacity-60 flex-1">
              {connected===true ? 'Connected' : connected===false ? 'Offline' : 'Connecting…'}
            </span>
            {serverStatus && <span className="badge badge-xs badge-outline">{serverStatus.mode?.toUpperCase()}</span>}
          </div>
        </div>
      </aside>

      {/* ── Main ── */}
      <div className="main-content flex flex-col overflow-hidden">
        {/* Topbar */}
        <header className="bg-base-200 border-b border-base-300 h-13 flex items-center px-6 gap-3 min-h-[52px]">
          <span className="text-base font-semibold flex-1">{VIEWS.find(v=>v.id===view)?.label}</span>
          {connected === true
            ? <span className="badge badge-success badge-sm gap-1"><span className="w-1.5 h-1.5 rounded-full bg-current" />API Online</span>
            : connected === false
            ? <span className="badge badge-error badge-sm">API Offline</span>
            : <span className="badge badge-ghost badge-sm"><Spinner /> Checking…</span>
          }
          <span className="font-mono text-xs opacity-30 hidden md:block">{config.apiUrl}</span>
          <button className="btn btn-xs btn-ghost opacity-50" onClick={() => setView('settings')}>⚙</button>
        </header>

        {/* Content */}
        <main className="flex-1 overflow-y-auto p-6">
          {view === 'live'      && <LiveView      liveState={liveState} />}
          {view === 'dashboard' && <DashboardView history={history} serverStatus={serverStatus} connected={connected} onNavigate={setView} />}
          {view === 'pipeline'  && <PipelineView  call={call} onRunComplete={handleRunComplete} />}
          {view === 'health'    && <HealthView    call={call} />}
          {view === 'history'   && <HistoryView   history={history} onClear={() => setHistory([])} />}
          {view === 'settings'  && <SettingsView  settings={config} onSave={setConfig} toast={addToast} />}
        </main>
      </div>

      <ToastStack toasts={toasts} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
