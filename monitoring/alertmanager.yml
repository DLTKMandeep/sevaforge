global:
  resolve_timeout: 5m
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alerts@example.com'
  # slack_api_url: 'https://hooks.slack.com/services/...'

route:
  group_by: ['alertname', 'job']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: warnings

receivers:
  - name: 'default'
    # Configure your default notification channel here

  - name: 'critical'
    # slack_configs:
    #   - channel: '#alerts-critical'
    #     title: '{ template "slack.default.title" . }'
    #     text: '{ template "slack.default.text" . }'
    # email_configs:
    #   - to: 'oncall@example.com'

  - name: 'warnings'
    # slack_configs:
    #   - channel: '#alerts-warnings'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'job', 'instance']
